<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#ff922b"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- 彩虹光晕 -->
  <circle cx="256" cy="220" r="160" fill="rgba(255,255,255,0.08)"/>
  <!-- 狮子耳朵 -->
  <ellipse cx="168" cy="158" rx="44" ry="50" fill="url(#gold)"/>
  <ellipse cx="344" cy="158" rx="44" ry="50" fill="url(#gold)"/>
  <ellipse cx="168" cy="162" rx="26" ry="30" fill="#ff6b6b"/>
  <ellipse cx="344" cy="162" rx="26" ry="30" fill="#ff6b6b"/>
  <!-- 脸 -->
  <circle cx="256" cy="240" r="130" fill="url(#gold)"/>
  <!-- 鬃毛 -->
  <circle cx="256" cy="240" r="148" fill="none" stroke="#ff922b" stroke-width="28" stroke-dasharray="18 12"/>
  <!-- 眼睛 -->
  <ellipse cx="210" cy="215" rx="20" ry="22" fill="white"/>
  <ellipse cx="302" cy="215" rx="20" ry="22" fill="white"/>
  <circle cx="215" cy="218" r="13" fill="#2d3748"/>
  <circle cx="307" cy="218" r="13" fill="#2d3748"/>
  <circle cx="220" cy="213" r="5" fill="white"/>
  <circle cx="312" cy="213" r="5" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="256" cy="258" rx="18" ry="12" fill="#e05d73"/>
  <!-- 嘴 -->
  <path d="M228 274 Q256 300 284 274" stroke="#2d3748" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- 胡须 -->
  <line x1="176" y1="262" x2="228" y2="268" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="176" y1="278" x2="228" y2="276" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="284" y1="268" x2="336" y2="262" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <line x1="284" y1="276" x2="336" y2="278" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- 星星装饰 -->
  <text x="118" y="175" font-size="36" fill="white" opacity="0.9">⭐</text>
  <text x="348" y="168" font-size="30" fill="white" opacity="0.9">✨</text>
  <!-- 底部文字 -->
  <rect x="116" y="368" width="280" height="72" rx="36" fill="rgba(255,255,255,0.25)"/>
  <text x="256" y="415" text-anchor="middle" font-family="Arial,sans-serif" font-size="42" font-weight="900" fill="white">英语</text>
</svg>