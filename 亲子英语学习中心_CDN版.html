// 墙卡页：TTS 朗读单句
let _wcTtsBtn = null;
function wcpTts(btn, text){
  // 停掉之前
  if(_wcTtsBtn && _wcTtsBtn !== btn) _wcTtsBtn.classList.remove('speaking');
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(_wcTtsBtn === btn && btn.classList.contains('speaking')){
    btn.classList.remove('speaking');
    _wcTtsBtn = null;
    return;
  }
  _wcTtsBtn = btn;
  btn.classList.add('speaking');
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  utter.onend = ()=>{ btn.classList.remove('speaking'); if(_wcTtsBtn===btn) _wcTtsBtn=null; };
  utter.onerror = ()=>{ btn.classList.remove('speaking'); if(_wcTtsBtn===btn) _wcTtsBtn=null; };
  window.speechSynthesis.speak(utter);
}

function toggleSec(sid){
  const s = document.getElementById('sents-'+sid);
  const b = document.getElementById('eb-'+sid);
  if(!s) return;
  s.classList.toggle('open');
  if(b) b.textContent = s.classList.contains('open') ? '▲' : '▼';
}

// ===== 音频播放 =====
function playSec(sid, encodedPath){
  const ga = document.getElementById('ga');
  const pb = document.getElementById('p-'+sid);
  const wv = document.getElementById('w-'+sid);
  const ap = document.getElementById('ap-'+sid);
  const pf = document.getElementById('pf-'+sid);
  const pt = document.getElementById('pt-'+sid);
  const pd = document.getElementById('pd-'+sid);

  if(curSecId===sid && !ga.paused){
    ga.pause();
    if(pb){pb.textContent='▶';pb.classList.remove('playing');}
    if(wv) wv.classList.remove('on');
    return;
  }
  if(curSecId===sid && ga.paused){
    ga.play();
    if(pb){pb.textContent='⏸';pb.classList.add('playing');}
    if(wv) wv.classList.add('on');
    return;
  }
  stopAudio();
  stopTts();
  curSecId=sid; curFill=pf; curT=pt; curD=pd;
  console.log('[playSec] sid='+sid+' path='+encodedPath);
  ga.src=encodedPath;
  ga.play().then(()=>{
    console.log('[playSec] play() ok');
    if(pb){pb.textContent='⏸';pb.classList.add('playing');}
    if(wv) wv.classList.add('on');
    if(ap) ap.classList.add('on');
    if(!played.has(sid)){ played.add(sid); addStar(); }
    const s = document.getElementById('sents-'+sid);
    if(s && !s.classList.contains('open')) toggleSec(sid);
  }).catch((e)=>{ console.error('[playSec] play() FAILED:', e); stopAudio(); });
}

function stopAudio(){
  const ga = document.getElementById('ga');
  if(curSecId){
    const pb = document.getElementById('p-'+curSecId);
    const wv = document.getElementById('w-'+curSecId);
    if(pb){pb.textContent='▶';pb.classList.remove('playing');}
    if(wv) wv.classList.remove('on');
  }
  ga.pause(); ga.src='';
  curSecId=null; curFill=null; curT=null; curD=null;
}

function updateProg(){
  const ga = document.getElementById('ga');
  if(!curFill) return;
  const pct = ga.duration ? ga.currentTime/ga.duration*100 : 0;
  curFill.style.width = pct+'%';
  if(curT) curT.textContent = fmt(ga.currentTime);
  if(curD && ga.duration) curD.textContent = fmt(ga.duration);
}

function seekAu(e, bar){
  const ga = document.getElementById('ga');
  if(!ga.duration) return;
  const r = bar.getBoundingClientRect();
  ga.currentTime = ((e.clientX-r.left)/r.width)*ga.duration;
}

function fmt(s){ if(isNaN(s)) return '--:--'; return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function addStar(){
  stars++;
  document.getElementById('starCount').textContent = stars;
  const el = document.createElement('div');
  el.className = 'star-float';
  el.textContent = ['⭐','🌟','✨','💫'][Math.floor(Math.random()*4)];
  el.style.left = (Math.random()*60+20)+'%';
  el.style.top = '40%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1300);
}

// ===== 练习模式 =====
let quizState = {};

function startQuiz(chKey){
  chKey = String(chKey);
  const ch = D[chKey];
  if(!ch) return;

  let pool = [];
  (ch.sections||[]).forEach((sec,si)=>{
    (sec.sentences||[]).forEach((s,sj)=>{
      if(s.en && s.zh && s.en.length > 3 && s.zh.length > 1){
        pool.push({ en: s.en, zh: s.zh, secName: sec.name, audioRel: sec.audio_rel||null, secIdx: si });
      }
    });
  });

  let globalPool = [];
  Object.keys(D).forEach(k=>{
    (D[k].sections||[]).forEach(sec=>{
      (sec.sentences||[]).forEach(s=>{
        if(s.en && s.zh && s.en.length > 3 && s.zh.length > 1) globalPool.push(s);
      });
    });
  });

  if(pool.length < 4){
    alert('该章节例句太少，无法出题！请选择其他章节。');
    return;
  }

  let questions = shuffle(pool).slice(0, Math.min(10, pool.length));

  let qs = questions.map((item, idx)=>{
    let type;
    if(idx % 3 === 2) type = 'listen';
    else if(idx % 3 === 1) type = 'en2zh';
    else type = 'zh2en';

    let distractor_pool, correct, options;
    if(type === 'zh2en' || type === 'listen'){
      correct = item.en;
      distractor_pool = shuffle(globalPool.filter(s=>s.en!==item.en && s.en.length>3)).slice(0,3).map(s=>s.en);
    } else {
      correct = item.zh;
      distractor_pool = shuffle(globalPool.filter(s=>s.zh!==item.zh && s.zh.length>1)).slice(0,3).map(s=>s.zh);
    }
    while(distractor_pool.length < 3){
      distractor_pool.push(type==='en2zh'?'没有这个意思':'This is a wrong answer.');
    }
    options = shuffle([correct, ...distractor_pool.slice(0,3)]);
    return { type, item, correct, options };
  });

  quizState = {
    chKey, chName: ch.name,
    questions: qs,
    cur: 0,
    score: 0,
    answered: false,
  };
  renderQuizQuestion();
  document.getElementById('quizOverlay').classList.add('open');
  stopAudio();
  stopTts();
}

function renderQuizQuestion(){
  const {questions, cur, score} = quizState;
  if(cur >= questions.length){ renderQuizResult(); return; }
  const q = questions[cur];
  const total = questions.length;
  const pct = (cur/total*100).toFixed(0);

  const typeLabels = { zh2en:'👀 看中文，选英文', en2zh:'📖 看英文，选中文', listen:'🎧 听音频，选英文' };
  const typeLabel = typeLabels[q.type] || '';

  let questionHTML = '';
  if(q.type === 'zh2en'){
    questionHTML = `<div class="quiz-type-badge">${typeLabel}</div>
      <div class="quiz-question">${esc(q.item.zh)}</div>
      <div class="quiz-question-sub">下面哪句英文是它的意思？</div>`;
  } else if(q.type === 'en2zh'){
    questionHTML = `<div class="quiz-type-badge">${typeLabel}</div>
      <div class="quiz-question" style="font-family:Georgia,serif">${esc(q.item.en)}</div>
      <div class="quiz-question-sub">这句英文是什么意思？</div>`;
  } else {
    const enSafe = q.item.en.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    questionHTML = `<div class="quiz-type-badge">${typeLabel}</div>
      <div class="quiz-question-sub" style="margin-bottom:14px">认真听朗读，选出你听到的句子：</div>
      <button class="quiz-listen-btn" id="qListenBtn" onclick="playQuizTts('${enSafe}', this)">🔊 点击播放</button>`;
  }

  const optionsHTML = q.options.map((opt,i)=>`
    <button class="quiz-opt" id="qopt-${i}" onclick="answerQuiz(${i})">
      <span class="quiz-opt-idx">${'ABCD'[i]}</span>
      <span style="${q.type==='zh2en'||q.type==='listen'?'font-family:Georgia,serif;':''}">${esc(opt)}</span>
    </button>`).join('');

  document.getElementById('quizBox').innerHTML = `
    <div class="quiz-header">
      <div>
        <div class="quiz-title">🎯 章节练习</div>
        <div style="font-size:12px;color:#aaa;margin-top:2px">${esc(quizState.chName)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="quiz-progress-text">${cur+1} / ${total}</span>
        <button class="quiz-close" onclick="closeQuiz()">✕</button>
      </div>
    </div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" style="width:${pct}%"></div>
    </div>
    ${questionHTML}
    <div class="quiz-options">${optionsHTML}</div>
    <div class="quiz-feedback" id="qFeedback"></div>
    <button class="quiz-next-btn" id="qNextBtn" onclick="nextQuestion()">
      ${cur+1 < total ? '下一题 →' : '查看结果 🏆'}
    </button>`;

  quizState.answered = false;

  // listen 题渲染完毕后自动朗读一次
  if(q.type === 'listen'){
    setTimeout(()=>{
      const btn = document.getElementById('qListenBtn');
      if(btn) playQuizTts(q.item.en, btn);
    }, 400);
  }
}

function playQuizTts(text, btn){
  if(!hasTts()){ alert('您的浏览器不支持语音朗读，请尝试 Chrome 或 Edge'); return; }
  // 如果正在朗读同一个按钮，则停止
  if(curTtsBtn === btn){ stopTts(); return; }
  stopTts();
  const utter = new SpeechSynthesisUtterance(text);
  const params = getTtsParams(text);
  utter.lang = 'en-US';
  utter.rate = params.rate;
  utter.pitch = params.pitch;
  utter.volume = params.volume;
  const voices = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  if(voices.length) utter.voice = voices[0];
  utter.onstart = ()=>{ curTtsBtn = btn; if(btn){ btn.textContent='🔊 播放中...'; btn.classList.add('playing'); } };
  utter.onend = utter.onerror = ()=>{ curTtsBtn=null; if(btn){ btn.textContent='🔊 再听一遍'; btn.classList.remove('playing'); } };
  curTtsUtter = utter;
  speechSynthesis.speak(utter);
}


function answerQuiz(idx){
  if(quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.cur];
  const isCorrect = q.options[idx] === q.correct;
  if(isCorrect) quizState.score++;

  q.options.forEach((_,i)=>{
    const btn = document.getElementById('qopt-'+i);
    if(!btn) return;
    btn.classList.add('disabled');
    if(q.options[i] === q.correct) btn.classList.add('correct');
    else if(i === idx && !isCorrect) btn.classList.add('wrong');
  });

  const fb = document.getElementById('qFeedback');
  if(fb){
    fb.classList.add('show');
    if(isCorrect){
      fb.classList.add('ok');
      fb.innerHTML = `${['🎉 太棒了！','⭐ 答对了！','🌟 真聪明！','💪 厉害！'][Math.floor(Math.random()*4)]}`;
      addStar();
    } else {
      fb.classList.add('ng');
      fb.innerHTML = `😅 答错了，没关系！
        <div class="quiz-feedback-answer">正确答案：<b>${esc(q.correct)}</b></div>`;
    }
  }

  const nb = document.getElementById('qNextBtn');
  if(nb) nb.classList.add('show');
}

function nextQuestion(){
  quizState.cur++;
  const qa = document.getElementById('qa');
  qa.pause(); qa.src='';
  renderQuizQuestion();
}

function renderQuizResult(){
  const {score, questions, chName} = quizState;
  const total = questions.length;
  const pct = Math.round(score/total*100);
  let emoji, title;
  if(pct >= 90){ emoji='🏆'; title='完美！你太厉害了！'; }
  else if(pct >= 70){ emoji='🌟'; title='很棒！继续加油！'; }
  else if(pct >= 50){ emoji='💪'; title='不错哦！多练练就行！'; }
  else { emoji='😊'; title='再练一次，一定能行！'; }

  document.getElementById('quizBox').innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="quiz-close" onclick="closeQuiz()">✕</button>
    </div>
    <div class="quiz-result">
      <div class="quiz-result-emoji">${emoji}</div>
      <div class="quiz-result-title">${title}</div>
      <div class="quiz-result-score">${score}/${total}</div>
      <div class="quiz-result-sub">正确率 ${pct}% · ${esc(chName)}</div>
      <div class="quiz-result-btns">
        <button class="quiz-again-btn" onclick="startQuiz('${quizState.chKey}')">🔄 再练一次</button>
        <button class="quiz-back-btn" onclick="closeQuiz()">📖 继续学习</button>
      </div>
    </div>`;
}

function closeQuiz(){
  document.getElementById('quizOverlay').classList.remove('open');
  const qa = document.getElementById('qa');
  qa.pause(); qa.src='';
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ===== PWA Service Worker 注册 =====
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg=>{
        console.log('SW 注册成功:', reg.scope);
        // 检测新版本
        reg.addEventListener('updatefound', ()=>{
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', ()=>{
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              showUpdateBanner();
            }
          });
        });
      })
      .catch(err=>console.log('SW 注册失败:', err));
  });
}

// ===== 更新提示横幅 =====
function showUpdateBanner(){
  const banner = document.getElementById('updateBanner');
  if(banner) banner.style.display = 'flex';
}
function doUpdate(){
  if(navigator.serviceWorker.controller){
    navigator.serviceWorker.controller.postMessage({type:'SKIP_WAITING'});
  }
  window.location.reload();
}

// ===== 安装到桌面提示 =====
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  deferredPrompt = e;
  // 延迟2秒显示安装提示，避免打扰
  setTimeout(()=>{
    const banner = document.getElementById('installBanner');
    if(banner) banner.style.display = 'flex';
  }, 2000);
});
function doInstall(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result=>{
    if(result.outcome === 'accepted'){
      console.log('用户已安装 PWA');
    }
    deferredPrompt = null;
    document.getElementById('installBanner').style.display = 'none';
  });
}
function dismissInstall(){
  document.getElementById('installBanner').style.display = 'none';
  deferredPrompt = null;
}
window.addEventListener('appinstalled', ()=>{
  document.getElementById('installBanner').style.display = 'none';
  console.log('App 已安装到桌面');
});
</script>
