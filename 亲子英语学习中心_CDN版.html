zh": "我越来越累了。"}, {"en": "I don't want to do anything.", "zh": "我不想做任何事。"}, {"en": "I can't even wash myself.", "zh": "我甚至没办法洗澡。"}, {"en": "I can't even move a finger.", "zh": "我连手指头都动不了。"}, {"en": "My eyes are getting drowsy.", "zh": "我的眼皮都要蓋下来了。"}, {"en": "There are dark circles under your eyes. / You have dark circles under your eyes.", "zh": "你有黑眼圈。"}, {"en": "Why do you look so down?", "zh": "你为什么看起来那么没精神？"}, {"en": "You look exhausted.", "zh": "你看起来精疲力尽了。"}, {"en": "Want to take a nap?", "zh": "想要小睡一下吗？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-03-累的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-03-累的时候.mp3"}, {"ch": 22, "sec": 4, "name": "摔倒/撞到的时候", "sentences": [{"en": "Mom, I fell down.", "zh": "妈，我摔倒了。"}, {"en": "I slipped on the floor.", "zh": "我在地板上滑倒了。"}, {"en": "I fell down while running.", "zh": "我在跑的时候摔倒了。"}, {"en": "I tripped over a rock.", "zh": "我被石头绊倒了。"}, {"en": "I lost my balance and fell.", "zh": "我失去重心后摔倒了。"}, {"en": "Are you okay? Did you get hurt?", "zh": "你还好吗？有受伤吗？"}, {"en": "You got a hole in your pants.", "zh": "你的裤子破了个洞。"}, {"en": "Your knee is bleeding.", "zh": "你的膝盖流血了。"}, {"en": "You bruised your knees.", "zh": "你膝盖淤青了。"}, {"en": "You palm got bruised.", "zh": "你的手掌淤青了。"}, {"en": "Get up quickly.", "zh": "快点站起来。"}, {"en": "Get it off. / Shake the dust off.", "zh": "把灰尘拍掉。"}, {"en": "The streets are very bumpy.", "zh": "道路坑坑巴巴的。"}, {"en": "Let's watch the ground carefully .", "zh": "我们要小心注意地面。"}, {"en": "Wow! You're not crying like a baby.", "zh": "哇！你并没有像小孩一样的哭。"}, {"en": "It 's okay. Don't cry.", "zh": "没事了，不要哭。"}, {"en": "Bonk!", "zh": "撞到头了！"}, {"en": "Did you bump your head ?", "zh": "你撞到头了吗？"}, {"en": "Looks like you're going to get a black eye.", "zh": "你的眼睛好像淤青了。"}, {"en": "You should have looked ahead carefully.", "zh": "你应该小心看前面的。"}, {"en": "Let 's hold hands and walk again.", "zh": "我们手牵手再继续走吧。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-04-摔倒、撞倒的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-04-摔倒、撞倒的时候.mp3"}, {"ch": 22, "sec": 5, "name": "割到/流血的时候", "sentences": [{"en": "I'm bleeding.", "zh": "我流血了。"}, {"en": "I got a cut.", "zh": "我被割到了。"}, {"en": "I cut myself with a knife.", "zh": "我被刀子割到自己了。"}, {"en": "I got a paper cut.", "zh": "我被纸张割到了。"}, {"en": "I got poked by a needle.", "zh": "我被针扎到了。"}, {"en": "I got cut by a piece of glass.", "zh": "我被一片玻璃割伤了。"}, {"en": "I'm scared because I'm bleeding.", "zh": "因为流血了，我很害怕。"}, {"en": "It's fine. It's going to stop soon.", "zh": "没关系，很快就会止血的。"}, {"en": "We need to clean the wound.", "zh": "我们必须清洁伤口。"}, {"en": "How did you get cut?", "zh": "你怎么被割到的？"}, {"en": "I told you to watch out for sharp things.", "zh": "我告诉过你要小心尖锐的东西。"}, {"en": "Ouch! The sterilizer hurt.", "zh": "哎呦！消毒药好痛。"}, {"en": "Let me put the ointment on.", "zh": "我来帮你涂药膏。"}, {"en": "Let's cover the wound with a band-aid.", "zh": "我们把OK绷贴在伤口上。"}, {"en": "Keep the bandage on the wound for a while.", "zh": "请绷带包住伤口一段时间。"}, {"en": "This helps prevent germs from getting inside.", "zh": "他可以帮助防止病菌跑到里面去。"}, {"en": "A scab will form to protect the wound.", "zh": "为了保护伤口，这里将会长出结痂。"}, {"en": "Don't pick your scabs.", "zh": "不要抠掉你的结痂。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-05-割破、流血的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-05-割破、流血的时候.mp3"}, {"ch": 22, "sec": 6, "name": "流鼻血的时候", "sentences": [{"en": "My nose is bleeding, Mom.", "zh": "妈，我流鼻血了。"}, {"en": "Tilt your head down.", "zh": "把头往前倾。"}, {"en": "Let's put a tissue on your nose first.", "zh": "我们先用面纸盖住你的鼻子。"}, {"en": "Let's put a cotton ball up your bloody nose.", "zh": "我们用棉花球堵住你流血的鼻子。"}, {"en": "Don't swallow the blood.", "zh": "不要把血吞下。"}, {"en": "Breathe with your mouth.", "zh": "用你的嘴巴呼吸。"}, {"en": "I have blood on my shirt.", "zh": "我的衬衫也沾到血了。"}, {"en": "It's okay. Don't worry about anything.", "zh": "没关系，不用担心其他事情。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-06-流鼻血的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-06-流鼻血的时候.mp3"}, {"ch": 22, "sec": 7, "name": "感冒的时候", "sentences": [{"en": "Mom,I caught a cold.", "zh": "妈，我感冒了。"}, {"en": "Mom, I feel very hot.", "zh": "妈，我觉得很热。"}, {"en": "I have a sore throat.", "zh": "我的喉咙很痛。"}, {"en": "I have a runny nose.", "zh": "我流鼻水了。"}, {"en": "I have a stuffy nose.", "zh": "我鼻塞了。"}, {"en": "My throat hurts when I swallow.", "zh": "我吞东西时，我的喉咙很痛。"}, {"en": "I don't want to eat because my throat hurts.", "zh": "我喉咙很痛，我不想吃东西。"}, {"en": "I have a bad cough./I am coughing a lot.", "zh": "我一直咳嗽。"}, {"en": "I have some phlegm in my throat.", "zh": "我的喉咙内有痰。"}, {"en": "You're coughing too hard.", "zh": "你咳的很严重。"}, {"en": "Your snot is yellow.", "zh": "你的鼻涕是黄色的。"}, {"en": "I think you have a cold./You seem to have caught a cold.", "zh": "我想你感冒了。"}, {"en": "You seem to have caught the flu.", "zh": "你好像得了流行性感冒。"}, {"en": "It is such a severe cold.", "zh": "这是很严重的感冒。"}, {"en": "You might have caught a cold from Yongsuo.", "zh": "我想你是从雍索那传染过来的。"}, {"en": "You need to see the dentist.", "zh": "你需要去看牙医。"}, {"en": "Don't take a shower today.", "zh": "今天不要洗澡了。"}, {"en": "Don't go out in the cold air.", "zh": "不要到外面吹冷风。"}, {"en": "The doctor told you not to eat cold things, right?", "zh": "医生叫你不要吃冷的食物，对吧？"}, {"en": "Let's put a towel around your neck.", "zh": "我们把毛巾围在你的脖子上吧。"}, {"en": "Don't talk too much since your throat hurts.", "zh": "喉咙痛的话，不要说太多话。"}, {"en": "Blow your nose hard.", "zh": "用力擤鼻涕。"}, {"en": "You need to move the stuff on the floor.", "zh": "你必须把地板上的东西移开。"}, {"en": "Cover your mouth with your hand when you", "zh": "当你要咳嗽时，用你的手挡住嘴巴。"}, {"en": "Try not to cough on people.", "zh": "试着不要对着人咳。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-07-感冒的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-07-感冒的时候.mp3"}, {"ch": 22, "sec": 8, "name": "发烧的时候", "sentences": [{"en": "Mom, I feel very hot.", "zh": "妈，我觉得很热。"}, {"en": "I have a fever, so my body feels really hot.", "zh": "我发烧了，所以我的身体真的很烫。"}, {"en": "I feel dizzy.", "zh": "我感觉头很晕。"}, {"en": "Let me see if you have a fever.", "zh": "让我看看你是否发烧了。"}, {"en": "Let's check your temperature.", "zh": "我们来量一下体温。"}, {"en": "Let me feel your forehead.", "zh": "我来摸一下你的额头。"}, {"en": "You have a fever.", "zh": "你发烧了。"}, {"en": "You have a high fever.", "zh": "你发高烧了。"}, {"en": "Your forehead's really hot.", "zh": "你的额头真的很烫。"}, {"en": "Let's take a fever reducer.", "zh": "来吃点退烧药吧。"}, {"en": "You need to drink a lot of water.", "zh": "你需要多喝水。"}, {"en": "You need to take off your clothes.", "zh": "你需要把衣服脱掉。"}, {"en": "I'll cool you down with a wet towel.", "zh": "我用湿毛巾来帮你降温。"}, {"en": "Hold this ice pack.", "zh": "抱住这个冰袋。"}, {"en": "I guess your body's fighting the germs right now.", "zh": "我想你的身体正在跟细菌战斗。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-08-发烧的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-08-发烧的时候.mp3"}, {"ch": 22, "sec": 9, "name": "头/肚子痛的时候", "sentences": [{"en": "I have a headache, Mom.", "zh": "妈，我头很疼。"}, {"en": "I have a terrible headache.", "zh": "我很严重的头痛。"}, {"en": "Let me see. Can I touch your forehead?", "zh": "我看看，我可以摸一下你的额头吗？"}, {"en": "Do you feel a lot of pain?/Are you sick very", "zh": "你很痛吗？"}, {"en": "I'll give you some medicine. Let's see.", "zh": "我拿药给你。试试看。"}, {"en": "I have a stomachache, Mom.", "zh": "妈，我肚子痛。"}, {"en": "I think I'm going to throw up.", "zh": "我想我要吐了。"}, {"en": "I have diarrhea.", "zh": "我拉肚子了。"}, {"en": "My poop's coming out like water.", "zh": "我的便便像水一样流出来。"}, {"en": "It looks like you got stomach upset.", "zh": "看起来你闹肚子了。"}, {"en": "I'll give you some digestive syrup.", "zh": "我给你些助消化的糖浆。"}, {"en": "What did you eat before?", "zh": "你之前吃了什么？"}, {"en": "Looks like you ate too many cold things.", "zh": "你好像吃太多冰的东西了。"}, {"en": "Do you need to poop?", "zh": "你需要去大便吗？"}, {"en": "You should lie down and rest.", "zh": "你应该躺下休息。"}, {"en": "Let me rub your tummy. You'll be fine soon.", "zh": "我来按摩你的肚子。你很快就会好起来"}, {"en": "Want to put a hot pack on your tummy?", "zh": "你要放个热水袋在你的肚子上吗？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-09-头、肚子痛的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-09-头、肚子痛的时候.mp3"}, {"ch": 22, "sec": 10, "name": "牙齿晃动/疼痛的时候", "sentences": [{"en": "I've got a loose tooth, Mom.", "zh": "妈，我有一颗牙齿在摇了。"}, {"en": "My inner tooth hurts.", "zh": "我的臼齿很痛。"}, {"en": "I can't chew it because my tooth hurts.", "zh": "我的牙齿痛到不能咀嚼了。"}, {"en": "Open your mouth. Say \"Ah~.\"", "zh": "张开你的嘴巴，说“啊~”。"}, {"en": "Which tooth hurts?", "zh": "哪一颗牙齿痛？"}, {"en": "It looks like your tooth's going to fall off.", "zh": "看起来你的牙齿要掉了。"}, {"en": "You need to see the dentist.", "zh": "你需要去看牙医。"}, {"en": "Let's go to see dentist tomorrow to take the tooth out.", "zh": "我们明天去看牙医，把这颗牙拔掉。"}, {"en": "Mommy will pull it out with a thread.", "zh": "妈妈用线来把它拔掉。"}, {"en": "Place your tooth underneath your pillow.", "zh": "把牙齿放在枕头下吧。"}, {"en": "The tooth fairy will come while you sleep and take your tooth.", "zh": "你睡觉的时候，牙仙会来把它拿走。"}, {"en": "She will leave you a present/money in return.", "zh": "她会放礼物/钱来作为回报。"}, {"en": "What present will the tooth fairy give me?", "zh": "牙仙会给我什么礼物呢？"}, {"en": "I don't know for sure. Go to sleep early so that the tooth fairy can come.", "zh": "我不确定，快点去睡吧。这样牙仙才能来。"}, {"en": "It looks like you have got a cavity.", "zh": "看起来你有蛀洞了。"}, {"en": "It looks like you ate too much sweet stuff.", "zh": "看起来你吃太多甜的东西了。"}, {"en": "Chew with your teeth that don't hurt.", "zh": "用你不痛的牙齿咀嚼。"}, {"en": "I'm scared to go to the dentist.", "zh": "我害怕去牙科。"}, {"en": "It's okay. The doctor will treat you gently.", "zh": "不用担心。医生会很温柔地帮你治疗。"}, {"en": "Mom, the wiggly tooth fell out.", "zh": "妈，晃动的牙齿掉了。"}, {"en": "That's strange. It didn't hurt at all.", "zh": "奇怪，一点也不痛。"}, {"en": "My tooth fell out for the first time.", "zh": "我第一次掉牙齿。"}, {"en": "I didn't know my tooth fell out.", "zh": "我都不知道我牙齿掉了。"}, {"en": "Jina still has not lost any teeth.", "zh": "吉娜还没有掉过牙齿。"}, {"en": "It's hard to chew because some of my teeth are missing.", "zh": "因为一些牙齿掉了，咀嚼起来很困难。"}, {"en": "Wait for a while. Your new teeth will grow soon.", "zh": "再等等吧。你的新牙很快就会长出来。"}, {"en": "Open your mouth. Let's see how many teeth have fallen out.", "zh": "张开你的嘴巴，我们看看你掉了几颗牙齿。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-10-牙齿晃动、疼痛的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-10-牙齿晃动、疼痛的时候.mp3"}, {"ch": 22, "sec": 11, "name": "得传染病的时候", "sentences": [{"en": "I think I broke something in my body.", "zh": "我想我把自己的身体搞坏了。"}, {"en": "I broke out all over my body.", "zh": "我全身突然长出什么了。"}, {"en": "It seems like you have chicken pox.", "zh": "你好像得了水痘。"}, {"en": "You shouldn't go to school today.", "zh": "你今天不可以去学校。"}, {"en": "Stay home today.", "zh": "今天待在家里。"}, {"en": "Your friends could also catch it from you.", "zh": "你的朋友们也有可能被你传染。"}, {"en": "Don't use the cup together with your brother.", "zh": "不要跟你弟弟一起用这个杯子。"}, {"en": "Let's use different towels and spoons.", "zh": "我们分开用不同的毛巾和汤匙吧。"}, {"en": "You don't want the entire family to get sick, do you?", "zh": "你不希望全家人都被传染，对吧？"}, {"en": "I hope you get well soon.", "zh": "我希望你快点好起来。"}, {"en": "Can't I play with my brother?", "zh": "我不可以跟弟弟玩吗？"}, {"en": "Wait a little and play when you get better.", "zh": "等一阵子，等你好一点再来玩。"}, {"en": "When can I get better?", "zh": "我什么时候会好？"}, {"en": "Maybe in a week or so.", "zh": "也许一个礼拜多一点。"}, {"en": "Why did you send my sister to grandma's?", "zh": "你为什么把妹妹送去奶奶家？"}, {"en": "I was afraid that your sister might catch it, too.", "zh": "我担心你妹妹也传染到。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-11-得传染病的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-11-得传染病的时候.mp3"}, {"ch": 22, "sec": 12, "name": "被虫咬/发痒的时候", "sentences": [{"en": "I think I got a bug bite here, Mom.", "zh": "妈，我想我这里被虫咬到了。"}, {"en": "It's swollen and red.", "zh": "又肿又红。"}, {"en": "It's ticklish./It's itchy.", "zh": "很痒。"}, {"en": "I can't sleep because it itches.", "zh": "我痒到睡不着了。"}, {"en": "I wonder what bit you.", "zh": "我想知道你被什么咬了。"}, {"en": "Don't scratch it.", "zh": "不要去抓它。"}, {"en": "It can get worse if you scratch it.", "zh": "如果你抓它的话，会更严重的。"}, {"en": "Don't scratch it even if it's ticklish.", "zh": "即使很痒，也不可以抓。"}, {"en": "If you scratch it, germs will get in. It'll get more itchy.", "zh": "如果你抓的话，细菌就会进去，那会让你更痒。"}, {"en": "I can't hold it./ I can't stand it.", "zh": "我忍不住了。"}, {"en": "This itch relief will help.", "zh": "这个止痒药可以帮你的忙。"}, {"en": "I'll put on some bug bite remedy for you.", "zh": "我帮你擦些治疗蚊虫咬的药。"}, {"en": "Put this ice pack on it.", "zh": "把这个冰袋敷上去。"}, {"en": "It will get better if you don't scratch it.", "zh": "如果你不抓的话，他就会好起来。"}, {"en": "Look. It's bleeding after you scratched it.", "zh": "看，你抓了之后，就流血了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-12-被虫咬、发痒的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-12-被虫咬、发痒的时候.mp3"}, {"ch": 22, "sec": 13, "name": "去医院", "sentences": [{"en": "Let's go to the hospital./Let's go to see a doctor.", "zh": "我们去医院。"}, {"en": "Do I have to get a shot?", "zh": "我一定要打针吗？"}, {"en": "No, you'll just check with the doctor.", "zh": "不，你只是要让医生检查一下。"}, {"en": "It is just a regular checkup.", "zh": "这只是定期的体检。"}, {"en": "Say hello to the doctor.", "zh": "跟医生打招呼。"}, {"en": "Take a deep breath.", "zh": "深呼吸。"}, {"en": "He's going to look at your ears and nose.", "zh": "他要看你的耳朵和鼻子。"}, {"en": "Let's measure your height and weight.", "zh": "我们来量身高和体重吧。"}, {"en": "You are 135cm tall and weigh 25kg.", "zh": "你有135公分，25公斤。"}, {"en": "You need to get a flu shot.", "zh": "你需要打流感预防针。"}, {"en": "It will sting a little. Don't be scared.", "zh": "会有一点刺痛，不用害怕。"}, {"en": "Wow, you're doing well by not crying.", "zh": "哇，你没哭，表现的很好。"}, {"en": "Let's get the prescription and go.", "zh": "我们拿处方笺就可以走了。"}, {"en": "It's all over now. / Everything's done now.", "zh": "现在都结束了。"}, {"en": "Let's go to the pharmacy.", "zh": "我们去领药处吧。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-13-去医院.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-13-去医院.mp3"}, {"ch": 22, "sec": 14, "name": "吃药", "sentences": [{"en": "Let's take some medicine.", "zh": "来吃药了。"}, {"en": "I don't want to take any medicine.", "zh": "我不想吃药。"}, {"en": "Then you won't get better.", "zh": "那么，你会好起来。"}, {"en": "Can you take it?", "zh": "你能吃吗？"}, {"en": "Take it 30 minutes after meal.", "zh": "饭后30分钟后，吃掉它。"}, {"en": "You need to take it twice a day.", "zh": "你一天必须吃两次。"}, {"en": "These are antibiotics, so you need to take them.", "zh": "这些是抗生素，你一定要吃。"}, {"en": "This is for your cough, and this is for your runny nose.", "zh": "这是治咳嗽的，这是治鼻涕的。"}, {"en": "You'll get better after taking this medicine.", "zh": "你吃了这些药后就会好起来。"}, {"en": "Good job taking your medicine.", "zh": "真厉害，你把药吃了。"}, {"en": "Drink all of it.", "zh": "把它都喝掉。"}, {"en": "You need to take it again if you spit it out.", "zh": "如果你吐掉的话，你必须再吃一次。"}, {"en": "Here's some water and candy.", "zh": "这里有水和糖果。"}, {"en": "Put the candy in your mouth right after taking this.", "zh": "吃完这个之后，把糖果放进嘴巴里。"}, {"en": "I want to take the medicine again.", "zh": "我还想再吃药。"}, {"en": "No way! You should take your medicine like you are told.", "zh": "不行！你必须根据指示来吃药。"}, {"en": "It's very bitter.", "zh": "好苦。"}, {"en": "I feel sleepy since I took the medicine.", "zh": "吃了药之后，我觉得很困。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-14-吃药.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-14-吃药.mp3"}, {"ch": 22, "sec": 15, "name": "吃对身体好的食物", "sentences": [{"en": "You'll get taller if you drink milk.", "zh": "如果你喝牛奶，你会长更高。"}, {"en": "This dry fish will help your bones get stronger.", "zh": "鱼干可以让你骨头更健壮。"}, {"en": "Seaweed makes your blood cleaner.", "zh": "海带可以让你的血更纯净。"}, {"en": "If you eat candy, lunch won't taste.", "zh": "如果你吃糖果的话，午餐会没有味道。"}, {"en": "Your skin will get smoother if you eat vegetables.", "zh": "更光滑。"}, {"en": "Let's have a snack.", "zh": "我们来吃点心吗。"}, {"en": "Let‘s call Grandma and tell her the good news!", "zh": "样强吧。"}, {"en": "Mom cooked with love for you.", "zh": "妈妈为你做了爱心料理。"}, {"en": "Multigrain rice is better than plain rice.", "zh": "杂粮米比一般的白米还好。"}, {"en": "Beans make you stronger and give you muscles.", "zh": "豆类可以让你更强壮，而且让你长肌肉"}, {"en": "Eat happily so you'll digest your food better.", "zh": "高兴地吃的话，你会消化的更好。"}, {"en": "It's good for you even though it tastes bad.", "zh": "即使它不好吃，但是对健康很好。"}, {"en": "Seasonal food is always fresh.", "zh": "当季的食物总是最新鲜的。"}, {"en": "It's safe to cook it fully.", "zh": "把它煮熟就会很安全。"}, {"en": "It's important to eat everything.", "zh": "均衡饮食是很重要的。"}, {"en": "Don't be so picky about food.", "zh": "不要那么挑食。"}, {"en": "Mom's eyesight is bad because I didn't eat carrots.", "zh": "妈妈因为不吃胡萝卜，所以视力才会不好。"}, {"en": "I love to eat vegetables.", "zh": "我喜欢吃蔬菜。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-15-吃对身体好的食物.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-15-吃对身体好的食物.mp3"}, {"ch": 22, "sec": 16, "name": "注意有害的食物", "sentences": [{"en": "Candy will make your teeth bad.", "zh": "糖果会让你的牙齿变坏。"}, {"en": "Too much ice cream will give you a stomachache.", "zh": "吃太多冰激淋的话，你的肚子会痛的。"}, {"en": "You shouldn't eat much too salty food.", "zh": "你不应该吃太多太咸的食物。"}, {"en": "Don't eat food that smells weird.", "zh": "不要吃闻起来很怪的食物。"}, {"en": "Instant food is bad for your health.", "zh": "速食对你的健康不好。"}, {"en": "This drink is full of coloring.", "zh": "这些饮料满满的都是色素。"}, {"en": "Street food isn't clean.", "zh": "路边的食物不干净。"}, {"en": "I'm afraid that street food is not safe.", "zh": "我担心路边的食物不安全。"}, {"en": "You won't grow if you don't eat everything.", "zh": "如果你没有什么都吃的话，你就不会长"}, {"en": "Your blood won't work well if you eat just meat but no vegetables.", "zh": "如果你只吃肉，不吃蔬菜的话，你的血液就不能好好工作。"}, {"en": "If you eat too many cookies, you can't have dinner.", "zh": "如果你吃太多饼干，你会吃不下晚餐。"}, {"en": "If you eat too many sweets, your teeth will rot!", "zh": "如果你吃太多甜食，你的牙齿会烂掉。"}, {"en": "If you eat too much spicy food, your stomach will hurt.", "zh": "如果你吃太多辣的食物，你的胃会坏掉"}, {"en": "If you don't clean the fruit, you are basically eating all the pesticides.", "zh": "如果你不把水果洗干净，你就会连农药都吃下去。"}, {"en": "The food has expired. Let's throw it away.", "zh": "这食物已经过期了，我们把它丢掉吧。"}, {"en": "Nope! Don't eat it after you drop it on the ground.", "zh": "不可以！不要吃掉到地上的东西。"}, {"en": "Don't drink too much coffee, Mom.", "zh": "妈，不要喝太多的咖啡。"}, {"en": "Don't drink too much beer, Dad.", "zh": "爸，不要喝太多的啤酒。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 22/第22章-16-注意有害的食物.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 22/第22章-16-注意有害的食物.mp3"}]}, "23": {"ch": 23, "name": "运动健身", "sections": [{"ch": 23, "sec": 1, "name": "尿尿", "sentences": [{"en": "I want to pee, Mom.", "zh": "妈~我想尿尿"}, {"en": "OK, I'll be right out!", "zh": "好，我马上出来。"}, {"en": "Do you want to pee?", "zh": "你要尿尿吗？"}, {"en": "I don't need to go.", "zh": "我不用。"}, {"en": "I need to pee.", "zh": "我要尿尿。"}, {"en": "Right now?", "zh": "现在？"}, {"en": "I can't hold it. I need to pee really bad.", "zh": "我忍不住了。我要尿出来了。"}, {"en": "Hold it! Hold it!", "zh": "忍一下！忍住！"}, {"en": "Pee after holding the toilet seat up.", "zh": "把马桶盖掀起来后，再 尿。"}, {"en": "Use toilet paper after you pee.", "zh": "尿完之后，用卫生纸擦干净。"}, {"en": "Hold your skirt up and pee", "zh": "把裙子拉起来尿。"}, {"en": "Make sure the pee doesn't get on the seat.", "zh": "确定尿尿不要溅到马桶盖上。"}, {"en": "Try to pee in the center of the toilet.", "zh": "尽可能尿到马桶中间。"}, {"en": "Did you flush?", "zh": "你冲水了吗？" en": "Make a wish.", "zh": "许愿吧。"}, {"en": "Blow out the candles.", "zh": "把蜡烛吹灭。"}, {"en": "Will you cut the cake and give it to your friends?", "zh": "你要来切蛋糕分给朋友们吗？"}, {"en": "CHAPTER 27-04", "zh": "送生日礼物"}, {"en": "Thanks for coming to my party.", "zh": "谢谢你们来参加我的派对。"}, {"en": "Happy birthday.", "zh": "生日快乐！"}, {"en": "Here's my present. / This is my present for you.", "zh": "这是我送你的礼物。"}, {"en": "I brought this for you.", "zh": "这是我带来给你的。"}, {"en": "Open your presents.", "zh": "打开礼物吧。"}, {"en": "Wow! I really wanted this.", "zh": "哇！我真的很想要这个。"}, {"en": "I really like the present.", "zh": "我真的很喜欢这礼物。"}, {"en": "Have fun. / Have a good time.", "zh": "好好玩哦。"}, {"en": "Wow, this toy car is awesome / fantastic.", "zh": "哇，这玩具车真的很酷。"}, {"en": "I got this from my dad.", "zh": "这是我从爸爸那收到的。"}, {"en": "My dad bought this for me.", "zh": "我爸买这个给我。"}, {"en": "CHAPTER 27-05", "zh": "长辈的生日"}, {"en": "Your grandpa's birthday is coming up this Wednesday.", "zh": "这周三是你爷爷的生日。"}, {"en": "Let's choose a gift for Grandpa.", "zh": "我们来为爷爷选礼物吧。"}, {"en": "What gift would Grandpa like?", "zh": "爷爷会喜欢什么礼物呢？"}, {"en": "I'm going to write a card.", "zh": "我来写卡片。"}, {"en": "The gift is something I drew.", "zh": "礼物是我画的画。"}, {"en": "Grandpa would like that.", "zh": "爷爷会很喜欢那个的。"}, {"en": "I'll make Grandpa's favorite food.", "zh": "我来做爷爷喜欢的食物。"}, {"en": "Put on the same number of candles as Grandpa's age.", "zh": "插上跟爷爷岁数一样的蜡烛。"}, {"en": "Happy birthday, Grandpa!", "zh": "爷爷，祝您生日快乐！"}, {"en": "Thanks, Sweetheart.", "zh": "谢谢，甜心。"}, {"en": "Sing \"Happy Birthday\" for Grandpa.", "zh": "给爷爷唱“生日快乐歌”。"}, {"en": "Be healthy, Grandpa!", "zh": "爷爷，祝您健康长寿！"}, {"en": "Open your gift, please.", "zh": "请打开礼物。"}, {"en": "Grandpa, do you like your gift?", "zh": "爷爷，你喜欢你的礼物吗？"}, {"en": "It took me days to choose your gift.", "zh": "我花了很多天为您选礼物。"}, {"en": "Thank you, Sweetie! I like this very much.", "zh": "甜心，谢谢！我非常喜欢。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 26/第26章-10-寺庙.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 26/第26章-10-寺庙.mp3"}]}, "27": {"ch": 27, "name": "科技数码", "sections": [{"ch": 27, "sec": 6, "name": "过年", "sentences": [{"en": "January 1 is a holiday.", "zh": "月1日是假日。"}, {"en": "We still have time,Mommy.", "zh": "我们还有时间，妈咪。"}, {"en": "The lunar January 1 is also the Chinese New", "zh": "农历的新年又是华人的新年。"}, {"en": "We eat a family reunion dinner on New Year's Day.", "zh": "我们在过年时吃团圆饭。", "audio_rel": "", "audio": ""}, {"en": "Let's go to Grandma's place with our new clothes on to give a big bow to her.", "zh": "我们穿上新衣服去奶奶家给她拜年吧！"}, {"en": "You look prettier with your new clothes on!", "zh": "穿上新衣服后，你看起来更美了！"}, {"en": "Time to give a big bow to the adults!", "zh": "该给大人们拜年了。"}, {"en": "Have a happy new year!", "zh": "新年快乐！"}, {"en": "I wish you good luck this year!", "zh": "希望你有个幸运的一年！"}, {"en": "Here's your red envelop./ Here's your New Year's money.", "zh": "这是新年红包。"}, {"en": "Thanks, Grandpa!", "zh": "爷爷，谢谢您！"}, {"en": "I got 1,000 NT from the red envelop.", "zh": "我收到1千元的红包。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 27/第27章-01-生日邀约.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 27/第27章-01-生日邀约.mp3"}, {"ch": 27, "sec": 7, "name": "中秋节", "sentences": [{"en": "Is it already Mid-Autumn Festival next week?", "zh": "下周就是中秋节了吗？"}, {"en": "Mid-Autumn Festival, Dragon Boat Festival and Chinese New Year are the three most important traditional holidays.", "zh": "中秋节、端午节和过年是三大重要的传统节日。"}, {"en": "Chinese New Year are the three most important traditional holidays.", "zh": "统节日。"}, {"en": "The moon will be round on that day.", "zh": "月亮在当天会很圆。"}, {"en": "Hope the weather will be fine at night.", "zh": "希望晚上的天气很好。"}, {"en": "This pomelo is so big.", "zh": "这颗文旦很大。"}, {"en": "I can't wait to eat mooncakes!", "zh": "我等不及要吃月饼了。"}, {"en": "Let's go outside to have a barbecue party.", "zh": "我们到外面去吃烤肉大餐吧。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 27/第27章-02-参加生日派对.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 27/第27章-02-参加生日派对.mp3"}, {"ch": 27, "sec": 8, "name": "情人节/白色情人节", "sentences": [{"en": "February 14 is Valentine's Day.", "zh": "月14日是情人节。"}, {"en": "A lady gives candy to a man she likes.", "zh": "女生会送巧克力给喜欢的男生。"}, {"en": "Let's prepare some chocolate for Dad.", "zh": "我们来为爸爸准备巧克力吧。"}, {"en": "I'll buy some chocolate to give to my friends.", "zh": "我要买些巧克力送给我的朋友们。"}, {"en": "This chocolate is for Jinhong.", "zh": "这是要给金宏的巧克力。"}, {"en": "I received some candy from my friends.", "zh": "我从朋友们那收到巧克力。"}, {"en": "March 14 is White Day.", "zh": "月14日是白色情人节。"}, {"en": "Boys give candy to girls they like.", "zh": "男生会送糖果给喜欢的女生。"}, {"en": "It's only celebrated in Korea, Japan, and Taiwan.", "zh": "只有在韩国、日本和台湾是这样。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 27/第27章-03-生日派对.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 27/第27章-03-生日派对.mp3"}, {"ch": 27, "sec": 9, "name": "儿童节", "sentences": [{"en": "Yay! Children's Day is coming soon!", "zh": "耶！儿童节要到了。"}, {"en": "What present do you want on Children's Day?", "zh": "在儿童节，你想收到什么礼物？"}, {"en": "I want a new Lego set / a Barbie doll.", "zh": "我想要新的乐高组合玩具/芭比娃娃。"}, {"en": "I want to go to an amusement park.", "zh": "我想去游乐园。"}, {"en": "Grandpa sent you a big present.", "zh": "爷爷给你寄来大礼物了。"}, {"en": "Your aunt and uncle sent some money to you.", "zh": "你的阿姨和叔叔寄了些钱给你。"}, {"en": "Call Grandpa and say thank you.", "zh": "打电话给爷爷说谢谢。"}, {"en": "Do we have any special plans, Mom?", "zh": "妈，我们有什么特别计划吗？"}, {"en": "Well, let's just eat some good food and have fun.", "zh": "嗯，我们去吃些好吃的，开心地玩。"}, {"en": "Happy Children's Day!", "zh": "儿童节快乐！"}, {"en": "I wish every day were Children's Day.", "zh": "我希望天天都是儿童节。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 27/第27章-04-送生日礼物.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 27/第27章-04-送生日礼物.mp3"}, {"ch": 27, "sec": 10, "name": "圣诞节", "sentences": [{"en": "It's almost Christmas.", "zh": "现在是圣诞节了。"}, {"en": "Hooray! It's Christmas.", "zh": "万岁！是圣诞节耶。"}, {"en": "Not yet, Honey. It's December 25.", "zh": "还没，宝贝！那是12月25日。"}, {"en": "I wish for a white Christmas.", "zh": "我希望是个白色圣诞节。"}, {"en": "Let's sing a Christmas carol.", "zh": "我们来唱圣诞歌。"}, {"en": "I love Christmas the most.", "zh": "我最喜欢圣诞节。"}, {"en": "Let's put up our Christmas tree.", "zh": "我们来把圣诞树架起来。"}, {"en": "Shall we decorate the Christmas tree, too?", "zh": "我们也要装饰圣诞树吧？"}, {"en": "Let's put a star on the top.", "zh": "我们在顶端放一颗星星吧。"}, {"en": "We made a wonderful tree for Christmas this", "zh": "今年我们也做了一棵很好看的圣诞树。"}, {"en": "Did you read my Christmas card?", "zh": "你读了我写的圣诞卡了吗？"}, {"en": "Your Christmas card is very touching. Thank you, Honey.", "zh": "你的圣诞卡让人很感动。谢谢你，宝贝 。"}, {"en": "Thank you, Sweetie! I like this very much.", "zh": "甜心，谢谢！我非常喜欢。", "audio_rel": "", "audio": ""}, {"en": "It's Christmas tomorrow. Go to sleep early.", "zh": "明天是圣诞节。早点去睡。"}, {"en": "Oops, I forgot to put up the stockings.", "zh": "啊，我忘记挂袜子了。"}, {"en": "Put them next to the Christmas tree.", "zh": "把它们挂在圣诞树旁边。"}, {"en": "Have you been a good child for the entire year?", "zh": "你这一年都是乖小孩吗？圣诞老公公只"}, {"en": "Santa only visits good kids.", "zh": "拜访乖小孩。"}, {"en": "Look! Santa put a present under the tree!", "zh": "看！圣诞老公公把礼物放在树下了。"}, {"en": "I want to open my present.", "zh": "我要打开我的礼物。"}, {"en": "Santa gave me the gift I wanted.", "zh": "圣诞老公公给了我想要的礼物。"}, {"en": "Mom, does Santa really exist?", "zh": "妈，真的有圣诞老公公吗？"}, {"en": "Of course. That's how you got his present.", "zh": "当然。因此，你才收到礼物。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 27/第27章-05-长辈的生日.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 27/第27章-05-长辈的生日.mp3"}]}, "28": {"ch": 28, "name": "家庭关系", "sections": [{"ch": 28, "sec": 1, "name": "去公园散步", "sentences": [{"en": "Let's go for a walk.", "zh": "我们去散步。"}, {"en": "Want to go for a walk to exercise?", "zh": "要去散步运动一下吗？"}, {"en": "Let's go our to play in the park.", "zh": "我们去公园玩吧。"}, {"en": "Want to ride our bikes at the park?", "zh": "要去公园骑脚踏车吗？"}, {"en": "Wow! There are a lot of people at the park.", "zh": "哇！公园有好多人。"}, {"en": "Say \"hi\" to our neighbors.", "zh": "跟邻居打招呼。"}, {"en": "Want to hold hands?", "zh": "要手牵手吗？"}, {"en": "Make sure you follow me, Honey.", "zh": "宝贝，你要确实跟着我。"}, {"en": "Don't throw trash on the ground.", "zh": "不可以把垃圾丢在地上。"}, {"en": "Don't pick the flowers.", "zh": "不可以摘花。"}, {"en": "Don't break the branches.", "zh": "不可以折树枝。"}, {"en": "Don't step on the grass.", "zh": "不可以踩草地。"}, {"en": "It's great weather for a walk.", "zh": "这天气很适合散步。"}, {"en": "The breeze is really nice.", "zh": "微风真的很棒。"}, {"en": "Mom, let's rest for a little.", "zh": "妈，我们休息一下。"}, {"en": "Mom, my legs hurt.", "zh": "妈，我脚痛。"}, {"en": "I think we came too far.", "zh": "我想我们走太远了。"}, {"en": "Want to go back now?", "zh": "现在要回去了吗？"}, {"en": "I want to stay longer.", "zh": "我想再待一会。"}, {"en": "I know, but it's getting late.", "zh": "我知道，但是越来越晚了。"}, {"en": "Mom, I have to go to the restroom. Where is it?", "zh": "妈，我要上厕所。哪里有厕所？"}, {"en": "The restroom is over there.", "zh": "厕所在那里。"}, {"en": "Want to use this exercise machine?", "zh": "要使用这个运动器材吗？"}, {"en": "I want to ride it, too, Mom.", "zh": "妈，我也要骑。"}, {"en": "Try the one over there. Nobody is using it.", "zh": "你去试试那个。那边没有人用。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 28/第28章-01-去公园散步.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 28/第28章-01-去公园散步.mp3"}, {"ch": 28, "sec": 2, "name": "公厕", "sentences": [{"en": "Let's wait in line.", "zh": "我们来排队。"}, {"en": "Knock on the door before going into the restroom.", "zh": "进厕所前要敲门。"}, {"en": "Don't spit.", "zh": "不要随意吐痰。"}, {"en": "Don't draw on the wall of the restroom.", "zh": "不要在厕所的墙壁乱画。"}, {"en": "Flush the toilet after you are done.", "zh": "你上完之后要冲水。"}, {"en": "Wash your hands well.", "zh": "好好地洗手。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 28/第28章-02-公厕.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 28/第28章-02-公厕.mp3"}, {"ch": 28, "sec": 3, "name": "超市", "sentences": [{"en": "Mommy needs to go grocery shopping.", "zh": "妈咪要去买菜。"}, {"en": "Go get a cart.", "zh": "去拉一台推车过来。"}, {"en": "Let's see the grocery list.", "zh": "我们来看需要购买物品的清单。"}, {"en": "Let's go to the produce corner first.", "zh": "我们先去农产品区。"}, {"en": "Let's buy some fruit.", "zh": "我们买些水果。"}, {"en": "How much is this?", "zh": "这个多少钱？"}, {"en": "Give me 1kg of it.", "zh": "给我1公斤。"}, {"en": "I'll take this.", "zh": "我要这个。"}, {"en": "Put it in the cart.", "zh": "把它放进推车。"}, {"en": "Do you know where I can find the fish?", "zh": "你知道卖鱼的在哪里吗？"}, {"en": "The meat's really cheap / expensive.", "zh": "这肉真的很便宜/贵。"}, {"en": "The pack of ramen is on sale.", "zh": "整袋装的拉面在打折。"}, {"en": "Let's have fish for dinner.", "zh": "我们晚餐吃鱼吧。"}, {"en": "Tonight's dinner is sautéed octopus.", "zh": "今天晚餐的菜单是炒章鱼。"}, {"en": "Check if we forgot anything.", "zh": "确认一下我们有没有忘了什么。"}, {"en": "The cart is full.", "zh": "推车都满了。"}, {"en": "Can we get some snacks?", "zh": "我可以买零食吗？"}, {"en": "I want some meat. Buy some meat, Mom!", "zh": "我想吃肉。妈，买些肉。"}, {"en": "Can I try some bread in the tasting corner?", "zh": "我可以在试吃区试吃面包吗？"}, {"en": "Let's go to the checkout counter.", "zh": "我们去结账吧。"}, {"en": "Get the groceries on the counter.", "zh": "把食物都放在柜台上。"}, {"en": "Can I get a bag?", "zh": "我可以要一个袋子吗？"}, {"en": "Let's put it in the bag.", "zh": "我们把它放进袋子内。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 28/第28章-03-超市.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 28/第28章-03-超市.mp3"}, {"ch": 28, "sec": 4, "name": "餐厅用餐", "sentences": [{"en": "Can we get a menu?", "zh": "可以给我们菜单吗？"}, {"en": "Choose what you want to eat.", "zh": "选你想吃的。"}, {"en": "Did you choose what you want?", "zh": "你选好你想要吃的了吗？"}, {"en": "I want zajangmian and sweet and sour pork.", "zh": "我想吃炸酱面和糖醋肉。"}, {"en": "Hello. May I order now?", "zh": "你好。现在我可以点餐了吗？"}, {"en": "Get me some water, please.", "zh": "请给我些水。"}, {"en": "Can you get it quickly?", "zh": "你可以快点供餐吗？"}, {"en": "How long do I have to wait till the dishes come out?", "zh": "我还要等多久，菜才会出来？"}, {"en": "Can you set the spoons and chopsticks?", "zh": "你能摆一下汤匙和筷子吗？"}, {"en": "Don't goof around in the restaurant.", "zh": "不可以在餐厅胡闹。"}, {"en": "You have food on your lips. Mom will clean it off for you.", "zh": "你的嘴巴上沾到食物了。妈妈帮你擦掉"}, {"en": "Want some more?", "zh": "还要多吃一点吗？"}, {"en": "Mine is good, too. Want to try some?", "zh": "我的也很好吃。你要尝一下吗？"}, {"en": "Mommy will eat the leftovers.", "zh": "剩下的食物给妈妈吃。"}, {"en": "Mom, I spilled my water.", "zh": "妈，我的水溅出来了。"}, {"en": "Can you pack the rest, please?", "zh": "请把剩余的打包起来。"}, {"en": "Can we get the check, please?", "zh": "请给我结账单。"}, {"en": "The dish was too salty / bland.", "zh": "这食物太咸/清淡了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 28/第28章-04-餐厅用餐.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 28/第28章-04-餐厅用餐.mp3"}, {"ch": 28, "sec": 5, "name": "美容室-在家", "sentences": [{"en": "I want my hair done now!", "zh": "我现在就想弄头发！"}, {"en": "Your hair is too long. Let's go to a beauty shop.", "zh": "你的头发太长了。我们去美容室吧。"}, {"en": "It's been a while since your last trim, and your hair is getting long.", "zh": "上次修剪之后，已经有好长时间了。你的头发长很长了。"}, {"en": "I don't want to go to the hair shop.", "zh": "我讨厌去理发厅。"}, {"en": "Your friends will make fun of you if your hair's messy.", "zh": "如果你的头发很杂乱，你的朋友们会取笑你的。"}, {"en": "Since it's hot, do you want your hair short?", "zh": "天气很热，你要剪短吗？"}, {"en": "Want to get a perm?", "zh": "你要烫头发吗？"}, {"en": "How do you want your hair done?", "zh": "你想要怎样做你的头发？"}, {"en": "How can I help you? / What's troubling you?", "zh": "你哪里不舒服？"}, {"en": "I want my hair cut.", "zh": "我想剪头发。"}, {"en": "I want my hair permed.", "zh": "我想烫卷。"}, {"en": "I want my hair ": "这部电影有趣吗？"}, {"en": "Let's watch another movie later, Mom!", "zh": "妈，我们下次再来看电影。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 28/第28章-07-电影院.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 28/第28章-07-电影院.mp3"}, {"ch": 28, "sec": 8, "name": "书店", "sentences": [{"en": "Want to go to the bookstore?", "zh": "要去书店吗？"}, {"en": "Are there any books you wanted to read?", "zh": "有任何你想读的书吗？"}, {"en": "There are a lot of interesting books here.", "zh": "这里有很多有趣的书。"}, {"en": "Look at all the science magazines.", "zh": "看这些科学杂志。"}, {"en": "Pick what you want to read.", "zh": "选你想要读的。"}, {"en": "These are all new books.", "zh": "这些都是新书。"}, {"en": "Which one looks fun to you?", "zh": "哪一本看起来很有趣？"}, {"en": "Want to go over there?", "zh": "要去那边吗？"}, {"en": "Here are the books you wanted!", "zh": "这些是你想要的书！"}, {"en": "Want to read this?", "zh": "想要读读这本吗？"}, {"en": "Where are the dinosaur books?", "zh": "恐龙的书在哪里呢？"}, {"en": "Can you find me the book?", "zh": "你能帮我找出那本书吗？"}, {"en": "Can I read this book here?", "zh": "我可以在这里看吗？"}, {"en": "This is the 4th book in the series.", "zh": "这是这个系列的第4本。"}, {"en": "Can I get this book?", "zh": "我可以买这本吗？"}, {"en": "Do you want a cartoon book again?", "zh": "你要买漫画书吗？"}, {"en": "Let's buy a few English storybooks.", "zh": "我们买些英文故事书吧。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 28/第28章-08-书店.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 28/第28章-08-书店.mp3"}, {"ch": 28, "sec": 9, "name": "图书馆", "sentences": [{"en": "Today's the day we go to the library.", "zh": "今天是我们要去图书馆的日子。"}, {"en": "Let's apply for a library card.", "zh": "我们来申请借书证吧。"}, {"en": "Want to find some books with a computer?", "zh": "要用电脑找书吗？"}, {"en": "How many books can I borrow?", "zh": "我可以借多少本书？"}, {"en": "We can only get 4 books.", "zh": "我们只能借4本。"}, {"en": "Don't rush.Take your time.", "zh": "不用急，慢慢来。"}, {"en": "Mom, read me this book.", "zh": "妈，读这本书给我听。"}, {"en": "Can t's rest for a little bit.", "zh": "我们休息一下吧。"}, {"en": "Want to drink some water from the fountain?", "zh": "要去饮水器那喝点水吗？"}, {"en": "We're finally at the top.", "zh": "我们终于到山顶了。"}, {"en": "We came all the way up here.", "zh": "我们从大老远来到这里。"}, {"en": "Shout hooray!", "zh": "来呐喊一下万岁！"}, {"en": "It was hard at first,but it feels good here at the top.", "zh": "刚开始很累，但是来到山顶后，感觉很棒。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 29/第29章-01-爬山.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 29/第29章-01-爬山.mp3"}, {"ch": 29, "sec": 2, "name": "海边旅行", "sentences": [{"en": "Let's go on a trip to the sea.", "zh": "我们去海边旅行吧。"}, {"en": "Wow, it's the sea!", "zh": "哇，是海耶！"}, {"en": "The beach is very clean.", "zh": "海边好干净。"}, {"en": "The waves are too high!", "zh": "海浪太高了！"}, {"en": "The sand keeps getting in my shoes.", "zh": "沙子一直跑进鞋子内。"}, {"en": "Take off your shoes and go into the sea.", "zh": "脱掉鞋子，去海边吧。"}, {"en": "The water's too cold/salty.", "zh": "水好冰/咸。"}, {"en": "Want to set up the tent here?", "zh": "要在这里搭帐篷吗？"}, {"en": "Let's set a fire!", "zh": "我们来生篝火。"}, {"en": "Go sleep in the tent.", "zh": "去帐篷里面睡。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 29/第29章-02-海边旅行.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 29/第29章-02-海边旅行.mp3"}, {"ch": 29, "sec": 3, "name": "游泳池", "sentences": [{"en": "Shower before you go in the pool.", "zh": "进泳池前，要先冲一下身体。"}, {"en": "Clean up and change into your swimming suit.", "zh": "洗干净之后，换上泳装。"}, {"en": "Don't forget your swim cap and goggles, either.", "zh": "也不要忘记你的泳帽和蛙镜。"}, {"en": "Go to the restroom before getting into the pool.", "zh": "进泳池前，先去上厕所。"}, {"en": "Did you stretch?", "zh": "你做伸展操了吗？"}, {"en": "I'll inflate your inner tube.", "zh": "我会帮你的游泳圈灌气。"}, {"en": "Be careful since the floor is slippery.", "zh": "地板很滑，要小心。"}, {"en": "Don't go into the deep end of the pool.", "zh": "不要去泳池深处的一端。"}, {"en": "Please don't dive.", "zh": "请不要跳水。"}, {"en": "Try not to splash water on others.", "zh": "试着不要让水溅到其他人。"}, {"en": "Don't goof around in the pool.", "zh": "不要在泳池内胡闹。"}, {"en": "Don't make loud noises in the pool.", "zh": "不要在泳池内制造噪音。"}, {"en": "Don't swim right after you eat.", "zh": "刚吃完，不可以马上游戏。"}, {"en": "Go in a little later.", "zh": "等一下再进去。"}, {"en": "Don't stay in the water for too long.", "zh": "不要在水里待太久。"}, {"en": "Your lips are blue.Stay warm for a minute.", "zh": "你的嘴唇变蓝了。先暖一下身体。"}, {"en": "Let me dry you off with a towel.", "zh": "我用毛巾帮你擦干。"}, {"en": "Mom will stick around in the pool area.", "zh": "妈妈会在泳池附近。"}, {"en": "The sun's rays are very strong. Put some sunscreen on.", "zh": "这太阳光太强了。擦些防晒霜吧。"}, {"en": "Do I have to put on sunscreen?", "zh": "我一定要擦防晒霜吗？"}, {"en": "I don't want to put any sunscreen on.", "zh": "我不想擦防晒霜。"}, {"en": "It's sticky.", "zh": "这黏黏的。"}, {"en": "Let's remove the air from your inner tube.", "zh": "我们把游泳圈内的气漏掉吧。"}, {"en": "Dry yourself off before you go into the changing room.", "zh": "你进更衣室之前，要先擦掉身体。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 29/第29章-03-游泳池.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 29/第29章-03-游泳池.mp3"}, {"ch": 29, "sec": 4, "name": "游乐园", "sentences": [{"en": "Let's go to the amusement park.", "zh": "我们进游乐园吧。"}, {"en": "Let's buy tickets for all of the rides.", "zh": "我们去买自由使用所有游乐设施的票。"}, {"en": "I'll get the tickets. Wait here.", "zh": "我去拿票。在这里等。"}, {"en": "Wait in line.", "zh": "排队等。"}, {"en": "Want to ride this?", "zh": "要搭这个吗？"}, {"en": "I want to ride this, Mom.", "zh": "妈，我想要搭这个。"}, {"en": "That looks too scary.", "zh": "那看起来太可怕了。"}, {"en": "You're too short to ride this.", "zh": "你太矮了，不能搭这个。"}, {"en": "Let's go and watch the parade.", "zh": "我们去参观游行。"}, {"en": "The line's too long.Shall we ride something else?", "zh": "队伍太长了。我们去搭其他的好吗？"}, {"en": "I want to ride the merry-go-round.", "zh": "我想要做旋转木马。"}, {"en": "Let's ride the Ferris wheel.", "zh": "我们做摩天轮吧。"}, {"en": "I'm going to ride the roller coaster.", "zh": "我要去做云霄飞车。"}, {"en": "I like the Viking Ride the most. / The Viking Ride is the most fun.", "zh": "海盗船最有趣了。"}, {"en": "I'm dizzy. I think I'm going to throw up.", "zh": "我头晕了。我想我要吐了。"}, {"en": "Let's rest in the shade.", "zh": "我们在阴影下休息吧。"}, {"en": "I want to ride it again.", "zh": "我还想要搭。"}, {"en": "Can I ride it again?", "zh": "我还可以再搭吗？"}, {"en": "I don't want to ride alone.", "zh": "我不想一个人搭。"}, {"en": "Want to ride with Mom?", "zh": "要跟妈咪一起坐吗？"}, {"en": "It's time to close.", "zh": "要闭门了。"}, {"en": "All of the rides are so fun.", "zh": "所有的游乐设施都很好玩。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 29/第29章-04-游乐园.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 29/第29章-04-游乐园.mp3"}, {"ch": 29, "sec": 5, "name": "博物馆/美术馆", "sentences": [{"en": "There's a motor show going on today.", "zh": "我们有个汽车展在正在举办。"}, {"en": "I heard the Snoopy Exhibition is coming up next month.", "zh": "我听说下个月会有史努比的展览会。"}, {"en": "Let's go to the dinosaur museum today.", "zh": "我们今天去恐龙博物馆吧。"}, {"en": "A museum is a place where historic things are displayed.", "zh": "博物馆是展出有历史意义物品的地方。"}, {"en": "Let's go to the art museum today.", "zh": "今天我们去美术馆吧。"}, {"en": "An art museum displays many works of art.", "zh": "美术馆是展出各种美术品的地方。"}, {"en": "Whose work of art is this?", "zh": "这是谁的作品？"}, {"en": "What do you think of this work?", "zh": "你觉得这个作品如何？"}, {"en": "I want to draw something this cool.", "zh": "我也想画出这么棒的画。"}, {"en": "Read this descriptions here.", "zh": "读读这里的说明。"}, {"en": "Listen to what the guide says.", "zh": "好好听导游的说明。"}, {"en": "Don't touch that. Just look at it.", "zh": "不要碰。用看的就好。"}, {"en": "You are not allowed to take photos in the museum.", "zh": "在博物馆内是禁止照相的。"}, {"en": "You should be quiet in the showrooms.", "zh": "你在展区要保持安静。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 29/第29章-05-博物馆、美术馆.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 29/第29章-05-博物馆、美术馆.mp3"}, {"ch": 29, "sec": 6, "name": "照相", "sentences": [{"en": "Let's take a picture here.", "zh": "我们在这里拍张照。"}, {"en": "Want to take a picture with your friend?", "zh": "要跟你的朋友一起照吗？"}, {"en": "Stand next to your friend.", "zh": "站在你朋友的旁边。"}, {"en": "Move back a bit.", "zh": "往后退一点。"}, {"en": "Step ahead a little.", "zh": "往前站一点。"}, {"en": "Move to the left / right a little.", "zh": "往左/右边移一点。"}, {"en": "Everyone, squeeze together.", "zh": "各位，靠在一起。"}, {"en": "Say cheese!", "zh": "说cheese!"}, {"en": "Smile for the camera.", "zh": "请对着镜头微笑。"}, {"en": "Make a big smile, please.", "zh": "请给我一个大大的微笑。"}, {"en": "You look nervous.", "zh": "你看起来很紧张。"}, {"en": "Try to look good.", "zh": "摆出帅气的样子。"}, {"en": "Will you pose for my camera?", "zh": "你可以为我的相机摆个姿势吗？"}, {"en": "Mom,take a picture of Jina and me.", "zh": "妈，帮我跟吉娜照张相。"}, {"en": "I'll take it this time.", "zh": "这次我来照。"}, {"en": "I don't want to talk to you, Mom.", "zh": "妈，我不要跟你说话"}, {"en": "don't want my picture taken, Mom. The camera was shaking. Let's take another picture.", "zh": "相机晃了一下。我们再照一张。"}, {"en": "Wow,it looks great.", "zh": "哇，这张看起来很棒。"}, {"en": "My daughter is photogenic. / My girl looks great in a photo.", "zh": "我女儿很上相。"}, {"en": "Show me the picture.", "zh": "给我看照片"}, {"en": "The picture looks good / bad.", "zh": "这照片拍的很好/不好。"}, {"en": "I‗m not much of a photographer.", "zh": "我不太会照相。"}, {"en": "Let's take a family photo.", "zh": "我们来照全家福。"}, {"en": "Let's ask someone to take a picture of us.", "zh": "我们去请其他人帮我们照。"}, {"en": "Excuse me,but could you take a picture of us?", "zh": "不好意思，可以请您帮我们拍照吗？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 29/第29章-06-照相.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 29/第29章-06-照相.mp3"}]}, "30": {"ch": 30, "name": "学校生活", "sections": [{"ch": 30, "sec": 1, "name": "走路", "sentences": [{"en": "Take a bus today.", "zh": "今天搭公车吧。"}, {"en": "Let's take a taxi!", "zh": "我们搭计程车啦。"}, {"en": "Will you walk to the library today?", "zh": "今天你要走路去图书馆吗？"}, {"en": "How long does it take by walking?", "zh": "走路的话，要花多久时间？"}, {"en": "Abount 20 minutes.", "zh": "分钟左右."}, {"en": "I‘m going to walk today.", "zh": "今天我走路去。"}, {"en": "It's too far to walk.", "zh": "走路的话，太远了。"}, {"en": "Hold my hand and walk.", "zh": "握着我的手走。"}, {"en": "Don't goof around on the street.", "zh": "不可以在街上胡闹。"}, {"en": "We're late. Let's walk faster.", "zh": "我们晚了，走快点。"}, {"en": "I‘m breathless.", "zh": "我很喘。"}, {"en": "We walked too much.Let's rest for a little.", "zh": "我们走太多了，休息一下吧。"}, {"en": "My legs hurt.", "zh": "我腿很痛。"}, {"en": "It's nice to walk ,isn't it?", "zh": "走路很好，不是吗？"}, {"en": "Let's walk our dog, too.", "zh": "我们也遛狗吧。"}, {"en": "We can be healthy if we walk.", "zh": "如果我们走路，会更健康。"}, {"en": "It seems like we came pretty far.", "zh": "我们好像走到相当远"}, {"en": "Want to sing while we walk?", "zh": "想要边走边唱歌吗？"}, {"en": "Want to drink something since it's hot?", "zh": "好热喔，要喝点什么吗？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 30/第30章-01-走路.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 30/第30章-01-走路.mp3"}, {"ch": 30, "sec": 2, "name": "过马路", "sentences": [{"en": "Always be careful of cars when crossing.", "zh": "过马路时，要小心车子。"}, {"en": "you should cross at the crosswalk.", "zh": "你应该走斑马线。"}, {"en": "Stop in front of the crosswalk.", "zh": "要停在斑马线的前面。"}, {"en": "Don't run in the crosswalk.", "zh": "不可以在斑马线上跑。"}, {"en": "Mom, the light is green. Let's go.", "zh": "妈，绿灯了。我们走吧。"}, {"en": "Look to both sides and walk when the light turns green.", "zh": "当变绿灯时，也要看一下左右两侧再走"}, {"en": "Hold your hand up when you cross.", "zh": "当你过马路时，要举起你的手。"}, {"en": "Stop when the green light is flickering", "zh": "当绿灯在闪的时候，要停下来。"}, {"en": "Let's wait for the next light.", "zh": "我们等下一个信号灯吧。"}, {"en": "Don‘t jaywalk", "zh": "不可随便穿越马路。"}, {"en": "There are no lights here.", "zh": "这里没有信号灯。"}, {"en": "Look carefully where there aren't any lights.", "zh": "没有信号灯的地方一定要小心看路。"}, {"en": "Th ut your legs.", "zh": "伸出你的双腿。"}, {"en": "Bend your knees and sit on the floor.", "zh": "弯下膝盖坐在地板上。"}, {"en": "Stomp your foot like this.", "zh": "像这样跺脚。"}, {"en": "Shake your hips,Honey.", "zh": "宝贝，摇动你的屁股。"}, {"en": "Mom's hips are huge!", "zh": "妈的屁股很大！"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 31/第31章-05-身体.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 31/第31章-05-身体.mp3"}, {"ch": 31, "sec": 6, "name": "动物/植物", "sentences": [{"en": "There are two kinds of animals: plant eaters and meat eaters.", "zh": "动物分为两种：草食性和肉食性。"}, {"en": "Human beings are animals, too.", "zh": "人类也是动物。"}, {"en": "Tigers, rabbits, and dogs are mammals.", "zh": "老虎、兔子和狗是哺乳动物。"}, {"en": "They give birth to babies and breast-feed them.", "zh": "它们生出小孩，并且给他们喂奶。"}, {"en": "Birds have wings and lay eggs.", "zh": "鸟有翅膀，还会生蛋。"}, {"en": "Fish have gills and live in the water.", "zh": "鱼有鱼鳃，住在水里。"}, {"en": "Reptiles like alligators are covered with scales and lay eggs.", "zh": "爬虫类如短吻鳄全身用鳞片覆盖，也会生蛋。"}, {"en": "Frogs and toads are amphibians.", "zh": "青蛙和蟾蜍是属于两栖类。"}, {"en": "They live both in water and on land.", "zh": "它们可以住在水里及陆地。"}, {"en": "Animals with wings and six legs are called", "zh": "有翅膀，还有六双脚的动物叫作昆虫。"}, {"en": "Insects like beetles, flies, and cicadas are animals, too.", "zh": "甲虫、苍蝇和蝉等昆虫也是动物。"}, {"en": "What is the difference between an animal and a plant?", "zh": "动物和植物的差别是什么？", "audio_rel": "", "audio": ""}, {"en": "Animals and plants are living things.", "zh": "动物和植物都是生物。"}, {"en": "Animals move, but plants do not move.", "zh": "动物可以动，但植物不会动。"}, {"en": "Mom,what about worms? Are they animals,too?", "zh": "妈妈，寄生虫呢？他们也是动物吗？"}, {"en": "Worms also move, so they are animals.", "zh": "寄生虫也可以动，所以它们也是动物。"}, {"en": "Trees and flowers are called plants.", "zh": "树和花叫做植物。"}, {"en": "Plants have three parts: roots, stems, and leaves.", "zh": "植物有根、茎和叶三部分。"}, {"en": "The roots hold the plant strongly in the soil.", "zh": "根在土里紧紧地抓住植物。"}, {"en": "Plants make food in their leaves.", "zh": "植物用它们的叶子制造养分。"}, {"en": "Plants need sunlight and water to grow.", "zh": "植物需要阳光和水才能成长。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 31/第31章-06-动物、植物.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 31/第31章-06-动物、植物.mp3"}, {"ch": 31, "sec": 7, "name": "日期", "sentences": [{"en": "The calendar shows the date.", "zh": "日历显示日期。"}, {"en": "There are 12 months in a year.", "zh": "一年有12个月。"}, {"en": "A month has 30 or 31 days.", "zh": "一个月有30天或31天。"}, {"en": "Today is the sixth of August.", "zh": "今天是8月6日。"}, {"en": "Then what was the date yesterday?", "zh": "那么，昨天是几号？"}, {"en": "It was August fifth.", "zh": "月5日。"}, {"en": "Then what will be the date tomorrow?", "zh": "那么，明天是几号？"}, {"en": "It will be August seventh.", "zh": "月7号。"}, {"en": "What date will it be five days from today?", "zh": "五天后是几号？"}, {"en": "What did you do the day before yesterday?", "zh": "前天你做了什么？"}, {"en": "We have dinner plans the day after tomorrow.", "zh": "后天我们有晚餐的计划。"}, {"en": "There are two types of calendars: the lunar calendar and the western calendar.", "zh": "日历有两种形态：阴历以及西历(即阳历)"}, {"en": "February 7 is your birthday on the western calendar.", "zh": "月7日是你的阳历生日。"}, {"en": "CHAPTER31-07-tips month", "zh": "说说日期月"}, {"en": "January", "zh": "一月"}, {"en": "February", "zh": "二月"}, {"en": "March", "zh": "三月"}, {"en": "April", "zh": "四月"}, {"en": "May", "zh": "五月"}, {"en": "June", "zh": "六月"}, {"en": "July", "zh": "七月"}, {"en": "August", "zh": "八月"}, {"en": "September", "zh": "九月"}, {"en": "October", "zh": "十月"}, {"en": "November", "zh": "十一月"}, {"en": "December", "zh": "十二月"}, {"en": "March third / the third of March", "zh": "三月三日"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 31/第31章-07-日期.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 31/第31章-07-日期.mp3"}, {"ch": 31, "sec": 8, "name": "星期", "sentences": [{"en": "There are 7 days in a week.", "zh": "一星期有七天。"}, {"en": "From Monday to Friday are the weekdays.", "zh": "从星期一到星期五是平日。"}, {"en": "We call Saturday and Sunday the weekend.", "zh": "我们把星期六和星期日叫做周末。"}, {"en": "What day is it today?", "zh": "今天是星期几？"}, {"en": "Today is Thursday.", "zh": "今天是星期四。"}, {"en": "Yesterday was Wednesday.", "zh": "昨天是星期三。"}, {"en": "Tomorrow will be Friday.", "zh": "明天是星期五。"}, {"en": "What day comes after Monday?", "zh": "星期一之后是星期几？"}, {"en": "It's Tuesday.", "zh": "是星期二。"}, {"en": "I like Friday the most because I can rest the next day.", "zh": "我最喜欢星期五，因为隔天我可以休息"}, {"en": "Monday is the busiest day.", "zh": "星期一是最忙的一天。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 31/第31章-08-星期.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 31/第31章-08-星期.mp3"}, {"ch": 31, "sec": 9, "name": "时间", "sentences": [{"en": "There are 24 hours in a day.", "zh": "一天有24小时。"}, {"en": "The clock shows only 12 hours.", "zh": "时钟只显示12个小时。"}, {"en": "So the hour hand goes around two times a day.", "zh": "因此，时针一天跑两圈。"}, {"en": "The short hand tells you the hour on the clock.", "zh": "时钟的短针告诉你几点。"}, {"en": "The long hand tells you the minute.", "zh": "长针告诉你几分。"}, {"en": "When the hour hand points to 1 and the minute hand points to 12, it's 1 o'clock.", "zh": "当时针指在1，而分针指在12的时候，就是1点。"}, {"en": "1 hour is 60 minutes.", "zh": "一个小时有60分钟。"}, {"en": "1 represents 5 minutes, and 2 represents 10 minutes.", "zh": "代表5分钟，而2代表10分钟。"}, {"en": "It's like skip counting by 5s.", "zh": "这好像以每五分钟来简略计算。"}, {"en": "One second is equal to one blink of an eye.", "zh": "一秒跟眼睛眨一下的时间差不多。"}, {"en": "60 seconds are equal to 1 minute.", "zh": "秒就是1分钟。"}, {"en": "Amazing! Your friends will be surprised to see you.", "zh": "太让人惊讶了！你的朋友看到你，一定会很吃惊的。"}, {"en": "What time is it now?", "zh": "现在几点？"}, {"en": "It's four forty-five.", "zh": "点45分。"}, {"en": "It's fifteen to three.", "zh": "还有15分，就3点了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 31/第31章-09-时间.mp3", "audio_rel": "ht  {"en": "This book looks fun.", "zh": "这本书看起来很有趣。"}, {"en": "Wow, the cover looks pretty. How about this book?", "zh": "哇，封面很漂亮，这本书怎么样？"}, {"en": "That book again?", "zh": "又是那本书？"}, {"en": "Is this book that much fun?", "zh": "这本书有那么有趣吗？"}, {"en": "You chose a book that mommy really likes.", "zh": "你选了一本妈咪真的很喜欢的书。"}, {"en": "This book is too hard / difficult.", "zh": "这本书太难了。"}, {"en": "Hmm, this book is for babies.", "zh": "嗯，这是给小婴儿读的书。"}, {"en": "Why don't you choose another one?", "zh": "你为什么不选其他本呢？"}, {"en": "Look at all the books that you brought!", "zh": "看你拿了这么多的书！"}, {"en": "I'm going to lose my voice.", "zh": "我快失去声音了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-01-选英文童话书.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-01-选英文童话书.mp3"}, {"ch": 33, "sec": 2, "name": "讱故事", "sentences": [{"en": "Now I am going to tell you the story of this book.", "zh": "现在，我要跟你讲这本书的故事了。"}, {"en": "What is the title?", "zh": "书名是什么？"}, {"en": "This book's title is The Elves and the shoemaker.", "zh": "这本书的书名是《小精灵和鞋匠》。"}, {"en": "The authors are the brothers Grimm, and the illustrator is Hannah.", "zh": "作者是格林兄弟，插画家是汉娜。"}, {"en": "Let's look at the cover first. What do you see?", "zh": "我们先看封面。你看到什么？"}, {"en": "I see an old ma, some shoes, and elves, too.", "zh": "我看到一个老人、一些鞋子和精灵。"}, {"en": "so what do you think will happen in the story? Let's find out !", "zh": "那么，你觉得会发生什么故事呢？我们"}, {"en": "Let's find out !", "zh": "来找出来吧！"}, {"en": "Look more closely at the pictures.", "zh": "把图看得更仔细一点。"}, {"en": "I know that srory.", "zh": "我知道那个故事。"}, {"en": "Let's check if this story is one you already know grade.", "zh": "我们来确定一下这个故事是不是你已经知道了。"}, {"en": "What will happen on the next page?", "zh": "下一页，会发生什么事呢？"}, {"en": "Look at the picture. What do you think is happening?", "zh": "看一下图，你觉得正在发生什么事情呢？"}, {"en": "I think the bird will fly away.", "zh": "我想那鸟要飞走了"}, {"en": "Really? I'll read and see if your guess is correct.", "zh": "真的吗？我来读读看你的猜测对不对。"}, {"en": "Bingo! What you said was actually right.", "zh": "结果！你说的是正确的。"}, {"en": "Now, we are done reading the book. Did you guys like it?", "zh": "现在，我们读完这本书了。你们喜欢吗？"}, {"en": "Yes. Read it again, please!", "zh": "是的，请再读一次！"}, {"en": "Which part was the most interesting?", "zh": "哪一个部分最有趣呢？"}, {"en": "It was so fun /sad /boring.", "zh": "太有趣/伤感/无聊了。"}, {"en": "I like when the paper Bag Princess kicked the prince.", "zh": "我喜欢纸袋公主踹王子的那一段。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-02-讲故事.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-02-讲故事.mp3"}, {"ch": 33, "sec": 3, "name": "大声朗读", "sentences": [{"en": "Let's try reading it out loud.", "zh": "我们大声念出来吧。"}, {"en": "You can read it slowly.", "zh": "你可以慢慢地念。"}, {"en": "I will read this page, and you read the other side.", "zh": "我念这一页，你念它的另一面。"}, {"en": "I think I have a sore throat from reading.", "zh": "我念完之后，觉得喉哤痛。"}, {"en": "Your voice does not have to be very loud.", "zh": "你的声音不需要太大声。"}, {"en": "As Iong as you can hear yourseif, it's fine.", "zh": "只要你自已能听得到就好。"}, {"en": "I can't hear you at all.", "zh": "我根本就听不到你念的声音。"}, {"en": "It's okay if you get it wrong. I will help you.", "zh": "错了也没关系，我会帮你。"}, {"en": "I want you to repeat after me as I read line by line.", "zh": "当我一行一行的念，我希望你跟着复诵"}, {"en": "I don't know how to read this word.", "zh": "我不知道这个字怎么念。"}, {"en": "I can't really pronounce it.", "zh": "我发不出这个音。"}, {"en": "Try to sound it out. It starts with an \"1\".", "zh": "你试着发音看看，从[1]开始。"}, {"en": "I will record it and let you listen to it .", "zh": "我帮你录起来给你听。"}, {"en": "If you keep on practicing, you will get better for sure. /Practice makes perfect.", "zh": "如果你持续练习的话，你一定会念得更好。"}, {"en": "If I can't read, I want you to help me", "zh": "如果我念不出来，请帮我。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-03-大声朗读.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-03-大声朗读.mp3"}, {"ch": 33, "sec": 4, "name": "安静阅读", "sentences": [{"en": "I don't want to read the book out loud.", "zh": "我不想要朗读这本书。"}, {"en": "Well, then today you can read silently.", "zh": "那么，今天你就静静地读吧。"}, {"en": "But you srill have to read it thoroughly.", "zh": "不过你还是必须把它读完。"}, {"en": "Mom, I want the house to be quiet.", "zh": "妈，我希望房间保持安静"}, {"en": "Mom, I finished reading one book already.", "zh": "妈，我已经读完一本了。"}, {"en": "Wow, you read that fast?", "zh": "哇，你读得那样快？"}, {"en": "Is there anything that you didn't understand while you were reading ？", "zh": "你读的时候，有什么不懂的地方吗？"}, {"en": "You can always ask me.", "zh": "你随时都可以问我。"}, {"en": "Even if you don't know some words, just keep on reading.", "zh": "就算有些字你不懂，也要继续读下去。"}, {"en": "At the beginning, you might find it hard to read books silently.", "zh": "刚开始，你或许会发现很难安静地读书"}, {"en": "You will get used to it very soon.", "zh": "你很快就会习惯。"}, {"en": "Pay attention to the pictures, too. They all look interesting.", "zh": "你也要好好看图，它们看起来都很有趣"}, {"en": "Think about what the story is about as you are reading the book.", "zh": "你一边读的时候，要一边想这是关于什么的故事。"}, {"en": "It seems like you're not paying attention.", "zh": "你好象没有集中精神。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-04-安静阅读.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-04-安静阅读.mp3"}, {"ch": 33, "sec": 5, "name": "理解单字的意思", "sentences": [{"en": "Is there any word that you don't know on this page?", "zh": "在这页，你有不懂的单字吗？"}, {"en": "Do you remember this word?", "zh": "你记得这个字吗？"}, {"en": "I remember seeing this word in another book.", "zh": "我记得这个字在其他书中也出现过。"}, {"en": "Oh! I know that word! I've heard it.", "zh": "喔！我知道那个字！我曾经听过。"}, {"en": "Is this your first time to see this word?", "zh": "这是你第一次看到这个字吗？"}, {"en": "Let's take a look at the new words once more.", "zh": "我们在看一次新的单字"}, {"en": "Should we mark the words that you learned today?", "zh": "我们要标记一下你今天学的单字吗？"}, {"en": "Mommy will write the words on the blackboard.", "zh": "妈妈会在黑板上写下这引起单字。"}, {"en": "What does it mean in the story, Mom?", "zh": "妈，它在故事里面是什么意思？"}, {"en": "Try to guess its meaning.", "zh": "试着猜它的意思。"}, {"en": "Try to guess its meaning by looking before and after the word.", "zh": "透过这个单字的前后文猜猜它的意思。"}, {"en": "Let's look it up in the dictionary.", "zh": "我们用字典查一下。"}, {"en": "Do you want to look it up in the dictionary?", "zh": "你想要用字典查吗？"}, {"en": "That word means \"strong\".", "zh": "那单字的意思是【强壮】。"}, {"en": "Mom, its meaning is different from what I learned before.", "zh": "妈，那个意思跟我之前学的不一样。"}, {"en": "The word has several meanings.", "zh": "这个单字有几种意思。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-05-理解单词的意思.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-05-理解单词的意思.mp3"}, {"ch": 33, "sec": 6, "name": "描述故事情节", "sentences": [{"en": "Who is the main character of the story?", "zh": "这个故事的主人公是谁？"}, {"en": "The main characters are Hansel and Gretel.", "zh": "主人公是什Hansel和Gretel。"}, {"en": "What is the kid doing, and where is he doing it ?", "zh": "那个小孩在做什么，他是在哪里做？"}, {"en": "Why did he act that way ?", "zh": "为什么他那样做？"}, {"en": "What happened in the beginning?", "zh": "刚开始，发生了什么事？"}, {"en": "Why did that happen?", "zh": "为什么会发生那样的事？"}, {"en": "What happened in the middle of the story?", "zh": "故事的中间发生了什么事？"}, {"en": "Now Iet's see the results of that action.", "zh": "现在，我们来看看那样做的结果。"}, {"en": "How would he have felt in this situation?", "zh": "这样的情况下，他的心情如何/"}, {"en": "What would you have done if that were you ?", "zh": "如果是你的话，你会怎么做？"}, {"en": "I don't think I would have done that if I were him.", "zh": "如果我是他的话，我想我不会那样做。"}, {"en": "After that, what happened?", "zh": "接下来，发生了什么事？"}, {"en": "What do you think will happen in the end?", "zh": "你觉得最后会怎样发展？"}, {"en": "What happened at the end of the story?", "zh": "故事的最后发生了什么事/"}, {"en": "How would you like the story to end ?", "zh": "你希望故事怎样结束？"}, {"en": "How is the problem solved?", "zh": "问题是如何解决的？"}, {"en": "The main character overcame the difficulty / challenge.", "zh": "主人公克服了困难/挑战。"}, {"en": "The problem was solved when they found the lost key.", "zh": "当他们找到遗失的钥匙，问题就解决了"}, {"en": "I'm so relieved that the story ended happily.", "zh": "我很欣慰是个幸福的结局。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-06-描述故事情节.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-06-描述故事情节.mp3"}, {"ch": 33, "sec": 7, "name": "谈谈登场人物", "sentences": [{"en": "Let's see what characters are in this book.", "zh": "我们看看这本书有什么角色"}, {"en": "An animal is the main character of this book.", "zh": "动物是这本书的主人公"}, {"en": "What is the girl doing?", "zh": "那个女孩在做什么"}, {"en": "Why was the boy mad in this part?", "zh": "这一段，为什么男孩生气了？"}, {"en": "What kind of person is he?", "zh": "他是个怎么样的人？"}, {"en": "What's your favorite food？", "zh": "你最喜欢的食物是什么？"}, {"en": "I like Kipper the most.", "zh": "我最喜欢Kipper。"}, {"en": "How old is Arthur? Arthur", "zh": "几岁了？"}, {"en": "Mom, Nate always eats pancakes.", "zh": "妈，Nate总是吃薄煎饼。"}, {"en": "How come the fly talk?", "zh": "苍蝇为何能说话？"}, {"en": "Well, in books, animals can talk with one another.", "zh": "嗯，在书中动物可以彼此交谈。"}, {"en": "Mom, I think this boy is really silly.", "zh": "妈，我觉得这男孩真傻。"}, {"en": "Mom, where is this child's mother?", "zh": "妈，这孩子的妈妈在哪里？"}, {"en": "Does he/she live alone?", "zh": "他/她一个人生活吗？"}, {"en": "How come the princess is so ugly?", "zh": "公主怎么会那么凶呢？"}, {"en": "There are several main characters in this book.", "zh": "这本书有好几位主人公。"}, {"en": "I think DW is more like the main character than Arthur.", "zh": "我想DW比Arthur更像主人公。"}, {"en": "What does the main character look like?", "zh": "主角看起来像什么？"}, {"en": "What did the main character do?", "zh": "主角做了什么？"}, {"en": "Where, and with whom, does the main character live?", "zh": "主角在哪里，和谁住在一起？"}, {"en": "How did his feelings change throughout the book?", "zh": "随着故事 的发展，他的心情是怎么改变的？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-07-谈谈登场人物.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-07-谈谈登场人物.mp3"}, {"ch": 33, "sec": 8, "name": "听 CD", "sentences": [{"en": "Please listen carefully.", "zh": "请仔细听。"}, {"en": "Concentrate and listen to the story.", "zh": "集中精神听故事。"}, {"en": "You will hear a story from the CD.", "zh": "你会从CD中听到故事。"}, {"en": "Look at the words as you are listening to it.", "zh": "一边听一边看着这些字。"}, {"en": "You can point to the words with your finger while listening.", "zh": "你可以边听边用手指头指着这些字。"}, {"en": "Okay, I'll play the CD then.", "zh": "好，那么我播放CD罗。"}, {"en": "Think about the story while you are listening.", "zh": "边听边想想看这是什么故事。"}, {"en": "I want to listen to it one more time.", "zh": "我想再听一次。"}, {"en": "Can you play the last few seconds again? / Can you play that last minute again?", "zh": "你能把最后的那几秒再播放一遍吗？"}, {"en": "Can you go back and play the last track?", "zh": "你能回去播放上一节吗？"}, {"en": "Mom, can you stop the CD for a minute?", "zh": "妈，你能暂停一下CD吗？"}, {"en": "I don't know where to read because the person is speaking too fast.", "zh": "那个人读得太快，我不知道该看哪里了"}, {"en": "Turn the page. It's on the middle part.", "zh": "翻这一页，这是中间的部分。"}, {"en": "It's the 5th line from the bottom / top.", "zh": "从下面/上面算来第五行。"}, {"en": "The voice sounds really funny. Haha!", "zh": "那个声音真的很好笑。哈哈！"}, {"en": "It's too difficult. Iwant to listen to a different one.", "zh": "这太难了。我想听其他的。"}, {"en": "I want you to read the book to me.", "zh": "我想要你念这本书给我听。"}, {"en": "Do you want me to put the headphones on you?", "zh": "你想要我帮你戴耳机吗？"}, {"en": "Are you doing fine listening to the story?", "zh": "你在好好听故事吗？"}, {"en": "Mommy finds this part to be the most fun, too.", "zh": "妈咪也觉得这部分最有趣了。"}, {"en": "You missed that part.", "zh": "你错过了那个部分罗。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-08-听唱片.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-08-听唱片.mp3"}, {"ch": 33, "sec": 9, "name": "阅读后的活动", "sentences": [{"en": "How was the book?", "zh": "这本书如何？"}, {"en": "It was moving / fun / just okay.", "zh": "很感动/有趣/一般。"}, {"en": "Was it too difficult for you?", "zh": "对你来说，太难了吗？"}, {"en": "I understood most of it.", "zh": "我几乎都能懂。"}, {"en": "I don‘t know what the story is about.", "zh": "我不知道故事内容是什么。"}, {"en": "Do you want to talk about the story with Mommy?", "zh": "你想跟妈咪讲讲这个帮事吗？"}, {"en": "Let's make a jack-o'-lantern together", "zh": "我们一起来做杰克灯吧。"}, {"en": "Mom, let me tell you what the story is about.", "zh": "妈，我跟你说这个故事在讲什么。"}, {"en": "Do you want to try writing a book report?", "zh": "你要讲着写读书心得吗？"}, {"en": "Let‘s write a letter to the main character.", "zh": "我们写封信给主人公吧。"}, {"en": "Want to change the words?", "zh": "你要不要改变一下歌词？"}, {"en": "Write in your reading log since you‘re done reading it.", "zh": "既然你都读完了，就写在阅读记录表上"}, {"en": "I‘ve read 200 books so far.", "zh": "到目前为止，我读了200本书。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 33/第33章-09-阅读后的活动.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 33/第33章-09-阅读后的活动.mp3"}]}, "34": {"ch": 34, "name": "超市购物", "sections": [{"ch": 34, "sec": 1, "name": "选英文影片", "sentences": [{"en": "Mom, it‘s time to watch a DVD!", "zh": "妈，是看DVD的时间了！"}, {"en": "Mom, can I watch a DVD?", "zh": "妈，我可以看DVD吗？"}, {"en": "What DVD do you want to watch today?", "zh": "今天你要看什么DVD?"}, {"en": "Want to watch the new one that we recently bought?", "zh": "你要看最近我们新买的那片吗？"}, {"en": "Why don‘t you pick one by yourself?", "zh": "自己选一片，如何？"}, {"en": "Please play Caillou.", "zh": "请播放《Caillou》。"}, {"en": "I want to watch the Magic School Bus .", "zh": "我要看《Magic School Bus》。"}, {"en": "Do you want me to choose it for you?", "zh": "你要我帮你选吗？"}, {"en": "You have watched it too many times.", "zh": "那个你已经看过很多次了。"}, {"en": "Why don‘t you try to choose another one?", "zh": "试着选其他的看，如何？"}, {"en": "Can I see two DVDs today?", "zh": "今天我可以看两片DVD吗？"}, {"en": "Well, you know that watching too much TV is not good for you.", "zh": "哦，你知道看太多电视对你不好。"}, {"en": "Can I watch it again?", "zh": "我可以再看一次吗？"}, {"en": "I want to watch the one that I saw yesterday.", "zh": "我想看我昨天 看的那一片。"}, {"en": "It‘s my turn to choose the DVD because Minsu picked his favorite yesterday.", "zh": "因为昨天民肃选了他喜欢的，这次轮到我选DVD了。"}, {"en": "We‘ll watch the DVD for 30 minutes only. Okay?", "zh": "我们只看30分钟的DVD，知道吗？"}, {"en": "I like the Disney animations the most.", "zh": "我最喜欢迪士尼的卡通了。"}, {"en": "I want the English subtitles.", "zh": "我要有英文字幕的。"}, {"en": "Can I watch it with the subtitles on?", "zh": "我可以打开字幕看吗？"}, {"en": "Let‘s watch it without any subtitles.", "zh": "我们来看没有字幕的。"}, {"en": "You can watch it this time only.", "zh": "你只能看这一次。"}, {"en": "Well, let‘s stop here today.", "zh": "嗯，我们今天就到这吧。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 34/第34章-01-选英文影片.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 34/第34章-01-选英文影片.mp3"}, {"ch": 34, "sec": 2, "name": "播放 DVD", "sentences": [{"en": "Mom, how do I play the DVD?", "zh": "妈，我要怎么播放DVD?"}, {"en": "I will show you how, so watch carefully.", "zh": "我示范给你看，仔细看好。"}, {"en": "Let‘s try to control it with the remote control.", "zh": "我们试着用遥控器来操作。"}, {"en": "Place the DVD into the player.", "zh": "把DVD放进播放器内。"}, {"en": "Handle it by inserting your index finger into the center hole.", "zh": "把你的食指放入中间的洞来拿着。"}, {"en": "If DVDS get scratched, they can be broken.", "zh": "如果DVD被刮伤了，它们会被弄坏。"}, {"en": "Mom, I want to play the DVD by myself.", "zh": "妈，我想要自己播放DVD。"}, {"en": "Okay, sure. Give it a try!", "zh": "好，可以。你试试！"}, {"en": "Put the lid back and push the play button.", "zh": "盖上盖子后，按下播放键。"}, {"en": "Change the TV into ‖outside input‖ mode.", "zh": "把电视转到“外部输入”的模式。"}, {"en": "Mom, it does not work. / it‘s not working.", "zh": "妈，它不动耶。"}, {"en": "I saw this part already. Please skip the movie to the next part.", "zh": "我已经看过这部分了，请跳到下一部分"}, {"en": "It‘s too loud. Please turn it down.", "zh": "声音太大了。请转小声。"}, { {"en": "I was so excited today.", "zh": "今天我很兴奋。"}, {"en": "Playing tag was really fun.", "zh": "玩捉迷藏真的很有趣。"}, {"en": "Today is such a fantastic day!", "zh": "今天是这么棒的一天！"}, {"en": "I hope every day will be like today.", "zh": "我希望每天都可以像今天这样。"}, {"en": "I am so happy my mom bought me new pants.", "zh": "我妈买了新的裤子给我，我好开心。"}, {"en": "I was so happy that I jumped up and down.", "zh": "我太开心了，所以我蹦蹦跳跳地。"}, {"en": "I will never forget today.", "zh": "我绝对忘不了今天。"}, {"en": "I‘m very happy because I got a perfect score on my test.", "zh": "因为我考试考了满分，所以我很开心。"}, {"en": "I was laughing to death.", "zh": "我笑死了。"}, {"en": "It was my first time to ride on a train, and I felt amazing.", "zh": "这次我第一次搭火车，我感到很惊奇。"}, {"en": "I feel terrible.", "zh": "我心情很差。"}, {"en": "I‘m really distressed.", "zh": "我真的很伤心。"}, {"en": "I fought with my friend.", "zh": "我和朋友打架了。"}, {"en": "I lost my money.", "zh": "我把钱弄不见了。"}, {"en": "I got annoyed at everything.", "zh": "我对所有事情都感到很烦。"}, {"en": "The toy that I like the most is broken.", "zh": "我最喜欢的玩具坏了。"}, {"en": "I am worried that I might not be able to get it fixed.", "zh": "我担心我可能无法把它修好。"}, {"en": "A big kid hit me in the back at school.", "zh": "在学校有个高大的小孩打我的背。"}, {"en": "I had to force myself not to cry. / I tried not to cry very hard.", "zh": "我必须强迫自己不要哭。/我试着不要哭太大声。"}, {"en": "I feel sorry for my brother because I got mad at him.", "zh": "我对我弟弟感到很抱歉，因为我对他发脾气了。"}, {"en": "I am very depressed because I got scolded by Mom.", "zh": "我蜚常郁闷，因为我被妈妈责备了。"}, {"en": "I was very sad because my friend moved away.", "zh": "因为我朋友搬家了，所以我很伤心。"}, {"en": "I feel bad and sad about not winning the prize.", "zh": "我对于没有得奖感 到又伤心又难受。"}, {"en": "I wanted to hit my sister so much.", "zh": "我真的很想打我姐姐。"}, {"en": "I could not go out today because of the rain.", "zh": "因为下雨，我今天不能出门。"}, {"en": "So many bad things kept happening today.", "zh": "今天一直发生很多坏事。"}, {"en": "My heart was aching so much because my fish died.", "zh": "我的心很痛，因为我的鱼死了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 35/第35章-02-英文日记.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 35/第35章-02-英文日记.mp3"}]}, "36": {"ch": 36, "name": "医院诊所", "sections": [{"ch": 36, "sec": 1, "name": "宣布怀孕的消息", "sentences": [{"en": "I have some really good news for you.", "zh": "我有个好消息要告诉你。"}, {"en": "Mom is having a baby!", "zh": "妈妈有小宝宝了！"}, {"en": "Mommy has a baby here.", "zh": "妈咪这里有小宝宝。"}, {"en": "You will have a baby brother or sister soon.", "zh": "你很快就会有个弟弟或妹妹了。"}, {"en": "You‘re going to be a big sister.", "zh": "你要当姐姐了。"}, {"en": "The baby will look exactly like you.", "zh": "小孩会看起来跟你很像。"}, {"en": "Wow, am I going to be a big sister now?", "zh": "哇！我现在要当姐姐了吗？"}, {"en": "Now I have a baby brother!", "zh": "现在，我也有弟弟了！"}, {"en": "Now I have a baby sister!", "zh": "现在，我也有妹妹了！"}, {"en": "I've always wanted to go there.", "zh": "我一直很想去那里。"}, {"en": "Are you going to play well with your baby brother or sister?", "zh": "你会跟你的弟弟或妹妹好好玩吧。"}, {"en": "I will be nice to the baby.", "zh": "我会对小宝宝很好的。"}, {"en": "I will share my toys with my brother or sister.", "zh": "我会把我的玩具分给弟弟或妹妹玩。"}, {"en": "Let‘s call Grandma and tell her the good news!", "zh": "我们给奶奶打电话，告诉她这个好消息"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 36/第36章-01-宣布怀孕的消息.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 36/第36章-01-宣布怀孕的消息.mp3"}, {"ch": 36, "sec": 2, "name": "是妹妹？还是弟弟？", "sentences": [{"en": "What‘s the baby‘s name?", "zh": "小孩的名字是什么？"}, {"en": "We haven‘t decided yet. Let‘s just call it Rabbit for now.", "zh": "我们还没有决定。现在我们先叫他“兔兔“吧。"}, {"en": "The baby‘s pre-birth name is Button.", "zh": "小宝宝的胎名是“钮扣”。"}, {"en": "Do you want a baby sister or brother?", "zh": "你想要妹妹，还是弟弟？"}, {"en": "I want a pretty baby sister.", "zh": "我想要美丽的妹妹。"}, {"en": "What do you like for your baby brother‘s name?", "zh": "你想要你的弟弟叫什么名字？"}, {"en": "I think Wensu will be a good name.", "zh": "我想文宿是个好名字。"}, {"en": "I want to call him Wensu.", "zh": "我想叫他文宿。"}, {"en": "Make sure you don't only love the baby. Okay?", "zh": "你保证不可以只疼小宝宝，好吗？"}, {"en": "Both of you are our children, so I will love both of you equally.", "zh": "你们两个都是我的小孩，所以你们两个我都爱。"}, {"en": "Of course! Mom loves Songjin the most. The baby is the next.", "zh": "当然！妈妈最爱宋锦了，然后才是小宝宝。"}, {"en": "Is there a baby inside Mummy's tummy?", "zh": "妈咪的肚子里面有个小宝宝吗？"}, {"en": "The baby will be growing in my tummy for the next ten months.", "zh": "接下来是个月小宝宝会在妈妈的肚子里面长大。"}, {"en": "So I need help from you from now on.", "zh": "所以，从现在起我需要你的帮忙。"}, {"en": "Don't worry, Mom. I will help you out with all the hard work.", "zh": "妈咪，不用担心，我会帮你做所有辛苦的事情。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 36/第36章-02-是妹妹？还是弟弟？.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 36/第36章-02-是妹妹？还是弟弟？.mp3"}, {"ch": 36, "sec": 3, "name": "谈预产期", "sentences": [{"en": "I have to see my doctor for a regular checkup today.", "zh": "我今天要去看医生做定期检查。"}, {"en": "When is the baby due?", "zh": "小宝宝何时出来？"}, {"en": "How many days are left till the due date?", "zh": "离预产期还有多少天？"}, {"en": "Why isn't the baby coming out yet?", "zh": "为什么小宝宝还没出来？"}, {"en": "Well, it's still far away.", "zh": "是呀，还久呢。"}, {"en": "You have to wait a long time.", "zh": "你还要等一段时间。"}, {"en": "It seems like he's /she's not ready to see the world.", "zh": "听起来，他\\她还没有做好来世界的准备"}, {"en": "The baby will be born in a month.", "zh": "小宝宝会在一个月后出生。"}, {"en": "Fifteen days are left till the baby's due date.", "zh": "离预产期还有15天。"}, {"en": "In a week or so, the baby will come out.", "zh": "大约再过一周，小宝宝就要出来了。"}, {"en": "It's almost time for the baby to come.", "zh": "小宝宝出生的时间快到了。"}, {"en": "In a few days, you will meet your baby brother.", "zh": "再过几天，你就会看到你的弟弟了。"}, {"en": "Tommorow is the due date for the baby.", "zh": "明天就是宝宝的预产期了。"}, {"en": "Well, the due date has passed, but the baby is still not coming out.", "zh": "哎呀，预产期已经过了，但是小宝宝还是没有出来。"}, {"en": "I can't wait to see my baby brother.", "zh": "我等不及跟我的弟弟见面了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 36/第36章-03-谈预产期.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 36/第36章-03-谈预产期.mp3"}, {"ch": 36, "sec": 4, "name": "对肚子内的小宝宝说话", "sentences": [{"en": "Hi, baby. This is your Mommy.", "zh": "嗨，小宝宝，我是妈咪。"}, {"en": "Sweetie, do you hear Mommy's voice?", "zh": "甜心，你听到妈妈的声音了吗？"}, {"en": "Mummy and Daddy are so happy to have you.", "zh": "妈咪和爸比都很开心有了你。"}, {"en": "Whenever I think of you, I feel so happy.", "zh": "每当我想起你的时候，我都感到很幸福"}, {"en": "You are Mummy and Daddy's gift and joy.", "zh": "你是妈妈和爸爸的礼物和喜悦。"}, {"en": "Mummy and Daddy can't wait to see you.", "zh": "妈咪和爸比都很想快点儿见到你。"}, {"en": "You can't also wait to see Mummy and Daddy?", "zh": "你也等不及想见到妈咪和爸比吧？"}, {"en": "Mummy is going to sing you a song.", "zh": "妈妈唱歌给你听。"}, {"en": "This is Mummy's favorite song. Listen to it.", "zh": "这是妈妈最喜欢的歌，好好听。"}, {"en": "Mummy will read you a story.", "zh": "妈妈读故事给你听。"}, {"en": "Mummy will tell you a story.", "zh": "妈妈告诉你一个故事。"}, {"en": "Oh, Sweetie,you're kicking now! Wow, look at how strong you are.", "zh": "喔，甜心，你现在在踢呢！哇，看看你多强壮啊！"}, {"en": "Mommy is eating the delicious strawberries for you. Aren't they dilicious?", "zh": "妈妈为了你在吃很好吃的草莓。它们不是很好吃吗？"}, {"en": "Mommy is listening to some beautiful songs now. Can you hear them? My dear baby brother, I can't to wait to see you,", "zh": "妈妈正在听好听的歌，你能听到吗？"}, {"en": "Can you hear them? My dear baby brother, I can't to wait to see you, too.", "zh": "亲爱的弟弟，我也迫不及待地想见你。"}, {"en": "When we meet, let's play soccer and some games together.", "zh": "当我们见面后，我们一起踢足球和玩游戏吧。"}, {"en": "I will take good care of you, I promise.", "zh": "我会好好照顾你的，我发誓。"}, {"en": "When you come out. I will play with you every", "zh": "你出生后，我会每天陪你玩。"}, {"en": "Don't give Mummy a hard time, Okay?", "zh": "不要让妈妈太辛苦，好吗？"}, {"en": "Be nice to Mummy, dear brother!", "zh": "要好好地对妈咪，亲爱的弟弟！"}, {"en": "I look forward to seeing you very much!", "zh": "我非常期待见到你！"}], "audio": "Q00  one family.", "zh": "现在，我们是一家人了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 36/第36章-06-双胞胎.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 36/第36章-06-双胞胎.mp3"}]}, "37": {"ch": 37, "name": "公园游乐", "sections": [{"ch": 37, "sec": 1, "name": "喂牛奶", "sentences": [{"en": "It's time for some milk.", "zh": "该喝牛奶了。"}, {"en": "Are you hungry? Doyou want some milk,", "zh": "你饿了吗？甜心，你喝牛奶吗？"}, {"en": "Okay, okay. Mommy will feed you very soon.", "zh": "好，好，妈咪马上喂你。"}, {"en": "Mommy will mix a bottle. Just wait for a second. Okay?", "zh": "妈妈这就调牛奶。稍等一下，知道吗？"}, {"en": "Mummy will nurse you soon.", "zh": "妈妈马上给你喂奶。"}, {"en": "It looks like you were in a rush.", "zh": "看起来，你很急。"}, {"en": "Were you hungry? Drink the milk and grow well.", "zh": "你饿了吗？喝奶快快长大喔。"}, {"en": "Oh, that hurts. Don't bite Mommy!", "zh": "啊，好痛，不要咬妈妈。"}, {"en": "It is too hard to suck Mom's breast?", "zh": "吸母乳很难吧？"}, {"en": "Okay. We'll take a break for a second.", "zh": "好，我们休息一下。"}, {"en": "Look at you! You are eating very well.", "zh": "看看你！你很会吃喔！"}, {"en": "Why don't you have a little bit more?", "zh": "为什么你不再多吃一点呢？"}, {"en": "Oh, you want to stop? Are you full now?", "zh": "喔，你不吃了吗？你饱了吗？"}, {"en": "Is too much milk coming out? You are coughing!", "zh": "太多母乳出来吗？你在咳嗽！"}, {"en": "The milk won't come out well? Soryy. My breast milk is not coughing!", "zh": "母乳出来的不顺吗？抱歉，我的母乳不太够。"}, {"en": "See how Mummy nurses our baby.", "zh": "看妈妈怎样喂宝宝。"}, {"en": "You were just like this years ago.", "zh": "几年前，你也是这样。"}, {"en": "Okay, baby, now you need to burp.", "zh": "好，宝宝，现在你需要打嗝。"}, {"en": "Let me help you burp.", "zh": "我来帮你打嗝。"}, {"en": "Mummy will gently pat your back.", "zh": "妈妈轻轻地拍你的背。"}, {"en": "Wow, you did it!", "zh": "哇，你做到了。"}, {"en": "Gosh, you threw up!", "zh": "哎呀，你吐了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-01-喂牛奶.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-01-喂牛奶.mp3"}, {"ch"
