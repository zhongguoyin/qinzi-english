 "Doesn't the water feel nice and warm? Or is it not warm enough?", "zh": "这水是不是又棒又温暖呢？还是不够热？"}, {"en": "Let's play with the toy duck. Quack, quack!", "zh": "我们跟鸭子玩具一起玩吧。呱呱！"}, {"en": "Why don't you paddle your feet? Splash! Splash!", "zh": "你何不用脚划水呢？划牙，划呀！"}, {"en": "Let's wash your hair first.", "zh": "我们先洗头发吧。"}, {"en": "Mommy will make some bubbles with the shampoo.", "zh": "妈妈把洗发精搓成泡泡。"}, {"en": "Let's wash it with some clean water.", "zh": "我们用些干净的水来洗。"}, {"en": "This slippery thing is called soap.", "zh": "这个滑滑的东西叫做肥皂。"}, {"en": "Now, let's wash your face and rub your body.", "zh": "现在，我们来洗脸和身体。"}, {"en": "Do your eyes hurt?", "zh": "眼睛很刺痛吗？"}, {"en": "Mommy will rinse it off quickly.", "zh": "妈妈很快冲掉它。"}, {"en": "Okay, now let's wash off all the soap.", "zh": "好，现在我们来把肥皂洗掉。"}, {"en": "It's all done. Let me dry you off with a towel.", "zh": "都洗好了。我来用毛巾把你擦干。"}, {"en": "You are even prettier /more handsome after a bath.", "zh": "洗完澡后，你变得更漂亮/帅了。"}, {"en": "Do you feel clean, baby?", "zh": "宝贝，你觉得干净吗？"}, {"en": "Now that we have taken a bath, how do you feel?", "zh": "现在我们洗完澡了，你觉得如何？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-03-洗澡.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-03-洗澡.mp3"}, {"ch": 37, "sec": 4, "name": "抱/背", "sentences": [{"en": "Do you want me to hold you?", "zh": "你要妈妈抱吗？"}, {"en": "Do you want me to give you a piggy-back ride?", "zh": "你要妈妈背吗？"}, {"en": "Come here, Sweetie. Let me give you a piggy- back ride.", "zh": "甜心，过来，妈妈背你。"}, {"en": "Mommy will bring the baby strap.", "zh": "妈咪去拿婴儿背带。"}, {"en": "Mummy will hold you with the baby carrier.", "zh": "妈咪用婴儿背带抱你。"}, {"en": "How is it? Are you comfortable?", "zh": "怎么样？你觉得舒服吗？"}, {"en": "Is there anything that's bothering you?", "zh": "有什么东西让你不舒服吗？"}, {"en": "Just lean on Mummy.", "zh": "靠着妈妈就好。"}, {"en": "Sweetie, do you like riding on Mummy's back?", "zh": "甜心，你喜欢让妈妈背吗？"}, {"en": "Why don't you sleep on Mummy's back?", "zh": "在妈妈的背上睡觉，好吗？"}, {"en": "Can you hear Mummy's hearbeat?", "zh": "你能听到妈妈的心跳吗？"}, {"en": "Do you want to come down now?", "zh": "你现在想下来了吗？"}, {"en": "Why don't you get down? Mummy's arms hurt.", "zh": "你何不下来呢？妈妈的手臂疼了。"}, {"en": "Want to stay on Mummy's back for a little longer?", "zh": "你要在妈妈的背上多呆一会吗？"}, {"en": "Okay, let me put you down now.", "zh": "好，现在让你下来。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-04-抱、背.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-04-抱、背.mp3"}, {"ch": 37, "sec": 4, "name": "抱/背-婴儿用品的名称", "sentences": [{"en": "baby carrier baby sling baby car seat baby car seat crib baby stroller baby swing seat", "zh": "我们经常使用的婴儿背带，可以把婴儿固定在前面或后面。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-05-哄宝宝睡觉.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-05-哄宝宝睡觉.mp3"}, {"ch": 37, "sec": 5, "name": "哄宝宝睡觉", "sentences": [{"en": "It's time for a nap.", "zh": "该睡午觉了。"}, {"en": "Why are you crying? Are you sleepy?", "zh": "你为什么哭，你想睡了吗？"}, {"en": "You are starting to whine.", "zh": "你开始哀哀叫了。"}, {"en": "Are you tired? I think it's time to sleep.", "zh": "你累了吗？我想你该睡觉了。"}, {"en": "Come here. Mummy will put you to sleep.", "zh": "来这里，妈咪哄你睡。"}, {"en": "Do you want to lie beside Mom and sleep together?", "zh": "你想躺在妈妈旁边一起睡吗？"}, {"en": "Want to ride piggy-back while you try to sleep?", "zh": "你想趴在妈妈的背上睡吗？"}, {"en": "Do you want to ride in the stroller as you tyr to sleep?", "zh": "你想坐在婴儿推车上睡吗？"}, {"en": "Sleep tight for a while, Sweetie.", "zh": "甜心，睡个好觉。"}, {"en": "Do you want me to sing you a lullaby?", "zh": "你想听我唱摇篮曲吗？"}, {"en": "Go to dreamland as you listen to Mummy's", "zh": "边听妈妈的摇篮曲，边进入梦乡吧。"}, {"en": "A good gir l /boy never gets peevish before sleeping.", "zh": "乖小孩在睡觉前都不会生气哦。"}, {"en": "You are so cranky tonight.", "zh": "你今晚很烦躁。"}, {"en": "Here's your pacifier.", "zh": "你的奶嘴在这里。"}, {"en": "You have to sleep so that you can grow.", "zh": "你一定要睡觉，才能长大。"}, {"en": "Sweetie, close your eyes now and sleep tight.", "zh": "甜心，现在闭上你的眼睛，好好睡吧。"}, {"en": "The more you sleep, the more you grow.", "zh": "你越睡，就会越长大。"}, {"en": "You can meet Mummy in your dreams, Sweetie.", "zh": "甜心，你会在梦里见到妈妈。"}, {"en": "Wow, you sleep like an angel.", "zh": "哇，你睡的样子像个天使。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-06-牙牙学语.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-06-牙牙学语.mp3"}, {"ch": 37, "sec": 6, "name": "牙牙学语", "sentences": [{"en": "Hey,you started babbling.", "zh": "嘿，你开始学说话了！"}, {"en": "You've been cooing all day long.", "zh": "你一整天都在小声说话。"}, {"en": "You keep gurgling. Are you feeling good?", "zh": "你一直发出咯咯声。你的心情很好吗？"}, {"en": "Right. That's right.", "zh": "对，那样就对了。"}, {"en": "Oh, sweet baby, do you want to talk?", "zh": "喔，甜心，你想要说话吗？"}, {"en": "You will be able to talk soon.", "zh": "你很快就会说话了。"}, {"en": "Look at Mommy and keep talking.", "zh": "看着妈咪，继续说吧。"}, {"en": "What are you saying? / What do you mean?", "zh": "你在说什么？/ 那是什么意思？"}, {"en": "Here we have a chatty baby.", "zh": "我们有个多话宝宝。"}, {"en": "Oh my, stop cooing now.", "zh": "喔，现在不在嘀咕了。"}, {"en": "Stop cooing and eat, Sweetie.", "zh": "甜心，不要再嘀咕了，吃点东西。"}, {"en": "Yay! It seems like you‘re feeling great.", "zh": "耶！你看起来心情很好喔。"}, {"en": "Arms waving. Legs kicking. Are you that happy?", "zh": "手摇脚晃。你那么开心吗？"}, {"en": "You look happy.", "zh": "你看起来很开心。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-07-哄在哭的小孩.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-07-哄在哭的小孩.mp3"}, {"ch": 37, "sec": 7, "name": "哄在哭的小孩", "sentences": [{"en": "Why are you a ball hog?", "zh": "你为什么一个人踢球?"}, {"en": "What‘s wrong, honey?", "zh": "宝贝， 有什么问题吗？"}, {"en": "I wonder what‘s going on？", "zh": "我想知道发生什么事了？"}, {"en": "Okay, okay, Sweetie. Mommy‘s here.", "zh": "好，好，甜心。妈咪在这里。"}, {"en": "Stop! Stop crying, Sweetie.", "zh": "停！不要哭了，甜心。"}, {"en": "Is your diaper wet?", "zh": "尿布湿了吗？"}, {"en": "Are you sick? Let me check if you have a fever.", "zh": "你生病了吗？我看看你有没有发烧？"}, {"en": "Are you sleepy? Do you want to take a nap?", "zh": "你困了吗？你想睡个午觉吗?"}, {"en": "Are you hungry? Is that why you are crying?", "zh": "你饿了吗？那是你为什么哭吗?"}, {"en": "Do you want some milk?", "zh": "你想要喝些奶吗？"}, {"en": "Do you want me to give you a bottle?", "zh": "你要我帮你泡一杯牛奶吗?"}, {"en": "Please stop whining, baby.", "zh": "宝贝，请不要再哀嚎了。"}, {"en": "You‘re such a demanding baby.", "zh": "你真是个难搞的宝贝。"}, {"en": "If you keep on crying, a scary monster will come and get you.", "zh": "如果你还一直哭的话,可怕的怪物就会来把你抓走。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-08-翻身.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-08-翻身.mp3"}, {"ch": 37, "sec": 8, "name": "翻身", "sentences": [{"en": "You don‘t want to lie on your back?", "zh": "你不要仰睡吗？"}, {"en": "Do you want to roll over?", "zh": "你想要翻身吗？"}, {"en": "Are you going to turn over and move around?", "zh": "你想要翻身移动一下吗？"}, {"en": "Look at you! You are trying to turn yourself over.", "zh": "看看你！你正努力翻身呢？"}, {"en": "Okay, you are almost there. Try a little bit harder.", "zh": "好， 你几乎快做到了。再努力一点点。"}, {"en": "Wow, you finally turned over by yourself!", "zh": "哇，你终于靠自己翻身了。"}, {"en": "Wow, you made it, baby!", "zh": "哇，宝贝，你做到了！"}, {"en": "It was pretty tough, wasn‘t it, Sweetie?", "zh": "甜心，这很辛苦，不是吗？"}, {"en": "Oh，no! Don‘t turn over while I am changing your diaper.", "zh": "喔，我在帮你换尿布时，不可以翻身。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-09-坐.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-09-坐.mp3"}, {"ch": 37, "sec": 9, "name": "坐", "sentences": [{"en": "Do you want to sit up?", "zh": "你想坐起来吗？"}, {"en": "Oh，you might fall down. Be careful!", "zh": "喔，你会摔倒的。小心！"}, {"en": "Now straighten your back and hold it strongly.", "zh": "现在，挺直你的背，用力撑住。"}, {"en": "You are sitting, sitting…sitting…", "zh": "坐起来，坐起来、、、坐起来、、、"}, {"en": "Ah, you were almost there.", "zh": "喔，你几乎要做到了。"}, {"en": "Are you tired now? Do you want to lie down again?", "zh": "你现在累了吗？你想要再躺下来吗？"}, {"en": "Will you sit in the baby walker?", "zh": "你要不要坐学步车？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-10-爬行.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-10-爬行.mp3"}, {"ch": 37, "sec": 10, "name": "爬行", "sentences": [{"en": "It‘s time for tummy time.", "zh": "该趴一下了。"}, {"en": "[MISSING]", "zh": "喔，天呀！你能趴着用手把自己撑起来"}, {"en": "Now you have learned how to crawl!", "zh": "现在你学会了爬行！"}, {"en": "Do you want to crawl?", "zh": "你想爬吗？"}, {"en": "Want to crawl to the front /back?", "zh": "你想要往前/后爬吗？"}, {"en": "Put a little more effort into it. There you go.", "zh": "再努力一点，就是那样。"}, {"en": "You are using your knees to crawl.", "zh": "你在用你的膝盖爬。"}, {"en": "You are crawling with your knees up.", "zh": "你抬起膝盖爬耶。"}, {"en": "Crawl over to Mommy.", "zh": "爬向妈咪。"}, {"en": "Okay，put more effort into it. Crawl to Mommy.", "zh": "好，再努力一点。爬向妈咪。"}, {"en": "You are crawling so well.", "zh": "你爬得很好。"}, {"en": "You‘re crawling all over the house.", "zh": "你满屋子爬。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-11-长牙齿的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-11-长牙齿的时候.mp3"}, {"ch": 37, "sec": 11, "name": "长牙的时候", "sentences": [{"en": "Let me look in your mouth.", "zh": "让我看看你的嘴巴里面。"}, {"en": "Don‘t your gums feel itchy? / Your gums must be itching.", "zh": "你的牙床不会痒痒的吗？/你的牙床一定很痒。"}, {"en": "Here‘s your teether.", "zh": "这是给你要的玩具哦。"}, {"en": "It seems like your baby teeth will come out.", "zh": "看起来你的乳牙要长出来了。"}, {"en": "Congratulations! You won first place.", "zh": "恭喜！你得到第一各。"}, {"en": "Finally, your baby teeth are coming out!", "zh": "终于，你的乳牙长出来了。"}, {"en": "Hey, baby, you have teeth now!", "zh": "嘿，宝贝，你现在有牙齿了！"}, {"en": "I see two front teeth on the bottom.", "zh": "我看到在下面有两颗门牙。"}, {"en": "I think you will have two front upper teeth soon.", "zh": "我想你很快就会有两颗在上面的门牙。"}, {"en": "Mommy will brush your teeth, Sweetie.", "zh": "甜心，妈咪帮你刷牙。"}, {"en": "Mommy will massage you gums.", "zh": "妈妈帮你按摩牙床。"}, {"en": "Oh my! You drool too much, Honey.", "zh": "喔！宝贝，你流太多口水了。"}, {"en": "You‘ve gotten a rash from all that drooling.", "zh": "你流这么多的口水，长疹子了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-12-抓着走路.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-12-抓着走路.mp3"}, {"ch": 37, "sec": 12, "name": "抓着走路", "sentences": [{"en": "Let‘s try standing up.", "zh": "我们试着站起来。"}, {"en": "Do you think you can stand up now, baby?", "zh": "宝贝，你想你现在能站得起来吗？"}, {"en": "Hold on to Mommy‘s hands.", "zh": "抓住妈妈的手。"}, {"en": "Okay, now we‘re standing up.", "zh": "好， 现在我们站起来了。"}, {"en": "Don‘t give up. You are almost there.", "zh": "不要放弃。你快做到了。"}, {"en": "That‘s right. You are doing great!", "zh": "对。你做得很好！"}, {"en": "Don‘t let go of Mommy‘s hands.", "zh": "不要放开妈妈的手。"}, {"en": "Be careful. You might fall down.", "zh": "小心。你可能会摔倒。"}, {"en": "Oops, you fell down.", "zh": "喔， 你摔倒了。"}, {"en": "Doesn‘t it hurt? Are you okay?", "zh": "不痛吗？你还好吗？"}, {"en": "Don‘t cry. It‘s all right. We‘ll try one more time.", "zh": "不要哭。没事的。 我们再试一次。"}, {"en": "Now you are standing up!", "zh": "现在你站起来了！"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 37/第37章-13-喂辅食.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 37/第37章-13-喂辅食.mp3"}, {"ch": 37, "sec": 13, "name": "喂副食品", "sentences": [{"en": "It‘s time for your meal, Sweetie.", "zh": "甜心，该吃你的饭饭了。"}, {"en": "You must be hungry. Let‘s eat now.", "zh": "你一定很饿了。我们现在就来吃吧。"}, {"en": "What will we have to eat today？", "zh": "我们今天要吃什么呢？"}, {"en": "It is very delicious vegetable porridge.", "zh": "这是很美味的蔬菜粥。"}, {"en": "Hmm. It smells nice, right?", "zh": "嗯，闻起来很棒，对吧？"}, {"en": "Look! Isn‘t the color so pretty?", "zh": "看！颜色很漂亮吧？"}, {"en": "Say ―Ah.‖ Delicious, isn‘t it?", "zh": "说‘啊’。很好吃，不是吗?"}, {"en": "Enjoy your meal, Honey.", "zh": "宝贝，好好享受你的饭饭。"}, {"en": "Don‘t forget to chew before you swallow.", "zh": "在你吞下去之前，不要忘记咬一咬。"}, {"en": "Wow，you can chew really well.", "zh": "哇，你能咀嚼的很好。"}, {"en": "You spilled some.", "zh": "你流出一些了。"}, {"en": "You got food all over your face. Let me wipe it off for you.", "zh": "你满脸都是食物。我帮你擦掉。"}, {"en": "No, no! Don‘t eat food that has fallen on the floor.", "zh": "不，不！不要吃掉在地上的食物。"}, {"en": "Come on. Spit it out.", "zh": "来，吐出来。"}, {"en": "Why don‘t you have one more bite?", "zh": "你要不要多吃一口。"}, {"en": "You want some more?", "zh": "你想再多吃一些吗？"}, {"en": "You don‘t want to eat anymore? Are you full now?", "zh": "你不想再吃了吗？现在你覺得饱了吗？"}, {"en": "You‘ve spilled more food than you‘ve actually eaten.", "zh": "你流掉的食物比你吃的食物还要多。"}, {"en": "My lovely baby is such a good eater!", "zh": "我可爱的宝贝吃得很好。"}, {"en": "It seems like you‘ve eaten enough.", "zh": "看起来你已经吃够了。"}]}]}, "38": {"ch": 38, "name": "图书馆", "sections": [{"ch": 38, "sec": 1, "name": "学走路", "sentences": [{"en": "Okay, Sweetie, let‘s try walking now.", "zh": "好，甜心， 我们现在试着走路。"}, {"en": "Hold Mommy‘s hands.", "zh": "抓住妈妈的手。"}, {"en": "Okay, now take one step.", "zh": "好，现在跨出第一步。"}, {"en": "Now one foot. Now the other.", "zh": "一脚，再一脚。"}, {"en": "Good! You are doing really well.", "zh": "好！你真的做的很好！"}, {"en": "Now Mommy will let go of your hands.", "zh": "现在，妈妈要放开你的手了。"}, {"en": "Do you think you can walk by yourself?", "zh": "你觉得你可以走吗？"}, {"en": "It‘s okay to fall down.", "zh": "摔倒也没关系。"}, {"en": "Mommy will hold you. Get up one foot at a time!", "zh": "妈咪会抓住你的.一次站起一双脚"}, {"en": "Can you walk all the way up to Mommy?", "zh": "你能一直走到妈咪这边吗？"}, {"en": "Easy! Easy does it!", "zh": "慢一点! 慢慢来！"}, {"en": "Oops, you fell down.", "zh": "喔，你摔倒了。"}, {"en": "Don‘t cry. It‘s all right. We‘ll try one more time.", "zh": "不要哭。没事的。 我们再试一次。"}, {"en": "You will walk very well if you practice a little bit more.", "zh": "你要你再多练习一点，你就会走得很好"}, {"en": "Let‘s stop here for today.",  38/第38章-06-拒绝给点心.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 38/第38章-06-拒绝给点心.mp3"}, {"ch": 38, "sec": 6, "name": "拒绝给点心", "sentences": [{"en": "Do you want a snack again?", "zh": "你又想要点心了吗？"}, {"en": "They are all gone. You already ate them up.", "zh": "都没有了。你已经都吃完了。"}, {"en": "This is the last snack of the day.", "zh": "这是今天最后的点心了。"}, {"en": "Your searching for snacks won't help.", "zh": "你再怎样找点心也是没用的。"}, {"en": "It's not there. You won't find it.", "zh": "不在那里。你找不到的。"}, {"en": "You can't find it anywhere.", "zh": "你在哪里都找不到的。"}, {"en": "I said no more. Okay?", "zh": "我说过不能再吃，知道吗？"}, {"en": "Eat your meal first.", "zh": "先吃你的饭。"}, {"en": "You should eat a snack after your meal.", "zh": "你应该先吃饭，才能吃点心。"}, {"en": "Once you are done with the meal, I will give you something.", "zh": "一旦你吃完饭，我会给你一些。"}, {"en": "If you eat a snack first, you will lose your appetite for the meal.", "zh": "如果你先吃点心的话，会没有胃口吃饭的。"}, {"en": "If you keep on whining, I won't tell you where the candy is.", "zh": "如果你还持续哭着抱怨，我就不告诉你糖果在哪里。"}, {"en": "It's no use crying, Honey.", "zh": "宝贝，哭也没用的。"}, {"en": "Are we there yet? I can't wait.", "zh": "我们到了吗？我等不及了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 38/第38章-07-性别的疑惑.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 38/第38章-07-性别的疑惑.mp3"}, {"ch": 38, "sec": 7, "name": "性别的疑惑", "sentences": [{"en": "Why do only girls wear skirts?", "zh": "为什么只有女生穿裙子？"}, {"en": "Men and women are different.", "zh": "男生跟女生是不一样的。"}, {"en": "Mom, why are your breasts big?", "zh": "妈，为什么你的胸部很大？"}, {"en": "It's because I'm a woman.", "zh": "这是因为我是女生。"}, {"en": "Is there milk inside your breasts?", "zh": "妈妈的乳房内有牛奶吧？"}, {"en": "Yes. There used to be milk to feed you.", "zh": "嗯，以前有喂你的母乳。"}, {"en": "Women pee sitting sown because we don't have peanuts.", "zh": "女生坐着尿尿，因为我们没有小鸡鸡。"}, {"en": "Mom, why do I have a peanut?", "zh": "妈，为什么我有小鸡鸡？"}, {"en": "Why doesn't a girl have one?", "zh" ！是我们家的新宝宝！"}, {"en": "Wow, I'm a big sister now!", "zh": "哇，现在我是大姐姐了！"}, {"en": "How do you feel about having a baby sister?", "zh": "有了妹妹，你觉得如何？"}, {"en": "I'm really happy to have her.", "zh": "我真的很高兴有她。"}, {"en": "She is so cute!", "zh": "她好可爱！"}, {"en": "Her hands are so small and cute.", "zh": "她的手好小好可爱。"}, {"en": "She is better looking than me.", "zh": "她长得比我可爱。"}, {"en": "She looks the best when she smiles like this.", "zh": "当好这样笑的时候，最好看了。"}, {"en": "She is the cutest baby in the world!", "zh": "她是世界上最可爱的宝宝！"}, {"en": "You are very cute, too!", "zh": "你也很可爱！"}, {"en": "He is cuter than Minsu's brother.", "zh": "他比民肃的弟弟还可爱。"}, {"en": "I want to pinch him because he is so adorable！", "zh": "因为他太可爱，我很想捏他！"}, {"en": "She looks like a pretty doll.", "zh": "她看起来像漂亮的娃娃。"}, {"en": "I'm so glad you love your brother so much.", "zh": "我很高兴你很爱你弟弟。"}, {"en": "Your brother might cry soon.", "zh": "你的弟弟快哭了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 39/第39章-01-疼弟弟妹妹的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 39/第39章-01-疼弟弟妹妹的时候.mp3"}, {"ch": 39, "sec": 2, "name": "认厌弟弟妹妹的时候", "sentences": [{"en": "I don't like my brother.", "zh": "我讨厌我弟弟。"}, {"en": "Why do you not like him?", "zh": "你为什么不喜欢他？"}, {"en": "He bothers me too much.", "zh": "他太会烦我了。"}, {"en": "He is a troublemaker.", "zh": "他是个捣蛋鬼。"}, {"en": "He is too mischievous.", "zh": "他太调皮了。"}, {"en": "He keeps messing up my work.", "zh": "他总是把我的事情弄得很糟。"}, {"en": "He licks my toys. It's gross!", "zh": "他舔我的玩具。真让人讨厌！"}, {"en": "I want you to give him away to another family.", "zh": "我希望你把他送去别人家里。"}, {"en": "I wish that he was gone.", "zh": "我希望他不在了。"}, {"en": "You should not say that.", "zh": "你不可以那样说。"}, {"en": "Your brother will be sad if he hears that.", "zh": "如果你弟弟听到的话，他会很伤心的。"}, {"en": "You should love your brother.", "zh": "你应该爱你的弟弟。"}, {"en": "You do not know how much Jinsu loves you.", "zh": "你不知道谨夙有多爱你。"}, {"en": "He just keeps crying very loudly.", "zh": "他只是一直大声地哭闹着。"}, {"en": "Well, you were just like him when you were a baby.", "zh": "好，当你是个婴儿时，你也跟他一样。"}, {"en": "I tell him to stop touching my things, but he does not listen.", "zh": "我告诉他不可以碰我的东西，但是他就是不听。"}, {"en": "Okay, then I'm going to give him away.", "zh": "好，那么我把他送走。"}, {"en": "Come to think of it, he might be very sad.", "zh": "想一想，他可能会很伤心。"}, {"en": "I'll get along well with the baby.", "zh": "我会跟宝宝好好相处的。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 39/第39章-02-讨厌弟弟妹妹的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 39/第39章-02-讨厌弟弟妹妹的时候.mp3"}, {"ch": 39, "sec": 3, "name": "吃醋的时候", "sentences": [{"en": "Why do you like only Minsuo?", "zh": "为什么妈妈只喜欢悯所呢？"}, {"en": "What do you mean? I love you just as much as I love him.", "zh": "那是什么意思？我爱你跟爱他一样多。"}, {"en": "You and your brother are both important to me.", "zh": "你和弟弟对我来说都很重要。"}, {"en": "But you only hold Minsuo.", "zh": "但是你只抱悯所。"}, {"en": "Well, Minsuo is a baby.That's why I'm holding him often.", "zh": "好，悯所是个婴儿。所以我才会经常抱他。"}, {"en": "I want you to hold me, too.", "zh": "我也想要你抱我。"}, {"en": "Please feed me like you feed the baby.", "zh": "请跟喂宝宝一样喂我。"}, {"en": "Give me a piggy-back ride. My legs hurt.", "zh": "请背我。我脚痛。"}, {"en": "Let me sleep with you in your bed.", "zh": "让我去你的床上跟你一起睡。"}, {"en": "[MISSING]", "zh": "嗯，当你是个婴儿时，妈妈也经常抱你"}, {"en": "Come here, and I'll give you a hug.", "zh": "过来，我给你抱抱。"}, {"en": "You don't know how much Mommy loves you.", "zh": "你不知道妈咪有多么爱你。"}, {"en": "But you only praise Minsuo.", "zh": "但是，你只称赞悯所。"}, {"en": "And you always scold me.", "zh": "还有，你总是责备我。"}, {"en": "I scolded you because you did something wrong.", "zh": "因为你做错事情，我才责备你。"}, {"en": "Minsuo is only a baby. He still does not know anything.", "zh": "悯所还只是个婴儿。他还什么都不知道"}, {"en": "So you think that Mommy only loves Minsuo?", "zh": "所以，你认为妈妈只爱悯所吗？"}, {"en": "That's why you were sad.", "zh": "那就是你为什么伤心。"}, {"en": "I'm just helping him more because he is a baby.", "zh": "我帮他更多，因为他是个婴儿。"}, {"en": "What are you to doing?", "zh": "你们两个在干什么？"}, {"en": "I love you both the same.", "zh": "我对你们两个的爱是一样的。"}, {"en": "You are the first present from God to us.", "zh": "你是神给我们的第一个礼物。"}, {"en": "I love you the most in the world.", "zh": "在这个世界上，我最爱你了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 39/第39章-03-吃醋的时候.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 39/第39章-03-吃醋的时候.mp3"}]}, "40": {"ch": 40, "name": "海边沙滩", "sections": [{"ch": 40, "sec": 1, "name": "幼稚园入学", "sentences": [{"en": "Peter, what's the name of you kindergarten?", "zh": "彼得，你幼稚园的名字是什么？"}, {"en": "It's Sunlight kindergarten.", "zh": "是“阳光幼稚园”。"}, {"en": "Finally, you are going to kindergarten.", "zh": "终于，你要去上幼稚园了。"}, {"en": "I can't believe that you are already graduating!", "zh": "我不敢相信你已经要毕业了！"}, {"en": "Doesn't this book bag look nice?", "zh": "这个书包不是很漂亮吗？"}, {"en": "You will carry this backpack when you go to school.", "zh": "你去学校时，就可以背着这个书包。"}, {"en": "Mommy, I don't want to go.", "zh": "妈咪，我不想要去。"}, {"en": "Why not? Kindergarten is such a fun place.", "zh": "为什么不去？幼稚园是个那么好玩的地"}, {"en": "If you go there, you will have a great teacher and a lot of friends.", "zh": "如果你去那里，你就会有很好的老师和许多朋友。"}, {"en": "Mom, what do I do at school?", "zh": "妈妈，我在学校要做什么？"}, {"en": "Well, you play and study with your friends.", "zh": "嗯，你跟朋友一起玩，一起学习。"}, {"en": "There is a big playground there.", "zh": "那里有很大的游乐场。"}, {"en": "You'll see many toys and games that you don't have at home.", "zh": "你会看到很多家里没有的玩具和游戏。"}, {"en": "The school will serve a wonderful lunch every", "zh": "学校还会每天提供好吃的午餐。"}, {"en": "This is the kindergarten that you will be going to.", "zh": "这里就是你要去的幼稚园。"}, {"en": "I'm so glad to have a teacher and new friends.", "zh": "我很高兴有了老师和新朋友。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 40/第40章-01-幼儿园入学.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 40/第40章-01-幼儿园入学.mp3"}, {"ch": 40, "sec": 2, "name": "班级/老师的分配", "sentences": [{"en": "You are in the class called Yellow.", "zh": "你是黄色班。"}, {"en": "There are 12 students in Class Yellow.", "zh": "黄色班有12名学生。"}, {"en": "This is the classroom for Yellow.", "zh": "这是黄色班的教室。"}, {"en": "[MISSING]", "zh": "但是，我不喜欢黄色。我可以去粉红色"}, {"en": "I want to transfer to Class Pink.", "zh": "我想转去粉红色班。"}, {"en": "I want to be in the same class with Yejiu.", "zh": "我想跟叶就同班。"}, {"en": "I'm glad Yejiu is in our class.", "zh": "我很高兴叶就在我们班。"}, {"en": "Well, Class Pink is for 7 year olds.", "zh": "嗯，粉红色班是七岁上的喔。"}, {"en": "You are six, and six year olds go to Class Yellow.", "zh": "你是六岁，六岁都要去黄色班。"}, {"en": "Who is my teacher?", "zh": "我的老师是谁？"}, {"en": "Miss Wu is the teacher of Class Yellow.", "zh": "黄色班的老师是吴老师。"}, {"en": "Wow, my teacher is really pretty.", "zh": "哇，我的老师真漂亮。"}, {"en": "I like my teacher the most.", "zh": "我最喜欢我的老师了。"}, {"en": "The teacher looks scary / strict.", "zh": "老师看起来很可怕/严格。"}, {"en": "Shall we go and say hello to your teacher?", "zh": "我们应该去跟老师打招呼吧？"}, {"en": "Your teacher is like your mother when you are at school.", "zh": "你在学校的时候，你的老师就像是你的妈妈。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 40/第40章-02-班级、老师的分配.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 40/第40章-02-班级、老师的分配.mp3"}, {"ch": 40, "sec": 3, "name": "伙食", "sentences": [{"en": "Mom, what's for lunch today?", "zh": "妈，今天的午餐是什么？"}, {"en": "The teacher gave me the menu for the school lunch.", "zh": "老师给了我学校午餐的菜单。"}, {"en": "Lunchtime for our class is 12 o'clock.", "zh": "我们班的午餐时间是 12 点。"}, {"en": "Well, I don't know, but it must be good as usual.", "zh": "嗯，我不知道。但是，一定跟平常一样 好吃。", "audio_rel": "", "audio": ""}, {"en": "Well, I guess I have to take a look at the menu.", "zh": "嗯，我想我一定要看一下菜单。"}, {"en": "It seems like you will have a lot of delicious food.", "zh": "看起来你会有很多好吃的食物。"}, {"en": "I'm glad you're not picky about food at school.", "zh": "我很高兴你在学校不挑食。"}, {"en": "A special lunch will be served because there is a party today.", "zh": "因为今天有派对，所以会提供特别的午餐。"}, {"en": "Yay! I will eat chicken and cakes, too!", "zh": "耶！我也会吃到炸鸡和蛋糕！"}, {"en": "What did you have for lunch today?", "zh": "你今天的午餐吃了什么？"}, {"en": "Was your lunch delicious?", "zh": "午餐好吃吗？"}, {"en": "I had my favorite food-fried potatoes.", "zh": "我吃了我最喜欢的油炸马铃薯。"}, {"en": "It was really good.", "zh": "真的很好吃。"}, {"en": "The noodles were terrible today.", "zh": "今天的面很糟糕。"}, {"en": "Did you eat a lot of kimchi?", "zh": "你吃了很多泡菜吗？"}, {"en": "You are not overweight at all.", "zh": "你一点都不胖。"}, {"en": "I can't eat anymore because I'm stuffed.", "zh": "我太饱了，再也吃不下了。"}, {"en": "Try to finish all of your food so that you can be healthier.", "zh": "试着把食物都吃光，那样，你才会更健康。"}, {"en": "My teacher will scold me if I don't finish my lunch.", "zh": "如果我没有吃完午餐，老师会责备我。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 40/第40章-03-老师的称呼.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 40/第40章-03-老师的称呼.mp3"}, {"ch": 40, "sec": 4, "name": "收集贴纸", "sentences": [{"en": "The teacher gave me a sticker today.", "zh": "今天老师给我一张贴纸。"}, {"en": "How can you receive a praise sticker?", "zh": "你要怎样才能得到一张嘉奖贴纸呢？"}, {"en": "She gives one whenever we do something nice / good.", "zh": "每当我们做了好事，她就会给一张。"}, {"en": "You can get one when you answer a question correctly.", "zh": "当你正确地说出答案时，就可以得到一张。"}, {"en": "If you follow the rules, you can get stickers.", "zh": "如果你守规矩的话，你可以得到贴纸。"}, {"en": "If you help a friend who is sick, you can get three stickers.", "zh": "如果你帮助生病的朋友，你可以得到三张贴纸。"}, {"en": "Wow, that is a really pretty sticker!", "zh": "哇，那真是美丽的贴纸。"}, {"en": "Let's stick it in the sticker book.", "zh": "我们把它贴在黏贴簿上吧。"}, {"en": "Look at all the stickers I've got!", "zh": "看所有我得到的贴纸。"}, {"en": "Wow, you have collected a lot of stickers!", "zh": "哇，你已经收集了很多贴纸！"}, {"en": "The person with the most stickers will be rewarded.", "zh": "收集最多贴纸的人可以得到奖赏。"}, {"en": "If I collect 20 stickers, the teacher will give me a big present.", "zh": "如果我收集20张贴纸，老师会给我一个大礼物。"}, {"en": "Oh, really? Then you should try hard to get the stickers.", "zh": "喔，真的吗？那么，你一定要努力收集"}, {"en": "So, who has the most stickers?", "zh": "那么，谁收集的贴纸最多？"}, {"en": "Jina does.", "zh": "是吉娜。"}, {"en": "I've got only 10 stickers so far.", "zh": "我到现在只收集了10张贴纸。"}, {"en": "When you collect 100 stickers, I'll give you a good present.", "zh": "当你收集了100张贴纸，我会给你很棒的礼物。"}, {"en": "If you keep on being late,it will be", "zh": "如果你一直迟到的话，"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 40/第40章-04-伙食.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 40/第40章-04-伙食.mp3"}, {"ch": 40, "sec": 5, "name": "放假/升级", "sentences": [{"en": "Your vacation begins today!", "zh": "你的假期从今天开始！"}, {"en": "Mom, what is a vacation?", "zh": "妈，放假是什么？"}, {"en": "Vacation means no school.", "zh": "放假的意思是不用去上学。"}, {"en": "No waking up early! Hooray!", "zh": "不用早起床！太好了！"}, {"en": "I don't want vacation then. I want to go to kindergarten.", "zh": "那么我不想放假。我想去幼稚园。"}, {"en": "The vacation is too long.", "zh": "假期太长了。"}, {"en": "I can't wait to go back to kindergarten.", "zh": "我想快点回去幼稚园。"}, {"en": "I don't like vacation, Mommy.", "zh": "妈咪，我不喜欢放假。"}, {"en": "I miss my teacher and my friends.", "zh": "我想我的老师和朋友。"}, {"en": "How many days are left until I go back to school?", "zh": "距离我回去学校，还有几天呢？"}, {"en": "You have to wait for ten more days.", "zh": "你还要等十天。"}, {"en": "I won't go back to kindergarten after the vacation.", "zh": "放假结束后，我不要回幼稚园了。"}, {"en": "I like staying home with you.", "zh": "我喜欢跟妈妈待在家里。"}, {"en": "You'll go to the older kids' class after vacation.", "zh": "放假后，你将会去高年级的班。"}, {"en": "Well, then I'll be in Class Pink soon.", "zh": "那么，我很快就会在粉红色班。"}, {"en": "Your classroom and teacher will change, too.", "zh": "你的教室和老师也都会换喔。"}, {"en": "What about my classmates?", "zh": "我的同学呢？"}, {"en": "There will be some old faces, but there will also be some new students.", "zh": "会有些旧面孔，不过，也会有些新同学"}, {"en": "I don't want to play with Suji.", "zh": "我不想跟苏吉玩。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 40/第40章-05-放假、升级.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 40/第40章-05-放假、升级.mp3"}, {"ch": 40, "sec": 6, "name": "才艺表演/毕业典礼", "sentences": [{"en": "We are going to have a talent show next week.", "zh": "我们下周会有一个才艺表演。"}, {"en": "Our class will do a puppet dance.", "zh": "我们班会表演木偶舞。"}, {"en": "Our class will do a play.", "zh": "我们班会表演戏剧。"}, {"en": "Tomorrow is your graduation day.", "zh": "明天是你的毕业典礼。"}, {"en": "I can't believe that you are already graduating!", "zh": "我不敢相信你已经要毕业了！"}, {"en": "You will become an elementary school student.", "zh": "你将要变成一个小学生了。"}, {"en": "You've been really good at school. I'm so proud of you, Sweetie.", "zh": "你在学校真的表现得很好。甜心，我为你感到骄傲。"}, {"en": "I don't want to graduate.", "zh": "我不想要毕业。"}, {"en": "I want to keep going to kindergarten.", "zh": "我想继续上幼稚园。"}, {"en": "Will I be able to see my teacher if I graduate?", "zh": "如果我毕业的话，还能见到我的老师"}, {"en": "[MISSING]", "zh": "嗯，只要你想，任何时候都可以去拜访"}, {"en": "Sit still during the graduation ceremony.", "zh": "毕业典礼时，你要乖乖坐好。"}, {"en": "Mom will be standing at the back of the classroom.", "zh": "妈妈会站在教室后面。"}, {"en": "Congratulations!", "zh": "恭喜你！"}, {"en": "I got a good behavior award.", "zh": "我得到了模范奖。"}, {"en": "Let's take some pictures with your friends and teacher.", "zh": "我们跟你的老师、朋友们一起照相吧。"}, {"en": "Let's go and say thank you to your teacher.", "zh": "我们去跟老师说谢谢。"}, {"en": "I will miss my friends and teacher so much.", "zh": "我会非常想念我的朋友和老师。"}, {"en": "This is your graduation gift from Mommy.", "zh": "这是妈咪给你的毕业礼物。"}, {"en": "The graduation photos came out really well.", "zh": "毕业照拍得很好。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 40/第40章-06-才艺表演、毕业典礼.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 40/第40章-06-才艺表演、毕业典礼.mp3"}]}, "41": {"ch": 41, "name": "山野探险", "sections": [{"ch": 41, "sec": 1, "name": "入学/去上学", "sentences": [{"en": "Now you are going to elementary school.", "zh": "现在你要上小学了。"}, {"en": "Yeah, I'm not a baby anymore.", "zh": "耶，我已经不再是小宝宝了。"}, {"en": "I can't believe that you're a student already!", "zh": "我不敢相信你已经是个学生了！"}, {"en": "You'll go to an elementary school from now on.", "zh": "你从现在开始要去上小学了。"}, {"en": "Hurry up. We need to go to the opening", "zh": "快一点。我们要去参加开学典礼。"}, {"en": "Congratulations for starting elementary school!", "zh": "恭喜你开始上小学！"}, {"en": "Now you're a big boy/ girl and not a baby anymore.", "zh": "现在你是大哥哥/大姐姐，再也不是小孩子了。"}, {"en": "Are you excited about going to school?", "zh": "要去学校了，你会兴奋吗？"}, {"en": "Well, I'm excited, but I'm kind of scared, too.", "zh": "嗯，我很兴奋，但是我也有点害怕。"}, {"en": "What class should my son go to?", "zh": "儿子你要去第几班？"}, {"en": "I'm in Class 4 in the 1st grade.", "zh": "我是在一年四班。"}, {"en": "You have to wear indoor shoes in the classroom.", "zh": "在教室内，你一定要穿室内鞋。"}, {"en": "Put your shoe bag on the shoe shelf.", "zh": "把你的鞋袋放在鞋架上。"}, {"en": "Mommy will take you to school.", "zh": "妈妈会带你去学校。"}, {"en": "We have to be at school by 8:30 AM.", "zh": "我们早上8:30之前要到学校。"}, {"en": "But the teacher said that we have to be there by 10 minutes before 8:30 AM.", "zh": "不过，老师说我们要在8:30的前10分"}, {"en": "10 minutes before 8:30 AM.", "zh": "到"}, {"en": "My bag is very heavy because we have a lot of classes today.", "zh": "我 的书包很重，因为我们今天有很多课"}, {"en": "You can leave your textbooks in your cubby.", "zh": "你可以把你的教科书放在置物柜内。"}, {"en": "Put the things inside your locker if you always use them at school.", "zh": "如果都是在学校使用的物品的话，就放进你的置物柜内。"}, {"en": "Lunchtime for our class is 12 o'clock.", "zh": "我们班的午餐时间是12点。"}, {"en": "Mom, did you wash my classroom shoes?", "zh": "妈，你洗了我的教室用鞋吗？"}, {"en": "Listen carefully to the teacher at school.", "zh": "你在学校要仔细听老师的话。"}, {"en": "You need to listen carefully to your teacher.", "zh": "你需要好好听老师的话。"}, {"en": "Get along well with your friends.", "zh": "跟你的朋友们好好相处。"}, {"en": "Have a good day!", "zh": "祝你有个美好一天！"}, {"en": "At what time will your school be over today?", "zh": "今天学校几点放学？"}, {"en": "I'll be waiting for you at the school gate.", "zh": "我会在学校正门口等你。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-01-入学、去上学.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-01-入学、去上学.mp3"}, {"ch": 41, "sec": 2, "name": "自我介绍", "sentences": [{"en": "Let me introduce myself.", "zh": "我来自我介绍一下。"}, {"en": "My name is Jina Ji.", "zh": "我的名字是是季吉娜。"}, {"en": "I'm 8 years old.", "zh": "我八岁。"}, {"en": "I live in ABC Apartment.", "zh": "我住在ABC公寓。"}, {"en": "There are four people in my family: my dad, mom,", "zh": "我家有四个人：爸爸，妈妈，弟弟和我"}, {"en": "My height is 130cm, and my weight is 25kg.", "zh": "我身高有130公分，体重是25公斤。"}, {"en": "My favorite food is chocolate.", "zh": "我最喜欢的食物是巧克力。"}, {"en": "I like reading books very much.", "zh": "我非常喜欢阅读。"}, {"en": "I have a pet dog.", "zh": "我养了一只狗当宠物。"}, {"en": "I'm Minsu Li. I'm in the first grade in class 3.", "zh": "我是李民肃。我是一年三班的学生。"}, {"en": "My nickname is Lightfoot because I'm a fast runner.", "zh": "因为我跑很快，所以我的绰号是飞毛腿"}, {"en": "I like sports although I'm not really good at them.", "zh": "虽然我不太擅长运动，但是我很喜欢。"}, {"en": "I want to be good friends with all of you.", "zh": "我希望跟大家都成为好朋友。"}, {"en": "I want to be a soccer player when I grow up.", "zh": "我长大后，想当一个足球选手。"}, {"en": "My dream is to be a doctor when I grow up.", "zh": "我的梦想是长大后当一名医生。"}, {"en": "I want to be a scientist and create the best robot in the world.", "zh": "我想成为科学家，做出世界上最棒的机器人。"}, {"en": "I will study hard to be a great person.", "zh": "我会努力学习来成为伟大的人。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-02-自我介绍.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-02-自我介绍.mp3"}, {"ch": 41, "sec": 3, "name": "换座位", "sentences": [{"en": "We change seats once a week.", "zh": "我们一周会换一次座位。"}, {"en": "Let's decide on seatmates by drawing lots.", "zh": "我们用抽签来决定谁跟谁坐在一起。"}, {"en": "Minji, you are my seatmate this time.", "zh": "敏基，这次你跟我坐同桌。"}, {"en": "You are my seatmate again.", "zh": "你又跟我坐同桌了。"}, {"en": "I'm really happy to be your seatmate!", "zh": "我很高兴成为你的同桌伙伴！"}, {"en": "We are made for each other! / We are just meant to be!", "zh": "我们很合得来。"}, {"en": "Sir, please change our seats.", "zh": "老师，请帮我们换座位。"}, {"en": "Can we stay in our seats? We don't want to change seats.", "zh": "我们可以待在原位吗？我们不想换座位"}, {"en": "Who is your seatmate?", "zh": "谁是你的同桌伙伴？"}, {"en": "Would you prefer a girl seatmate or a boy seatmate?", "zh": "你喜欢跟女生同桌，还是跟男生同桌？"}, {"en": "I like both.", "zh": "我都喜欢。"}, {"en": "I want to sit with Minsuo.", "zh": "我想跟悯所坐在一起。"}, {"en": "Where is your seat this time?", "zh": "这次你的座位在哪？"}, {"en": "I'm sitting in the 3rd row of the first column.", "zh": "我坐在第一排的第三个位置。"}, {"en": "Do you like your seatmate?", "zh": "你喜欢你的同桌伙伴吗？"}, {"en": "Well, not really.", "zh": "嗯，没有很喜欢。"}, {"en": "I don't know yet.", "zh": "我还不知道。"}, {"en": "Sir, I want to sit at the front because I cannot see clearly.", "zh": "老师，我想坐到前面，因为我看不太清楚。"}, {"en": "You look good because you're slim.", "zh": "因为你很苗条，看起来不错。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-03-换座位.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-03-换座位.mp3"}, {"ch": 41, "sec": 4, "name": "课程", "sentences": [{"en": "How many classes do you have today?", "zh": "你今天有多少堂课？"}, {"en": "I have five classes today.", "zh": "我今天有五堂课。"}, {"en": "School ends early today.", "zh": "今天学校提早放学了。"}, {"en": "The school hours are shortened today.", "zh": "今天学校的时间缩短了。"}, {"en": "What is your favorite class / subject?", "zh": "你最喜欢的课程是什么？"}, {"en": "I like PE class the most.", "zh": "我最喜欢体育课。"}, {"en": "How long does each class last?", "zh": "每堂课有多久？"}, {"en": "It lasts for 40 minutes.", "zh": "有40分钟。"}, {"en": "What do you do during your break time?", "zh": "休息时间的时候，你做什么？"}, {"en": "I play picture card games with my friends during recess.", "zh": "休息时间的时候，我跟朋友们玩卡片游戏。"}, {"en": "What did you learn at school today?", "zh": "今天你在学校学了什么？"}, {"en": "The teacher told us a very funny story.", "zh": "老师跟我们讲了一个非常有趣的故事。"}, {"en": "What did your teacher ask?", "zh": "老师问了什么问题？"}, {"en": "Did you answer the question with a loud voice?", "zh": "你大声地回答老师的问题了吗？"}, {"en": "Did you participate in class today?", "zh": "你今天好好上课了吗？"}, {"en": "Did you make a good presentation today?", "zh": "今天你做了很棒的发表吗？"}, {"en": "I constantly raised my hand during the class, but I didn't get a chance to answer.", "zh": "上课的时候，我一直举手，但是都没有机会回答。"}, {"en": "All of today's classes are my favorite ones.", "zh": "今天所有的课都是我最喜欢的。"}, {"en": "Today's class was not fun at all.", "zh": "今天的课一点都不有趣。"}, {"en": "I was very tired at school.", "zh": "我在学校觉得很累。"}, {"en": "I kept on falling asleep during my classes.", "zh": "上课时，我一直打瞌睡。"}, {"en": "We had a class in the lab / music room / art room.", "zh": "我们在实验室/音乐教室/美术教室上课"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-04-课程.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-04-课程.mp3"}, {"ch": 41, "sec": 5, "name": "作业/准备物品/提醒单", "sentences": [{"en": "Why don't you finish your homework first?", "zh": "你何不先完成你的家庭作业呢？"}, {"en": "We don't have any homework today.", "zh": "我们今天没有家庭作业。"}, {"en": "I can't remember today's homework.", "zh": "我想不起来今天的作业。"}, {"en": "Check your homework reminders.", "zh": "去看一下你的作业提醒单。"}, {"en": "I have to finish up to page 23 in my workbook.", "zh": "到习题本的第23页，我都必须完成。"}, {"en": "Are you done with your homework?", "zh": "你的作业都做好了吗？"}, {"en": "I'm still working on it.", "zh": "我还在做。"}, {"en": "I'm not done yet.", "zh": "我还没有做好。"}, {"en": "I left my assignment notebook at school.", "zh": "我把作业簿放在学校了。"}, {"en": "What do you need for tomorrow's class?", "zh": "你明天的课程需要什么？"}, {"en": "Watercolors, a palette, and brushes.", "zh": "水彩、调色盘还有画笔。"}, {"en": "Mom, I need to buy some materials for my class.", "zh": "妈，我需要买些上课 ry funny story.", "zh": "老师跟我们讲了一个非常有趣的故事。"}, {"en": "If I do my homework, my teacher will give me sticker.", "zh": "如果我做功课的话，老师会给我贴纸。"}, {"en": "I have to bring my homework on Thursdays.", "zh": "我在星期四要把作业带去。"}, {"en": "I've worked enough at school.Why should I do work at home?", "zh": "我在学校已经做得够多了。为什么我还要在家里做呢？"}, {"en": "What's your homework?", "zh": "你的作业是什么？"}, {"en": "Is it unhealthy if you don't poop every day?", "zh": "如果没有每天大便的话，会不健康吗？"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-06-做作业.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-06-做作业.mp3"}, {"ch": 41, "sec": 7, "name": "迟到/早退/缺席", "sentences": [{"en": "You will be late for school!", "zh": "你上学要迟到了！"}, {"en": "I will never be late for school again.", "zh": "我再也不要上学迟到了！"}, {"en": "I think I might be late for school.Can you give me a ride?", "zh": "我想我可能上学会迟到。你能载我去吗？"}, {"en": "If you're late one more time,you will be in trouble.", "zh": "如果你再迟到一次的话，你会挨骂的。"}, {"en": "Phew，I made it without being late!", "zh": "呼，我没有迟到地到学校了！"}, {"en": "I don't think I can go to school today because I'm sick.", "zh": "因为我不舒服，我想我今天不能去学校了。"}, {"en": "I think you should just skip school today", "zh": "我想你今天不要去学校了。"}, {"en": "Take a rest at home.", "zh": "在家休息吧。"}, {"en": "Let me call your teacher and tell her you'll miss school", "zh": "我打电话给你的老师跟她说你会缺席。"}, {"en": "Well, try not to miss school as much as possible.", "zh": "好，试着尽可能不要缺课。"}, {"en": "If it's too hard for you to stay in school,just tell your teacher.", "zh": "如果待在学校决定很不舒服的话，跟你的老师报告。"}, {"en": "Can I go home early today,sir?", "zh": "老师，我今天可以早点回家吗？"}, {"en": "You can leave early today.Just stay home and take a rest.", "zh": "你今天可以早退。在家里休息。"}, {"en": "Jina is absent because she is sick.", "zh": "吉娜因为身体不舒服缺席了。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-07-迟到、早退、缺席.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-07-迟到、早退、缺席.mp3"}, { day.", "zh": "老师要我们写一份有关我们这个星期六经历的报告。"}, {"en": "I‘m so happy because tomorrow is a No–school Saturday!", "zh": "因为明天是不用上课的星期六，所以我"}, {"en": "Saturday!", "zh": "很开心！"}, {"en": "I wish that every day were a No–school Saturday.", "zh": "我希望每天都是不用上课的星期六。"}, {"en": "Well, I hope every Saturday is just a school day.", "zh": "嗯，我希望每个周六都是上课的日子。"}, {"en": "Next Saturday we go to school,so I will only have Saturday to rest.", "zh": "下周六，我们要去学校补课。因此，我"}, {"en": "Saturday to rest.", "zh": "只有周日可以休息。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-09-星期六的活动.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-09-星期六的活动.mp3"}, {"ch": 41, "sec": 10, "name": "管理零用钱", "sentences": [{"en": "Mom,I want an allowance.", "zh": "妈妈，我想要零用钱。"}, {"en": "How much are you going to give me?", "zh": "你要给我多少？"}, {"en": "Well,I will give you 100 a week.", "zh": "嗯，我一周给你100元。"}, {"en": "That‘s too little.", "zh": "那太少了了。"}, {"en": "I think that is just about right.", "zh": "我想那应该刚刚好。"}, {"en": "You don‘t have much to spent money anyway.", "zh": "反正你没有什么地方要花钱。"}, {"en": "What are you going to spend your allowance on?", "zh": "你要把零花钱花在什么上面?"}, {"en": "Try not to waste your money.", "zh": "试着不要浪费钱。"}, {"en": "It‘s important to spend money wisely.", "zh": "明智的用钱是很重要的。"}, {"en": "Mom, please raise my allowance.", "zh": "妈，请增加我的零用钱。"}, {"en": "By how much?", "zh": "增加多少？"}, {"en": "By 50.", "zh": "增加50元。"}, {"en": "I think it‘s too much.I will raise it by 5.", "zh": "我想这太多了。我多给你5元。"}, {"en": "If you keep on asking for a raise,I won‘t give you one", "zh": "如果你一直要求增加的话，我就不给你"}, {"en": "It's 02-2022-1114.", "zh": "02-2022-1114."}, {"en": "Don't forget your phone number.", "zh": "不要忘记你家的电话。", "audio_rel": "", "audio": ""}, {"en": "Did you already spend all of your allowance?", "zh": "你已经花完你所有的零花钱了吗？"}, {"en": "Mom,my allowance is too tight for me", "zh": "妈，我的零花钱很吃紧。"}, {"en": "If you do some errands,will you give me a bigger allowance?", "zh": "如果我帮你做事的话，你会给我更多的零花钱吗？"}, {"en": "I will wash the dishes, will you give me some money for it?", "zh": "我来洗碗。因此，你给我些零花钱。"}, {"en": "I will save my leftover allowance.", "zh": "我会把剩余的零花钱存起来。"}, {"en": "CHAPTER", "zh": "交到朊友了"}, {"en": "CHAPTER 42-01", "zh": "同班同学"}, {"en": "How many students are in your class?", "zh": "你们班有几名学生。"}, {"en": "We have thirty.", "zh": "我们有30名。"}, {"en": "How many girls are there?", "zh": "女生有几名？"}, {"en": "We have fourteen girls and sixteen boys.", "zh": "我们有14名女生和16名男生。"}, {"en": "I like all of my classmates.", "zh": "我喜欢我们班所有的同学。"}, {"en": "Does anyone from your class pick on you?", "zh": "在你们班有人欺负你吗？"}, {"en": "I like Suwa the most.", "zh": "我最喜欢苏娃。"}, {"en": "Do you know all of your classmates names?", "zh": "你知道所有同学的名字吗？"}, {"en": "I‘m trying to memorize them.", "zh": "我正努力背起来。"}, {"en": "There is a friend who has the same name as me.", "zh": "有一个朋友的名字和我一样。"}, {"en": "We have two kids whose names are Minji.", "zh": "我们两个小朋友都叫敏基。"}, {"en": "We have twins in our class.", "zh": "我们班上有双胞胎。"}, {"en": "Jina lives in our apartment complex.", "zh": "吉娜住在我们的公寓社区内。"}, {"en": "Minjiu lives in your apartment building.", "zh": "旻久住在我们公寓大楼。"}, {"en": "Great! You can both go to school together in the morning.", "zh": "那很好！你们早上可以一起去上学。"}, {"en": "CHAPTER 42-02", "zh": "介绍朋友"}, {"en": "Mom,this is my classmate Minsu.", "zh": "妈妈，这个是我的同学民肃。"}, {"en": "Oh,hello,I‘m jinhong‘s mother.", "zh": "喔，你好。我是金宏的妈妈。"}, {"en": "I‘ve heard a lot about you.", "zh": "我听到很多有关你的事情。"}, {"en": "My classmate named Suhong is really nice.", "zh": "我那名叫苏洪的同学真的很好。"}, {"en": "Lunchtime for our class is 12 o'clock.", "zh": "我们班的午餐时间是12点。"}, {"en": "Junsuo from my class is really smart.", "zh": "我们班的君梭真的很聪明。"}, {"en": "Minhou is such a good student.", "zh": "民候是个非常好的学生。"}, {"en": "Jiwong is such a troublemaker in our class.", "zh": "继望在我们班完全是个捣蛋鬼。"}, {"en": "I want to get closer to Minsuo from my class.", "zh": "我想跟我班上的悯所变得更好。"}, {"en": "Do you? Why don‘t we invite him over?", "zh": "是吗？我们为何不邀请他来玩呢？"}, {"en": "There is a new student in my class.", "zh": "我的班上有新同学。"}, {"en": "Oh,what‘s his name?", "zh": "喔，他叫什么名字？"}, {"en": "Where did he transfer from?", "zh": "他从哪里转来的？"}, {"en": "I want to get closer to Jisu,but jisu only plays with Hajin.", "zh": "我只想跟记溯亲近，但是记溯只跟哈金"}, {"en": "Hajin.", "zh": "玩。"}, {"en": "Well,then the three of you can play together.", "zh": "嗯，那么，你们三个人可以一起玩。"}, {"en": "I will to go to school together with Hajin form tomorrow.", "zh": "从明天起，我和哈金一起去上学。"}, {"en": "Suhong and I ride the same bus back home.", "zh": "苏洪和我搭同一台公车回家。"}, {"en": "CHAPTER 42-03", "zh": "朋友的问题"}, {"en": "I got in a fright with my friend.", "zh": "我和我的同学吵架了。"}, {"en": "Why did you flight?", "zh": "你为什么吵架。"}, {"en": "We both wanted the same toy.", "zh": "我们都想要同一个玩具。"}, {"en": "He took my toys away.", "zh": "他抢了我的玩具。"}, {"en": "You should take turns.", "zh": "你们应该轮流来。"}, {"en": "I thought you two were getting along.", "zh": "我还以为你们处的很好。"}, {"en": "You need to learn how to play together.", "zh": "你应该学习如何一起玩。"}, {"en": "I‘m upset because of my friend.", "zh": "我因为朋友而感到伤心。"}, {"en": "He keeps making fun of me.", "zh": "他一直取笑我。"}, {"en": "He keeps hitting me.", "zh": "他一直打我。"}, {"en": "He keeps saying bad things.", "zh": "他一直说脏话。"}, {"en": "He keeps annoying me", "zh": "他一直烦我。"}, {"en": "You must be upset.", "zh": "你一定很难过。"}, {"en": "You shouldn't act the same way as your friend.", "zh": "你不可以跟你朋友做同样的行为。"}, {"en": "Say ―No‖,clearly.", "zh": "清楚的说“不”。"}, {"en": "Be nice to your friend.", "zh": "要对朋友好。"}, {"en": "Try to understand your friend.", "zh": "试着了解你的朋友。"}, {"en": "Try to get along with your friends.", "zh": "试着跟你的朋友好好相处。"}, {"en": "Don‘t tell on your friend to the teacher.", "zh": "即使那样也不要去跟老师告状。"}, {"en": "They might all you a tattletale.", "zh": "他们可能会叫你告密者。"}, {"en": "I want to make friends with Jina.", "zh": "我想和吉娜做朋友。"}, {"en": "Some kids pick on me.", "zh": "有几个小孩欺负我。"}, {"en": "I feel like they are bullying me.", "zh": "我觉得他们霸凌我。"}, {"en": "You need to learn how to depend yourself.", "zh": "你需要学习怎么保护你自己。"}, {"en": "You guys could become better friends after frighting.", "zh": "你们打完架后，也有可能变成更好的朋友。"}, {"en": "There are manners to keep even among close friends.", "zh": "即使是好朋友，也要保持礼貌。"}, {"en": "I am glad you‘re such a sociable child.", "zh": "我很高兴你是个善交际的小孩。"}, {"en": "Jihou keeps bullying me.", "zh": "积厚一直欺负我。"}, {"en": "He keeps teasing me.", "zh": "他一直嘲笑我。"}, {"en": "He says bad stuff about me to my other friends", "zh": "他跟我的其他朋友说我的坏话。"}, {"en": "He yells and swears at me.", "zh": "他用脏话对我大吼大叫"}, {"en": "I don't want to go to school because of him.", "zh": "因为他，我不想去上学了。"}, {"en": "I want to transfer to another school.", "zh": "我想转到其他学校。"}, {"en": "Since when did he do that?", "zh": "他是从什么时候开始的。"}, {"en": "From the start of the school year.", "zh": "从学期初。"}, {"en": "Don‘t worry,Sweetie.Mommy will help you.", "zh": "甜心，别担心。妈妈会帮你的。"}, {"en": "Let‘s talk to your teacher about it.", "zh": "我们告诉老师这事情。"}, {"en": "It must‘ve been hard for you to deal with.", "zh": "对你来说，应付这个真的太难了。"}, {"en": "My friends keep picking on Jina.", "zh": "我的朋友一直欺负吉娜"}, {"en": "That‘s not very nice.You should not do that.Okay?", "zh": "那不是很好。你不可以那样做，好吗？"}, {"en": "Why don‘t you stop your friends from picking on her?", "zh": "你何不阻止你朋友去欺负她。"}, {"en": "CHAPTER 42-05", "zh": "去朋友家玩"}, {"en": "I want to go and play at Jina‘s house.", "zh": "我想去吉娜家玩。"}, {"en": "Mom,can I go and play at my friend‘s house?", "zh": "妈，我可以去我朋友家玩吗？"}, {"en": "Today's the day we go to the library.", "zh": "今天是我们要去图书馆的日子。"}, {"en": "I promised to go and play at Minjiu‘s house.", "zh": "我答应要去泯久的家玩了。"}, {"en": "Do I know her?", "zh": "我认识她吗？"}, {"en": "Go and play after you finish your homework.", "zh": "完成你的作业后，再去。"}, {"en": "Really?Does Minjiu‘s mom know about that?", "zh": "真的吗？旻久的妈妈也知道吗？"}, {"en": "Mommy will call her house.", "zh": "妈咪打电话到她家一下。"}, {"en": "Suwa said she does not have time today.", "zh": "苏娃说她今天没有时间。"}, {"en": "Go and play for two hours.", "zh": "去玩两 epeover!", "zh": "好好享受睡衣派对！"}, {"en": "I think it's going to be really fun.", "zh": "我想这样会很有趣。"}, {"en": "I can't wait! I'm so excited.", "zh": "我好想快点去！真的好兴奋。"}, {"en": "I'll see you tomorrow, Mom!", "zh": "妈妈，明天见！"}, {"en": "If there's anything wrong, just call me.", "zh": "如果有什么事，就打电话给我。"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 41/第41章-10-管理零用钱.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 41/第41章-10-管理零用钱.mp3"}]}, "43": {"ch": 43, "name": "植物园", "sections": [{"ch": 43, "sec": 1, "name": "学习", "sentences": [{"en": "Did you do well on your test?", "zh": "考试考得怎么样？"}, {"en": "I think I did.", "zh": "我想我考的不错"}, {"en": "It's time to study!", "zh": "该学习了喔。"}, {"en": "Study ahead for tomorrow's lesson.", "zh": "预习明天要学习的功课。"}, {"en": "Why don't you review today's lesson?", "zh": "你要不要复习今天的功课？"}, {"en": "Lisent to your teacher intensively during class.", "zh": "上课的时候，要认真听老师讲课。"}, {"en": "You should not keep putting off your studies.", "zh": "你不可以一直拖延你的学习。"}, {"en": "Did you finish the workbook?", "zh": "你写作业都写完了吗？"}, {"en": "You should not be looking at the answer key.", "zh": "你不可以看答案。"}, {"en": "I don't want to study.", "zh": "我不想学习。"}, {"en": "Can I get some rest first and then study?", "zh": "我可以先休息一下之后，再学习吗？"}, {"en": "Can I take a break?", "zh": "我可以休息一下吗？"}, {"en": "I think I studied too much today.", "zh": "我想我今天学习的太多了。"}, {"en": "Studying needs consistency!", "zh": "学习需要坚持不懈。"}, {"en": "I find studying to be interesting./I enjoy studying.", "zh": "我发现学习很有趣。"}, {"en": "I think I need to solve the math problems one more time.", "zh": "我想我需要再解一次这些数学题。"}, {"en": "Check over the questions that you got wrong.", "zh": "检查你做错的题目。"}, {"en": "Mom, I don't understand this one.", "zh": "妈，我不懂这题。"}, {"en": "Okay,Mommy will help you.", "zh": "好，妈咪来帮你。"}, {"en": "So, do you understand it now?", "zh": "所以，现在你理解了吗？"}, {"en": "Why do you keep getting out of the chair.", "zh": "为什么你一直从椅子上起来?"}, {"en": "I know it's hard to keep on studying.", "zh": "我知道坚持学习是很辛苦的。"}, {"en": "I'm very proud to see you studying hard.", "zh": "看到你努力学习的模样，我感到很自豪"}], "audio": "Q006-美国家庭万用亲子英语8000句/《美国家庭万用亲子英文》英语音频/Chapter 43/第43章-01-学习.mp3", "audio_rel": "https://cdn.jsdelivr.net/gh/zhongguoyin/qinzi-audio@main/Chapter 43/第43章-01-学习.mp3"}, {"ch": 43, "sec": 2, "name": "考试", "sentences": [{"en": "When is your test?", "zh": "你什么时候考试?"}, {"en": "Do you know the test range?", "zh": "你知道考试范围吗？"}, {"en": "You should not cram when studying for an exame.", "zh": "当你准备考试的时候，不可以死记硬背"}, {"en": "The midterm/final exam will begin next week.", "zh": "下周开始是期中/期末考试。"}, {"en": "This week is the midterm/final period.", "zh": "这周是期中/期末考试的时间。"}, {"en": "Study hard for your exam.", "zh": "你要认真准备考试。"}, {"en": "The test covers too many CHAPTERs.", "zh": "考试范围太广了。"}, {"en": "I'm very nervous about taking the test.", "zh": "对于考试，我很紧张。"}, {"en": "We had a quiz/CHAPTER test today.", "zh": "我们今天有小考/单元考试。"}, {"en": "Did you do well on your test?", "zh": "考试考得好吗？"}, {"en": "I think I did well on the exam.", "zh": "我想我这次考试考得不错。"}, {"en": "I don't think I did well.", "zh": "我想我考的不好。"}, {"en": "It was a little hard.", "zh": "有点难。"}, {"en": "It was easy, but I made a mistake.", "zh": "很简单，但是我做错了。"}, {"en": "I did not have enough time.", "zh": "我没有足够时间。"}, {"en": "I got two questions wrong by mistake.", "zh": "我不小心做错了两题。"}, {"en": "You shouldn't miss a question you know.", "zh": "你不应该做错你知道的题目。"}, {"en": "Let's go over the questions you missed.", "zh": "我们来检讨你做错的题目。"}, {"en": "Review your answers carefully.", "zh": "再次仔细检查你的答案。"}, {"en": "Check over the answers to make double sure.", "zh": "再次确认你的答案。"}, {"en": "Your test score will reflect how much you studied.", "zh": "你的成绩将反应出你学习了多少。"}, {"en": "You get what you deserve.", "zh": "你得到了你应得的。"}, {"en": "Don't be so loud.", "zh": "不要那么吵。"}, {"en": "You'll do better next time.", "zh": "下次，你会做得更好。"}, {"en": "If you did your best, that's what counts.", "zh": "如果你已经尽力了，那才是最重要的。"}, {"en": "How come you et your warm smile for us.", "zh": "我不会忘记老师对我们温暖的微笑。"}, {"en": "I wish you all the best and good health in the next year.", "zh": "希望您明年健健康康，一切顺利。"}, {"en": "Thank you for teaching me for the entire year.", "zh": "感谢您一年以来对我的教导。"}, {"en": "You help me in everything very kindly.", "zh": "老师在任何事情上都很亲切地帮助我。"}, {"en": "I love to go to school because of you.", "zh": "我很喜欢去有老师在的学校。"}]}, {"ch": 46, "sec": 4, "name": "信件用语", "sentences": [{"en": "Thank you for taking care of my child.", "zh": "感谢您把我的小孩照顾得很好。"}, {"en": "Thank you for loving my child.", "zh": "感谢您爱我的小孩。"}, {"en": "I thank you for all the wonderful work you have done with Jina.", "zh": "我感谢您为吉娜所做的一切美好的事情"}, {"en": "Have a very fun and happy vacation.", "zh": "祝您有个有趣且愉快的假期。"}, {"en": "It was all because of your help and support.", "zh": "一切都是因为有老师的帮助和支持。"}, {"en": "Thank you for working hard for the entire school year.", "zh": "谢谢您整个学年辛苦的付出。"}, {"en": "I bought a small gift as a sign of appreciation.", "zh": "我带了个小礼物，以表我的感谢之意。"}, {"en": "I wish you good health and happiness.", "zh": "我希望你健康幸福。"}, {"en": "My child will miss you a lot.", "zh": "我的小孩将会很想念你。"}, {"en": "I'm always grateful for your effort.", "zh": "我会永远感谢你的努力。"}, {"en": "I think that my child is really lucky to have you as a teacher.", "zh": "有你当他的老师，我想我的小孩真的很幸福。"}, {"en": "Thank you very much for all your work.", "zh": "非常感谢您所做的一切。"}, {"en": "Because of you, my child could feel at home at school.", "zh": "托您的福，我的小孩才可以自在地上学"}, {"en": "Because of you, his English skills improved a lot.", "zh": "我真的很欣赏您帮助他学习的方法。"}, {"en": "Minsu is really enjoying his school because of you.", "zh": "托您的福，民肃真的很享受他的学校生活。"}, {"en": "I feel bad for not having talked enough with you because of my limited English.", "zh": "因为我的英文能力有限，不能跟老师讲很多，我感到很可惜。"}, {"en": "I didn't even have a chance to thank you because my English is not that good.", "zh": "因为我的英文不好，所以没能好好地表达出我的感谢。"}, {"en": "I wish you all the best in your future endeavors.", "zh": "我希望你未来所做的事情都会很顺利。"}]}, {"ch": 46, " // ===== 搜索索引构建 =====
let searchIndex = [];

function buildSearchIndex(){
  Object.keys(D).sort((a,b)=>+a-+b).forEach(k=>{
    const ch = D[k];
    (ch.sections||[]).forEach((sec,si)=>{
      searchIndex.push({
        chKey: k,
        chName: ch.name,
        secIdx: si,
        secName: sec.name,
        audioRel: sec.audio_rel||null,
        sentences: sec.sentences||[]
      });
    });
  });
}

window.onload = () => {
  buildSearchIndex();
  buildSidebar();
  buildDrawerList();
  const ga = document.getElementById('ga');
  ga.addEventListener('ended', stopAudio);
  ga.addEventListener('timeupdate', updateProg);
  ga.addEventListener('error', ()=>stopAudio());
  updateSidebarToggle();
  // 不自动加载章节，欢迎页正常显示
  // 手机端：点底部"章节"按钮 or 欢迎页"开始学习"按钮进入
  // 桌面端：点左侧侧边栏章节按钮进入
};

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// 欢迎页"开始学习"：手机端打开章节抽屉，桌面端直接加载第1章
function startLearning(){
  if(window.innerWidth <= 700){
    openDrawer();
    bottomNav_setActive('chapter');
  } else {
    const firstKey = Object.keys(D).sort((a,b)=>+a-+b)[0];
    if(firstKey !== undefined) showCh(firstKey);
  }
}


function highlight(text, q){
  if(!q) return esc(text);
  const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
  return esc(text).replace(re, '<mark class="sent-highlight">$1</mark>');
}

function buildSidebar(){
  const list = document.getElementById('chList');
  Object.keys(D).sort((a,b)=>+a-+b).forEach(k=>{
    const ch = D[k];
    const emoji = EMOJIS[k]||'📖';
    const div = document.createElement('button');
    div.className = 'ch-btn'; div.id = 'cbtn-'+k;
    div.innerHTML = `<span class="ch-num-badge">${k=='0'?'★':k}</span><span class="ch-btn-text">${emoji} ${ch.name}</span><span class="ch-progress-dot" id="dot-${k}"></span>`;
    div.onclick = ()=>{ clearSearch(); showCh(k); };
    list.appendChild(div);
  });
}

// ===== 底部导航 =====
let curBnav = 'home';
function bottomNav(tab){
  curBnav = tab;
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('bnav-'+tab);
  if(btn) btn.classList.add('active');

  // 切换到任何非章节 tab 时，先关闭抽屉
  if(tab !== 'chapter') closeDrawer();

  if(tab === 'chapter'){
    openDrawer();
  } else if(tab === 'wallcard'){
    showWallcardPage();
  } else if(tab === 'search'){
    // 聚焦搜索框
    const si = document.getElementById('mobileSearchInput');
    if(si){ si.focus(); si.scrollIntoView({behavior:'smooth'}); }
    bottomNav_setActive('search');
  } else if(tab === 'quiz'){
    if(curChKey){
      startQuiz(curChKey);
    } else {
      // 没选章节时，Toast 提示用户先选章节
      showToast('请先点击「章节」选择一个章节，再开始练习 😊');
      bottomNav_setActive('quiz');
    }
  } else if(tab === 'settings'){
    openSettings();
  } else if(tab === 'home'){
    // 回首页：清空搜索并恢复视图
    clearSearch();
    restoreChView();
    const c = document.getElementById('content');
    if(c) c.scrollTop = 0;
    bottomNav_setActive('home');
  }
}
function bottomNav_setActive(tab){
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('bnav-'+tab);
  if(btn) btn.classList.add('active');
}

function filterDrawer(q){
  const list = document.getElementById('drawerList');
  if(!list) return;
  const btns = list.querySelectorAll('.ch-btn');
  const lq = q.toLowerCase();
  btns.forEach(btn=>{
    const text = btn.textContent.toLowerCase();
    btn.style.display = (!q || text.includes(lq)) ? '' : 'none';
  });
}

// ===== Toast 轻提示 =====
function showToast(msg, duration){
  duration = duration || 2400;
  let t = document.getElementById('globalToast');
  if(!t){
    t = document.createElement('div');
    t.id = 'globalToast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(45,55,72,0.92);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; }, duration);
}

// ===== TTS 逐句点读 =====
function hasTts(){
  return 'speechSynthesis' in window;
}

// 预加载并缓存最佳英语声音
let _bestVoice = null;
let _voicesLoaded = false;

function loadBestVoice(){
  if(_voicesLoaded) return;
  _voicesLoaded = true;
  const voices = window.speechSynthesis.getVoices();
  if(voices.length === 0){
    window.speechSynthesis.onvoiceschanged = () => {
      const v2 = window.speechSynthesis.getVoices();
      _bestVoice = selectBestVoice(v2);
    };
  } else {
    _bestVoice = selectBestVoice(voices);
  }
}

function selectBestVoice(voices){
  // 优先级：微软高质量 > 苹果 Samantha > 其他英语 > 任意英语
  const prefer = [
    v => v.name.includes('Aria'),        // Microsoft Aria (最自然)
    v => v.name.includes('Jenny'),       // Microsoft Jenny
    v => v.name.includes('Guy'),         // Microsoft Guy
    v => v.name.includes('Zira'),        // Microsoft Zira
    v => v.name.includes('Samantha'),    // macOS Samantha
    v => v.name.includes('Alex'),        // macOS Alex
    v => v.lang === 'en-US' && v.localService,
    v => v.lang.startsWith('en-US'),
    v => v.lang.startsWith('en-'),
  ];
  for(const test of prefer){
    const found = voices.find(test);
    if(found) return found;
  }
  return voices[0] || null;
}

// 根据句子特征智能调整语调参数
function getTtsParams(text){
  const t = text.trim();
  const lastChar = t.slice(-1);

  // 疑问句：音调略高，语速稍慢
  if(lastChar === '?' || t.endsWith('?')){
    return { rate: 0.88, pitch: 1.15, volume: 1.0 };
  }
  // 感叹句：音调高、更有活力
  if(lastChar === '!' || t.endsWith('!')){
    return { rate: 0.92, pitch: 1.2, volume: 1.0 };
  }
  // 祈使句（以动词开头，无主语）
  const imperativeStarters = ['Go','Come','Look','Listen','Stop',"Don't","Let's",'Try','Put','Take','Turn','Give','Tell','Show','Make','Get','Wash','Clean','Sit','Stand'];
  const firstWord = t.split(/\s+/)[0].replace(/[^a-zA-Z']/g,'');
  if(imperativeStarters.some(w => w.toLowerCase() === firstWord.toLowerCase())){
    return { rate: 0.90, pitch: 1.08, volume: 1.0 };
  }
  // 普通陈述句
  return { rate: 0.88, pitch: 1.0, volume: 1.0 };
}

function speakSentence(text, btnEl){
  if(!hasTts()) { alert('您的浏览器不支持语音朗读，请尝试 Chrome 或 Edge 浏览器'); return; }

  // 如果点同一个按钮，则停止
  if(curTtsBtn === btnEl){
    stopTts();
    return;
  }

  // 停止之前的
  stopTts();

  // 停止背景音频（避免干扰）
  stopAudio();

  // 确保声音已加载
  loadBestVoice();

  const params = getTtsParams(text);
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = params.rate;
  utter.pitch = params.pitch;
  utter.volume = params.volume;

  if(_bestVoice) utter.voice = _bestVoice;

  ttsUtterance = utter;
  curTtsBtn = btnEl;

  if(btnEl){
    btnEl.textContent = '🔊';
    btnEl.classList.add('reading');
  }

  utter.onend = () => { stopTts(); };
  utter.onerror = () => { stopTts(); };

  window.speechSynthesis.speak(utter);
}

function stopTts(){
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(curTtsBtn){
    curTtsBtn.textContent = '▶';
    curTtsBtn.classList.remove('reading');
    curTtsBtn = null;
  }
  ttsUtterance = null;
}

let searchTimeout = null;
function onSearch(q){
  clearTimeout(searchTimeout);
  q = q.trim();
  if(!q){ showAllChBtns(); restoreChView(); return; }
  searchTimeout = setTimeout(()=>doSearch(q), 220);
}

function showAllChBtns(){
  document.querySelectorAll('.ch-btn').forEach(b=>{ b.style.display=''; });
}

function restoreChView(){
  hideWallcardPage();
  if(curChKey !== null){
    showCh(curChKey);
  } else {
    // 没有选过章节，回到欢迎页
    const welcome = document.getElementById('welcomePage');
    const chContent = document.getElementById('chContent');
    if(welcome) welcome.style.display = '';
    if(chContent){ chContent.style.display = 'none'; chContent.innerHTML = ''; }
    const c = document.getElementById('content');
    if(c) c.scrollTop = 0;
  }
}

function clearSearch(){
  const si = document.getElementById('searchInput');
  const mi = document.getElementById('mobileSearchInput');
  if(si) si.value = '';
  if(mi) mi.value = '';
  showAllChBtns();
  // 如果当前在搜索结果视图，还原章节内容
  const chContent = document.getElementById('chContent');
  if(chContent && (chContent.querySelector('.search-results-header') || chContent.querySelector('.no-results'))){
    restoreChView();
  }
}

function doSearch(q){
  const ql = q.toLowerCase();
  document.querySelectorAll('.ch-btn').forEach(b=>{
    b.style.display = b.textContent.toLowerCase().includes(ql) ? '' : 'none';
  });

  let hits = [];
  searchIndex.forEach(item=>{
    const matchSec = item.secName.toLowerCase().includes(ql) || item.chName.toLowerCase().includes(ql);
    const matchSents = item.sentences.filter(s=>
      s.en.toLowerCase().includes(ql) || s.zh.toLowerCase().includes(ql)
    );
    if(matchSec || matchSents.length > 0){
      hits.push({...item, matchSents: matchSec ? item.sentences : matchSents, isSecMatch: matchSec});
    }
  });

  renderSearchResults(q, hits);
}

function renderSearchResults(q, hits){
  hideWallcardPage();
  const c = document.getElementById('content');
  const chContent = document.getElementById('chContent');
  const welcome = document.getElementById('welcomePage');
  if(welcome) welcome.style.display = 'none';
  if(!chContent) return;
  chContent.style.display = '';
  if(hits.length === 0){
    chContent.innerHTML = `<div class="no-results">
      <div class="no-results-emoji">🔍</div>
      <div class="no-results-text">没有找到 "<b>${esc(q)}</b>" 的相关内容</div>
      <div style="font-size:13px;color:#bbb;margin-top:8px">试试其他关键词，比如 "breakfast" 或 "起床"</div>
    </div>`;
    if(c) c.scrollTop = 0;
    return;
  }
  let html = `<div class="search-results-header">
    <span style="font-size:28px">🔍</span>
    <div>
      <div style="font-size:17px;font-weight:800;color:#2d3748">搜索 "${esc(q)}"</div>
      <div style="font-size:12px;color:#999;margin-top:2px">共找到 ${hits.length} 个相关场景</div>
    </div>
  </div>`;

  hits.forEach(item=>{
    const emoji = EMOJIS[item.chKey]||'📖';
    const color = COLORS[item.secIdx % COLORS.length];
    const ap = item.audioRel ? encodeURIPath(item.audioRel) : null;
    const sid = 'SR_'+item.chKey+'_'+item.secIdx;
    html += `<div class="search-result-card" onclick="goToSection('${item.chKey}',${item.secIdx})">
      <div class="src-card-head">

        <span class="src-section-name">${highlight(item.secName, q)}</span>
        ${ap ? `<button class="play-btn ${color}" id="p-${sid}" style="width:34px;height:34px;font-size:15px;margin-left:auto;flex-shrink:0"
          data-audio="${ap}" onclick="event.stopPropagation();playSec('${sid}',this.dataset.audio)">▶</button>` : ''}
      </div>
      <div class="src-card-body">

          <div class="src-sent-en">${highlight(s.en, q)}</div>

function goToSection(chKey, secIdx){

function encodeURIPath(p){ if(p.startsWith('http://') || p.startsWith('https://')) return p; return p.split('/').map(s=>encodeURIComponent(s)).join('/'); }

// 统计所有墙卡总数
function totalWallcards(){
  let n = 0;
  Object.values(WC).forEach(arr => {
    arr.forEach(url=>{
      const m = url.match(/_p(\d+)\./);
      if(!m || parseInt(m[1]) >= 3) n++;
    });
  });
  return n;
}


// 按章节分组 WC 数据：{chKey: [{sectionKey, imgs}]}
function groupWallcards(){
  const groups = {}; // key: chKey (string number), val: [{sectionKey, imgs}]
  // 数字排序：1-1, 1-2, ..., 1-10, 1-12, ...
  const sortedKeys = Object.keys(WC).sort((a,b)=>{
    const [ac,as] = a.split('-').map(Number);
    const [bc,bs] = b.split('-').map(Number);
    return ac !== bc ? ac - bc : as - bs;
  });
  sortedKeys.forEach(wk=>{
    const chKey = wk.split('-')[0];
    if(!groups[chKey]) groups[chKey] = [];
    // 过滤掉纯文字页（p01, p02）：只保留 p03 以后的图片
    const filteredImgs = (WC[wk] || []).filter(url=>{
      const m = url.match(/_p(\d+)\./);
      return m ? parseInt(m[1]) >= 3 : true;
    });
    if(filteredImgs.length > 0){
      groups[chKey].push({ sectionKey: wk, imgs: filteredImgs });
    }
  });
  return groups;
}

// 构建独立墙卡页 HTML
function buildWallcardPage(){
  const groups = groupWallcards();
  const totalN = totalWallcards();
  const chCount = Object.keys(groups).length;

  let html = `<div class="wcp-header">
    <div class="wcp-header-icon">🃏</div>
    <div class="wcp-header-info">
      <h2>墙卡相册</h2>
      <p>共 ${chCount} 个章节 · ${totalN} 张卡片</p>
    </div>
  </div>`;

  Object.keys(groups).sort((a,b)=>+a-+b).forEach(chKey=>{
    const chData = D[chKey];
    const chName = chData ? chData.name : ('第'+chKey+'章');
    const emoji = EMOJIS[chKey]||'📖';
    const sections = groups[chKey];

    sections.forEach(({sectionKey, imgs})=>{
      if(!imgs || imgs.length === 0) return;
      const wid = 'wcp-'+sectionKey.replace('-','_');

      // 找到对应节的数据
      const secIdx = parseInt(sectionKey.split('-')[1]) - 1;
      const secData = chData && chData.sections ? chData.sections[secIdx] : null;
      const secName = secData ? secData.name : sectionKey;
      const secAudio = secData ? (secData.audio_cdn || secData.audio_rel || '') : '';
      const sentences = secData ? (secData.sentences || []) : [];

      // 将句子均分到每张图片
      // 每张图约 perImg 句，最后一张图取剩余所有句子
      const perImg = sentences.length > 0 ? Math.ceil(sentences.length / imgs.length) : 0;

      // 每张图片 + 对应句子 组合成卡片
      const cardsHtml = imgs.map((url, imgIdx)=>{
        const startIdx = imgIdx * perImg;
        const endIdx = imgIdx === imgs.length - 1 ? sentences.length : startIdx + perImg;
        const imgSents = sentences.slice(startIdx, endIdx);

        const sentsRowsHtml = imgSents.map((s, si)=>{
          const uid = wid + '_' + imgIdx + '_' + si;
          return `<div class="wcp-sent-row">
            <button class="wcp-tts-btn" id="wtts-${uid}" onclick="wcpTts(this,'${esc(s.en)}')" title="朗读英文">🔊</button>
            <div class="wcp-sent-texts">
              <div class="wcp-sent-en">${esc(s.en)}</div>
              <div class="wcp-sent-zh" id="wzh-${uid}">${esc(s.zh)}</div>
            </div>
            <button class="wcp-zh-btn" id="wzhb-${uid}" onclick="wcpToggleZh('${uid}')" title="显示/隐藏翻译">中</button>
          </div>`;
        }).join('');

        return `<div class="wcp-img-card">
          <div class="wcp-img-wrap">
            <img src="${url}" alt="墙卡 ${imgIdx+1}" loading="${imgIdx===0?'eager':'lazy'}" onerror="this.parentElement.style.display='none'">
          </div>
          ${imgSents.length > 0 ? `<div class="wcp-card-sents">${sentsRowsHtml}</div>` : ''}
        </div>`;
      }).join('');

      html += `<div class="wcp-section">
        <div class="wcp-section-title">
          <span class="wcp-section-tag">${emoji} ${sectionKey}</span>
          <span style="color:#4a5568;font-weight:700">${esc(chName)}</span>
          <span class="wcp-count">${imgs.length} 张</span>
        </div>
        <div class="wcp-sec-info">
          <span class="wcp-sec-name">${esc(secName)}</span>
          ${secAudio ? `<button class="wcp-audio-btn" id="wab-${wid}" onclick="wcpPlayAudio('${wid}','${secAudio}')">🔊 播放本节</button>` : ''}
        </div>
        ${cardsHtml}
      </div>`;
    });
  });

  html += `<div class="footer">
    <div>© 2026 &nbsp;·&nbsp; 根据网络公开资料整理</div>
    <div style="margin-top:4px;">本资料由 <b>泥巴爸爸</b> 整理制作，仅供个人学习使用，请勿商用。</div>
    <div style="margin-top:8px;font-size:12px;">
      📱 更多亲子英语资源 → 小红书搜索 <b style="color:#ff6b9d;">泥巴爸爸</b>
    </div>
  </div>`;

  return html;
}

// 墙卡导航：跳到指定索引
function wcpGoto(wid, idx){
  const wrap = document.getElementById('wslide-'+wid);
  const slider = document.getElementById('ws-'+wid);
  const counter = document.getElementById('wcount-'+wid);
  const prevBtn = document.getElementById('wprev-'+wid);
  const nextBtn = document.getElementById('wnext-'+wid);
  if(!wrap || !slider) return;

  const total = parseInt(wrap.dataset.total);
  idx = Math.max(0, Math.min(idx, total - 1));
  wrap.dataset.cur = idx;
  slider.style.transform = `translateX(-${idx * 100}%)`;
  if(counter) counter.textContent = `${idx+1} / ${total}`;
  if(prevBtn) prevBtn.disabled = idx === 0;
  if(nextBtn) nextBtn.disabled = idx === total - 1;

  const dots = document.querySelectorAll(`#wdots-${wid} .wcp-dot`);
  dots.forEach((d, i) => d.classList.toggle('active', i === idx));
}
function wcpPrev(wid){
  const wrap = document.getElementById('wslide-'+wid);
  if(wrap) wcpGoto(wid, parseInt(wrap.dataset.cur) - 1);
}
function wcpNext(wid){
  const wrap = document.getElementById('wslide-'+wid);
  if(wrap) wcpGoto(wid, parseInt(wrap.dataset.cur) + 1);
}

// 触摸滑动
function initWcpSwipe(wid){
  if(_wcSwipeInit.has(wid)) return;
  _wcSwipeInit.add(wid);
  const wrap = document.getElementById('wslide-'+wid);
  if(!wrap) return;
  let sx = 0, sy = 0;
  wrap.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; }, {passive:true});
  wrap.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - sx;
    const dy = e.changedTouches[0].clientY - sy;
    if(Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40){
      if(dx < 0) wcpNext(wid); else wcpPrev(wid);
    }
  }, {passive:true});
}

// 墙卡页：播放整节音频
let _wcCurAudio = null;
let _wcCurBtn = null;
function wcpPlayAudio(wid, url){
  const btn = document.getElementById('wab-'+wid);

  // ── 情况1：点击的就是当前同一节按钮 ──
  if(_wcCurBtn === btn && _wcCurAudio){
    if(!_wcCurAudio.paused){
      // 正在播放 → 暂停（保留进度）
      _wcCurAudio.pause();
      if(btn){ btn.classList.remove('playing'); btn.innerHTML = '▶ 继续播放'; }
    } else {
      // 已暂停 → 续播
      _wcCurAudio.play().catch(()=>{});
      if(btn){ btn.classList.add('playing'); btn.innerHTML = '⏸ 播放本节'; }
    }
    return;
  }

  // ── 情况2：切换到不同节 → 停止之前的，新建音频 ──
  if(_wcCurAudio){ _wcCurAudio.pause(); _wcCurAudio.currentTime = 0; }
  if(_wcCurBtn){ _wcCurBtn.classList.remove('playing'); _wcCurBtn.innerHTML = '🔊 播放本节'; }
  stopAudio(); stopTts();

  const audio = new Audio(url);
  _wcCurAudio = audio;
  _wcCurBtn = btn;
  if(btn){ btn.classList.add('playing'); btn.innerHTML = '⏸ 播放本节'; }
  audio.play().catch(()=>{});
  audio.onended = ()=>{
    if(btn){ btn.classList.remove('playing'); btn.innerHTML = '🔊 播放本节'; }
    _wcCurAudio = null; _wcCurBtn = null;
  };
  audio.onerror = ()=>{
    if(btn){ btn.classList.remove('playing'); btn.innerHTML = '🔊 播放本节'; }
    _wcCurAudio = null; _wcCurBtn = null;
  };
}
